  /schools/dashboard:
    get:
      tags:
        - Schools
      summary: Dados consolidados para o dashboard da escola
      description: Retorna métricas, histórico de receita, pagamentos em atraso e matrículas recentes para a escola autenticada.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Dados do dashboard recuperados com sucesso.
          content:
            application/json:
              schema:
                type: object
                properties:
                  summary:
                    type: object
                    properties:
                      totalStudents:
                        type: integer
                        description: Total de alunos ativos na escola
                        example: 12
                      totalClasses:
                        type: integer
                        description: Total de turmas ativas
                        example: 5
                      totalCourses:
                        type: integer
                        description: Total de cursos ativos
                        example: 4
                      currentMonthRevenue:
                        type: number
                        format: double
                        description: Receita recebida (paga) do mês atual em reais
                        example: 2450.00
                      currentMonthRevenueCents:
                        type: integer
                        description: Receita recebida (paga) do mês atual em centavos
                        example: 245000
                      revenueForecast:
                        type: number
                        format: double
                        description: Previsão de receita (cobranças pendentes/abertas) para o mês atual em reais
                        example: 3000.00
                      revenueForecastCents:
                        type: integer
                        description: Previsão de receita (cobranças pendentes/abertas) para o mês atual em centavos
                        example: 300000
                      revenueChangePercentage:
                        type: number
                        format: double
                        description: Porcentagem de mudança de receita em relação ao mês anterior (positiva ou negativa)
                        example: 8.2
                      pendingEnrollmentRequests:
                        type: integer
                        description: Quantidade de solicitações de matrícula pendentes
                        example: 2
                    required:
                      - totalStudents
                      - totalClasses
                      - totalCourses
                      - currentMonthRevenue
                      - currentMonthRevenueCents
                      - revenueForecast
                      - revenueForecastCents
                      - revenueChangePercentage
                      - pendingEnrollmentRequests
                  overduePayments:
                    type: object
                    properties:
                      totalAmount:
                        type: number
                        format: double
                        description: Valor total em atraso em reais
                        example: 1450.00
                      totalAmountCents:
                        type: integer
                        description: Valor total em atraso em centavos
                        example: 145000
                      count:
                        type: integer
                        description: Quantidade de pagamentos em atraso
                        example: 5
                    required:
                      - totalAmount
                      - totalAmountCents
                      - count
                  recentEnrollments:
                    type: array
                    description: Últimos 5 alunos matriculados (ordenados por data de matrícula, mais recentes primeiro)
                    items:
                      type: object
                      properties:
                        studentId:
                          type: string
                          format: uuid
                          description: ID do aluno ou dependente
                        studentName:
                          type: string
                          description: Nome completo do aluno
                        courseName:
                          type: string
                          description: Nome do curso
                        className:
                          type: string
                          description: Rótulo da turma
                        enrolledAt:
                          type: string
                          format: date-time
                          description: Data e hora da matrícula
                      required:
                        - studentId
                        - studentName
                        - courseName
                        - className
                        - enrolledAt
                  revenueHistory:
                    type: array
                    items:
                      type: object
                      properties:
                        month:
                          type: string
                          description: 'Mês no formato YYYY-MM'
                          example: "2024-03"
                        value:
                          type: number
                          format: double
                          description: Receita total do mês em reais
                        valueCents:
                          type: integer
                          description: Receita total do mês em centavos
                      required:
                        - month
                        - value
                        - valueCents
                required:
                  - summary
                  - overduePayments
                  - recentEnrollments
                  - revenueHistory
              examples:
                default:
                  summary: Exemplo de resposta do dashboard
