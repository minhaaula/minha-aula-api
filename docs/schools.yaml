paths:
  /schools/login:
    post:
      tags:
        - Schools
      summary: Autenticar uma escola
      description: |
        Autentica uma escola e retorna um token de acesso. A resposta inclui informações sobre o status do onboarding (KYC):
        - `onboardingCompleted`: indica se o processo de onboarding foi finalizado (true quando a escola tem accountId e accountApiKey)
        - `onboardingUrl`: link para completar o onboarding (retornado apenas quando onboardingCompleted é false)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SchoolLoginInput'
      responses:
        '200':
          description: Login realizado com sucesso. Retorna token de acesso e informações sobre o status do onboarding.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchoolLoginResponse'
        '400':
          description: Erro de validação ou credenciais inválidas.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/password/otp/request:
    post:
      tags:
        - Schools
      summary: Solicitar código no WhatsApp para reset de senha
      description: |
        Inicia verificação por **Twilio Verify** (WhatsApp) para o telefone da escola associado ao e-mail do proprietário.
        Em seguida use `POST /schools/password/otp/verify` e, com o `resetToken`, `POST /schools/password/reset`.
        A rota antiga `POST /schools/password/request` (envio só por e-mail) foi descontinuada.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SchoolPasswordOtpRequest'
      responses:
        '200':
          description: Mensagem genérica quando não há desafio criado (e-mail inexistente ou sem telefone).
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '201':
          description: Código enviado ao WhatsApp.
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                  - challengeId
                  - purpose
                  - expiresAt
                properties:
                  message:
                    type: string
                  challengeId:
                    type: string
                    format: uuid
                  purpose:
                    type: string
                    enum:
                      - school_password_reset
                  expiresAt:
                    type: string
                    format: date-time
        '400':
          description: Erro de validação
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/password/otp/verify:
    post:
      tags:
        - Schools
      summary: Validar código do WhatsApp (reset de senha da escola)
      description: Retorna `resetToken` para usar em `POST /schools/password/reset`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SchoolPasswordOtpVerifyInput'
      responses:
        '200':
          description: Verificação concluída.
          content:
            application/json:
              schema:
                type: object
                required:
                  - purpose
                  - resetToken
                  - challengeId
                properties:
                  purpose:
                    type: string
                    enum:
                      - school_password_reset
                  resetToken:
                    type: string
                  challengeId:
                    type: string
                    format: uuid
        '400':
          description: Código inválido ou expirado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/password/reset:
    post:
      tags:
        - Schools
      summary: Resetar senha com token
      description: |
        Redefine a senha da escola usando o `resetToken` retornado por `POST /schools/password/otp/verify`
        (fluxo com código no WhatsApp).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
                - newPassword
              properties:
                token:
                  type: string
                  description: Token retornado na verificação do WhatsApp
                  example: abc123def456
                newPassword:
                  type: string
                  format: password
                  description: Nova senha (mínimo 6 caracteres)
                  example: novaSenha123
      responses:
        '200':
          description: Senha redefinida com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Senha redefinida com sucesso
        '400':
          description: Token inválido ou senha inválida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/password/validate:
    post:
      tags:
        - Schools
      summary: Validar token de reset de senha
      description: Verifica se um token de reset de senha é válido e retorna informações sobre ele
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
              properties:
                token:
                  type: string
                  description: Token a ser validado
                  example: abc123def456
      responses:
        '200':
          description: Resultado da validação
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                    description: Indica se o token é válido
                    example: true
                  email:
                    type: string
                    format: email
                    description: Email associado ao token (apenas se válido)
                    example: owner@escola.com
                  expiresAt:
                    type: string
                    format: date-time
                    description: Data de expiração do token (apenas se válido)
                    example: 2025-11-17T10:00:00Z
  /schools/password:
    patch:
      tags:
        - Schools
      summary: Alterar senha da escola logada
      description: Permite que uma escola autenticada altere sua própria senha
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - currentPassword
                - newPassword
              properties:
                currentPassword:
                  type: string
                  format: password
                  description: Senha atual da escola
                  example: senhaAtual123
                newPassword:
                  type: string
                  format: password
                  description: Nova senha (mínimo 6 caracteres)
                  example: novaSenha456
      responses:
        '204':
          description: Senha alterada com sucesso
        '401':
          description: Não autenticado ou senha atual inválida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools:
    post:
      tags:
        - Schools
      summary: Criar uma nova escola
      description: |
        Cria uma nova escola e automaticamente cria uma subconta no Asaas para processamento de pagamentos.
        O sistema busca o link de onboarding (KYC) e retorna no campo `kycUrl` para que o frontend possa
        redirecionar o usuário para completar a verificação de identidade.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSchoolInput'
      responses:
        '201':
          description: Escola criada com sucesso. O campo `kycUrl` contém o link para completar o KYC no Asaas.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchoolResponse'
              examples:
                default:
                  summary: Escola criada com link de KYC
                  value:
                    id: "a585a342-650a-4ab7-a606-07ae09bb72e1"
                    name: "Escola do Futuro"
                    email: "contato@escoladofuturo.com.br"
                    phone: "11987654321"
                    cnpj: "12345678000190"
                    addresses: []
                    createdAt: "2024-07-15T10:00:00.000Z"
                    ownerUserId: "9f17b6f3-7af8-45be-8f4a-4d982f5a9f0c"
                    ownerName: "Maria Silva"
                    ownerCpf: "12345678901"
                    ownerEmail: "diretoria@escoladofuturo.com.br"
                    ownerBirthDate: null
                    ownerWhatsapp: "11987654321"
                    incomeValue: 50000
                    bankAccounts: []
                    links:
                      facebook: null
                      instagram: null
                      tiktok: null
                      youtube: null
                      site: null
                    images: []
                    isOverdue: false
                    kycUrl: "https://beta.cadastro.io/c33ef9ae605f350c052be72ab094d0b7"
        '400':
          description: Erro de validação.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/students:
    get:
      tags:
        - Schools
      summary: Listar alunos matriculados na escola
      description: Retorna as matrículas ativas com os dados do aluno, dependente (quando existir), curso e turma.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: name
          required: false
          schema:
            type: string
          description: Filtrar alunos cujo nome (ou do dependente) contenha o valor informado (case insensitive).
        - in: query
          name: courseId
          required: false
          schema:
            type: string
            format: uuid
          description: Filtrar matrículas vinculadas a um curso específico.
        - in: query
          name: classId
          required: false
          schema:
            type: string
            format: uuid
          description: Filtrar matrículas de uma turma específica (`course_classes.id`).
        - in: query
          name: cpf
          required: false
          schema:
            type: string
          description: Filtrar por CPF do titular ou do dependente (com ou sem formatação).
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
          description: 'Número máximo de resultados a retornar (padrão: 50, máximo: 100)'
        - in: query
          name: offset
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
          description: 'Número de resultados a pular para paginação (padrão: 0)'
      responses:
        '200':
          description: Lista de alunos matriculados na escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchoolStudentsResponse'
        '400':
          description: Erro na requisição.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado ou sem contexto de escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade de listagem de alunos não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/students/directory/{cpf}:
    get:
      tags:
        - Schools
      summary: Buscar aluno ou dependente por CPF
      description: Permite que escolas localizem um aluno ou dependente pelo CPF. Quando o CPF pertence a um dependente, os dados do responsável são incluídos na resposta.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: cpf
          required: true
          schema:
            type: string
            example: '39588620805'
          description: CPF do aluno ou dependente a ser localizado (11 dígitos).
      responses:
        '200':
          description: Dados do aluno ou dependente encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentDirectoryResponse'
        '400':
          description: CPF inválido. Deve conter 11 dígitos.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado ou sem contexto de escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Aluno ou dependente não encontrado com o CPF informado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade de busca de alunos não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/students/{studentId}/financial-summary:
    get:
      operationId: getSchoolStudentFinancialSummary
      tags:
        - Schools
        - Financeiro
      summary: Consolidado financeiro do aluno na escola
      description: |
        Retorna totais em centavos (valor líquido das cobranças) para o aluno ou dependente informado,
        apenas se houver matrícula ativa na escola logada.

        - `pendingTotalCents`: cobranças em aberto com vencimento ainda não ultrapassado (e falhas não vencidas).
        - `overdueTotalCents`: status OVERDUE ou em aberto com data de vencimento já passada.
        - `paidTotalCents`: cobranças pagas.
        - `grandTotalCents`: soma de todas as cobranças do aluno na escola, **incluindo canceladas**.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: studentId
          required: true
          schema:
            type: string
            format: uuid
          description: ID do usuário-aluno ou do dependente (mesmo identificador da listagem de alunos).
      responses:
        '200':
          description: Totais calculados.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchoolStudentFinancialSummaryResponse'
        '403':
          description: Usuário não autorizado ou sem contexto de escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Aluno não encontrado ou não vinculado à escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/students/{studentId}/paid-charges:
    get:
      operationId: listSchoolStudentPaidCharges
      tags:
        - Schools
        - Financeiro
      summary: Listar cobranças do aluno na escola (paginado)
      description: |
        Retorna as cobranças financeiras do aluno na escola (pendentes e pagas), com paginação.
        Cobranças canceladas não são incluídas. Ordenação: **Atrasado** primeiro, depois **Pendente**,
        depois demais status; dentro de cada grupo, por data de vencimento (mais recente primeiro).

        Use os mesmos `studentId` e `dependentId` que em `GET /schools/students/{studentId}` (ficha do aluno).
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: studentId
          required: true
          schema:
            type: string
            format: uuid
          description: UUID do aluno matriculado ou do dependente (ou do responsável se usar `dependentId`).
        - in: query
          name: dependentId
          required: false
          schema:
            type: string
            format: uuid
          description: Opcional. Quando informado, `studentId` no path deve ser o UUID do responsável.
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 20
          description: Tamanho da página.
        - in: query
          name: offset
          required: false
          schema:
            type: integer
            format: int32
            minimum: 0
            default: 0
          description: Deslocamento para paginação.
      responses:
        '200':
          description: Lista paginada de cobranças.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchoolStudentPaidChargesListResponse'
        '403':
          description: Usuário não autorizado ou sem contexto de escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Aluno não encontrado ou não vinculado à escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/students/{studentId}:
    get:
      tags:
        - Schools
      summary: Obter detalhes completos de um aluno
      description: |
        Retorna os detalhes completos de um aluno vinculado à escola, incluindo:
        - Dados do aluno (nome, email, telefone, CPF, data de nascimento)
        - Dados do responsável (se o aluno for um dependente)
        - Lista de cursos e turmas em que está matriculado na escola

        As cobranças (pendentes e pagas) estão em `GET /schools/students/{studentId}/paid-charges` (paginado)
        
        **Importante:** A rota só retorna dados se o aluno estiver vinculado à escola através de matrículas ativas.

        Na listagem (`GET /schools/students`), use o campo **`detailsStudentId`** no path desta rota para abrir a ficha do aluno matriculado (para matrícula de dependente, é o UUID do dependente; `student.id` na listagem é sempre o titular).

        Alternativa: `studentId` = UUID do responsável e query **`dependentId`** = UUID do dependente (mesmo efeito que usar só o UUID do dependente em `studentId`).
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: studentId
          required: true
          schema:
            type: string
            format: uuid
          description: UUID do aluno matriculado ou do dependente (preferir `detailsStudentId` da listagem). Com `dependentId` na query, deve ser o UUID do responsável.
        - in: query
          name: dependentId
          required: false
          schema:
            type: string
            format: uuid
          description: Opcional. Quando informado, `studentId` no path deve ser o UUID do responsável e este parâmetro o UUID do dependente cujos detalhes se deseja.
      responses:
        '200':
          description: Detalhes do aluno encontrados.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchoolStudentDetailsResponse'
        '403':
          description: Usuário não autorizado ou sem contexto de escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Aluno não encontrado ou não está vinculado a esta escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade de detalhes do aluno não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/student-levels:
    get:
      tags:
        - Schools
      summary: Listar níveis (faixas/graus) da escola
      description: |
        Retorna o catálogo de níveis configurados para a escola autenticada, ordenados por `sortOrder`.
        Usado para promoções de matrícula e certificados. Requer persona **SCHOOL** (contexto da escola no JWT).
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de níveis da escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchoolStudentLevelsListResponse'
        '403':
          description: Usuário não autorizado ou sem contexto de escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
        - Schools
      summary: Criar nível da escola
      description: |
        Cadastra um nível no catálogo da escola. `sortOrder` deve ser **único por escola**;
        `templateCode` é opcional e também único por escola quando informado.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSchoolStudentLevelInput'
      responses:
        '201':
          description: Nível criado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchoolStudentLevel'
        '400':
          description: Validação ou conflito de unicidade (`sortOrder` / `templateCode`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado ou sem contexto de escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/student-levels/reorder:
    put:
      tags:
        - Schools
      summary: Reordenar níveis da escola
      description: |
        Atualiza `sortOrder` de **todos** os níveis da escola em uma única operação.
        Body: `{ "levels": [{ "id": "uuid", "sortOrder": 0 }, ...] }` (lista completa, ordens únicas).
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - levels
              properties:
                levels:
                  type: array
                  items:
                    type: object
                    required:
                      - id
                      - sortOrder
                    properties:
                      id:
                        type: string
                        format: uuid
                      sortOrder:
                        type: integer
                        minimum: 0
      responses:
        '200':
          description: Níveis reordenados.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchoolStudentLevelsListResponse'
        '400':
          description: Validação (lista incompleta ou sortOrder duplicado).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/student-levels/{levelId}:
    put:
      tags:
        - Schools
      summary: Editar nível da escola
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: levelId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSchoolStudentLevelInput'
      responses:
        '200':
          description: Nível atualizado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchoolStudentLevel'
        '404':
          description: Nível não encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Schools
      summary: Remover nível da escola
      description: |
        Remove o nível se **não** houver matrículas com esse nível atual ou histórico de promoções referenciando-o.
        Erro `SCHOOL_STUDENT_LEVEL_IN_USE` quando houver associações.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: levelId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Nível removido.
        '404':
          description: Nível não encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Nível em uso (alunos ou histórico).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/certificate-templates:
    get:
      tags:
        - Schools
      summary: Listar templates de certificado da escola
      description: |
        Retorna os modelos de certificado configurados para a escola (`logicalTemplateId` único por escola).
        Requer persona **SCHOOL**.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de templates.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchoolCertificateTemplatesListResponse'
        '403':
          description: Usuário não autorizado ou sem contexto de escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
        - Schools
      summary: Criar template de certificado
      description: |
        Cadastra um modelo de certificado. `layoutConfig` é JSON livre para evolução de layout sem alterar schema.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSchoolCertificateTemplateInput'
      responses:
        '201':
          description: Template criado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchoolCertificateTemplate'
        '400':
          description: Validação ou `logicalTemplateId` duplicado na escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado ou sem contexto de escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/enrollments/{enrollmentId}/timeline:
    get:
      tags:
        - Schools
      summary: Timeline agregada da matrícula (escola)
      description: |
        Retorna eventos da matrícula em ordem cronológica, agregando matrícula, promoções de nível,
        certificados e marcos customizados (`enrollment_timeline_events`).

        **Visibilidade da escola:** apenas eventos entre `enrolledAt` e o encerramento da matrícula
        (`updatedAt` quando status `CANCELLED` ou `COMPLETED`). Eventos fora desse intervalo não são retornados.

        Paginação via `limit` (1–100, padrão 30), `offset` e `order` (`asc` ou `desc`, padrão `asc`).
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: enrollmentId
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 30
        - in: query
          name: offset
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - in: query
          name: order
          required: false
          schema:
            type: string
            enum:
              - asc
              - desc
            default: asc
      responses:
        '200':
          description: Timeline paginada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnrollmentTimelinePageResponse'
        '403':
          description: Usuário não autorizado ou sem contexto de escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Matrícula não encontrada nesta escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/enrollments/{enrollmentId}/progress:
    get:
      tags:
        - Schools
      summary: Visão de progresso da matrícula
      description: |
        Retorna nível atual, histórico de promoções e eventos de timeline da matrícula na escola autenticada.
        O nível é **por matrícula**, não global ao aluno. Use `timelineLimit` para limitar eventos (padrão 50, máx. 200).
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: enrollmentId
          required: true
          schema:
            type: string
            format: uuid
          description: UUID da matrícula.
        - in: query
          name: timelineLimit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
          description: Quantidade máxima de eventos de timeline retornados.
      responses:
        '200':
          description: Visão consolidada do progresso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnrollmentProgressOverview'
        '403':
          description: Usuário não autorizado ou sem contexto de escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Matrícula não encontrada nesta escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/enrollments/{enrollmentId}/promotions:
    get:
      tags:
        - Schools
      summary: Histórico de promoções da matrícula
      description: |
        Retorna promoções da matrícula em ordem cronológica (`order=asc` padrão).
        Inclui certificado vinculado (se houver) com `status` PENDING ou GENERATED.
        Requer matrícula da escola autenticada.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: enrollmentId
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: order
          schema:
            type: string
            enum:
              - asc
              - desc
            default: asc
      responses:
        '200':
          description: Histórico de promoções.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnrollmentPromotionsListResponse'
        '404':
          description: Matrícula não encontrada nesta escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
        - Schools
      summary: Registrar promoção de nível na matrícula
      description: |
        Registra uma promoção e atualiza o nível atual da matrícula (`currentSchoolStudentLevelId`).
        Somente matrículas **ACTIVE**. `toLevelId` obrigatório.
        Com `issueCertificate: true`, exige `certificateTemplateId` e cria certificado **PENDING** (PDF gerado sob demanda no app).
        Registra evento na timeline da matrícula.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: enrollmentId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecordEnrollmentLevelPromotionInput'
      responses:
        '201':
          description: Promoção registrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecordEnrollmentLevelPromotionResponse'
        '400':
          description: Erro de validação.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado ou sem contexto de escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Matrícula ou nível não encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/enrollments/{enrollmentId}/timeline-events:
    post:
      tags:
        - Schools
      summary: Adicionar marco customizado na timeline da matrícula
      description: |
        Insere um marco customizado em `enrollment_timeline_events`. O `eventType` padrão é `CUSTOM_MILESTONE`
        (subtipos opcionais podem ir em `payload`). `occurredAt` é opcional (ISO-8601); se omitido, usa a hora do servidor.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: enrollmentId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppendEnrollmentTimelineEventInput'
      responses:
        '201':
          description: Evento criado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppendEnrollmentTimelineEventResponse'
        '400':
          description: Erro de validação.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado ou sem contexto de escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Matrícula não encontrada nesta escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/enrollments/{enrollmentId}/promotions/{promotionId}/certificates:
    post:
      tags:
        - Schools
      summary: Registrar certificado emitido para uma promoção
      description: |
        Associa um certificado a uma promoção já registrada. **No máximo um** certificado por promoção.
        `documentUrl` pode ser `null` até o arquivo estar disponível.
      security:
