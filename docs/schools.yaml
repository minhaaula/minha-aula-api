paths:
  /schools/login:
    post:
      tags:
        - Schools
      summary: Autenticar uma escola
      description: |
        Autentica uma escola e retorna um token de acesso. A resposta inclui informações sobre o status do onboarding (KYC):
        - `onboardingCompleted`: indica se o processo de onboarding foi finalizado (true quando a escola tem accountId e accountApiKey)
        - `onboardingUrl`: link para completar o onboarding (retornado apenas quando onboardingCompleted é false)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SchoolLoginInput'
      responses:
        '200':
          description: Login realizado com sucesso. Retorna token de acesso e informações sobre o status do onboarding.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchoolLoginResponse'
        '400':
          description: Erro de validação ou credenciais inválidas.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/password/request:
    post:
      tags:
        - Schools
      summary: Solicitar reset de senha
      description: Envia um token de reset de senha para o email da escola
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
                  description: Email do proprietário da escola
                  example: owner@escola.com
      responses:
        '200':
          description: Solicitação processada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Se o email estiver cadastrado, você receberá um link para redefinir sua senha.
                  token:
                    type: string
                    description: Token gerado (apenas em desenvolvimento)
                    example: abc123def456
        '400':
          description: Erro de validação
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/password/reset:
    post:
      tags:
        - Schools
      summary: Resetar senha com token
      description: Redefine a senha da escola usando o token recebido
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
                - newPassword
              properties:
                token:
                  type: string
                  description: Token recebido no email
                  example: abc123def456
                newPassword:
                  type: string
                  format: password
                  description: Nova senha (mínimo 6 caracteres)
                  example: novaSenha123
      responses:
        '200':
          description: Senha redefinida com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Senha redefinida com sucesso
        '400':
          description: Token inválido ou senha inválida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/password/validate:
    post:
      tags:
        - Schools
      summary: Validar token de reset de senha
      description: Verifica se um token de reset de senha é válido e retorna informações sobre ele
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
              properties:
                token:
                  type: string
                  description: Token a ser validado
                  example: abc123def456
      responses:
        '200':
          description: Resultado da validação
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                    description: Indica se o token é válido
                    example: true
                  email:
                    type: string
                    format: email
                    description: Email associado ao token (apenas se válido)
                    example: owner@escola.com
                  expiresAt:
                    type: string
                    format: date-time
                    description: Data de expiração do token (apenas se válido)
                    example: 2025-11-17T10:00:00Z
  /schools/password:
    patch:
      tags:
        - Schools
      summary: Alterar senha da escola logada
      description: Permite que uma escola autenticada altere sua própria senha
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - currentPassword
                - newPassword
              properties:
                currentPassword:
                  type: string
                  format: password
                  description: Senha atual da escola
                  example: senhaAtual123
                newPassword:
                  type: string
                  format: password
                  description: Nova senha (mínimo 6 caracteres)
                  example: novaSenha456
      responses:
        '204':
          description: Senha alterada com sucesso
        '401':
          description: Não autenticado ou senha atual inválida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools:
    post:
      tags:
        - Schools
      summary: Criar uma nova escola
      description: |
        Cria uma nova escola e automaticamente cria uma subconta no Asaas para processamento de pagamentos.
        O sistema busca o link de onboarding (KYC) e retorna no campo `kycUrl` para que o frontend possa
        redirecionar o usuário para completar a verificação de identidade.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSchoolInput'
      responses:
        '201':
          description: Escola criada com sucesso. O campo `kycUrl` contém o link para completar o KYC no Asaas.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchoolResponse'
              examples:
                default:
                  summary: Escola criada com link de KYC
                  value:
                    id: "a585a342-650a-4ab7-a606-07ae09bb72e1"
                    name: "Escola do Futuro"
                    email: "contato@escoladofuturo.com.br"
                    phone: "11987654321"
                    cnpj: "12345678000190"
                    addresses: []
                    createdAt: "2024-07-15T10:00:00.000Z"
                    ownerUserId: "9f17b6f3-7af8-45be-8f4a-4d982f5a9f0c"
                    ownerName: "Maria Silva"
                    ownerCpf: "12345678901"
                    ownerEmail: "diretoria@escoladofuturo.com.br"
                    incomeValue: 50000
                    bankAccounts: []
                    links:
                      facebook: null
                      instagram: null
                      tiktok: null
                      youtube: null
                      site: null
                    images: []
                    isOverdue: false
                    kycUrl: "https://beta.cadastro.io/c33ef9ae605f350c052be72ab094d0b7"
        '400':
          description: Erro de validação.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/students:
    get:
      tags:
        - Schools
      summary: Listar alunos matriculados na escola
      description: Retorna as matrículas ativas com os dados do aluno, dependente (quando existir), curso e turma.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: name
          required: false
          schema:
            type: string
          description: Filtrar alunos cujo nome (ou do dependente) contenha o valor informado (case insensitive).
        - in: query
          name: courseId
          required: false
          schema:
            type: string
            format: uuid
          description: Filtrar matrículas vinculadas a um curso específico.
        - in: query
          name: classId
          required: false
          schema:
            type: string
            format: uuid
          description: Filtrar matrículas de uma turma específica.
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
          description: 'Número máximo de resultados a retornar (padrão: 50, máximo: 100)'
        - in: query
          name: offset
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
          description: 'Número de resultados a pular para paginação (padrão: 0)'
      responses:
        '200':
          description: Lista de alunos matriculados na escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchoolStudentsResponse'
        '400':
          description: Erro na requisição.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado ou sem contexto de escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade de listagem de alunos não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/students/directory/{cpf}:
    get:
      tags:
        - Schools
      summary: Buscar aluno ou dependente por CPF
      description: Permite que escolas localizem um aluno ou dependente pelo CPF. Quando o CPF pertence a um dependente, os dados do responsável são incluídos na resposta.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: cpf
          required: true
          schema:
            type: string
            example: '39588620805'
          description: CPF do aluno ou dependente a ser localizado (11 dígitos).
      responses:
        '200':
          description: Dados do aluno ou dependente encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentDirectoryResponse'
        '400':
          description: CPF inválido. Deve conter 11 dígitos.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado ou sem contexto de escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Aluno ou dependente não encontrado com o CPF informado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade de busca de alunos não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/students/{studentId}:
    get:
      tags:
        - Schools
      summary: Obter detalhes completos de um aluno
      description: |
        Retorna os detalhes completos de um aluno vinculado à escola, incluindo:
        - Dados do aluno (nome, email, telefone, CPF, data de nascimento)
        - Dados do responsável (se o aluno for um dependente)
        - Lista de cursos e turmas em que está matriculado na escola
        - Histórico de mensalidades pagas na escola
        
        **Importante:** A rota só retorna dados se o aluno estiver vinculado à escola através de matrículas ativas.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: studentId
          required: true
          schema:
            type: string
            format: uuid
          description: ID do aluno ou dependente
      responses:
        '200':
          description: Detalhes do aluno encontrados.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchoolStudentDetailsResponse'
        '403':
          description: Usuário não autorizado ou sem contexto de escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Aluno não encontrado ou não está vinculado a esta escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade de detalhes do aluno não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/payments:
    get:
      tags:
        - Schools
      summary: Listar pagamentos dos alunos da escola
      description: Retorna as cobranças financeiras de todos os alunos matriculados na escola, filtradas por mês e ano (obrigatório), com informações do aluno, dependente (quando existir), curso e turma.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: month
          required: true
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 12
          description: Mês para filtrar os pagamentos (1-12).
        - in: query
          name: year
          required: true
          schema:
            type: integer
            format: int32
            minimum: 2000
            maximum: 3000
          description: Ano para filtrar os pagamentos.
        - in: query
          name: studentName
          required: false
          schema:
            type: string
          description: Filtrar pagamentos de alunos cujo nome (ou do dependente) contenha o valor informado.
        - in: query
          name: classId
          required: false
          schema:
            type: string
            format: uuid
          description: Filtrar pagamentos vinculados a uma turma específica.
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum: [PENDING_SYNC, OPEN, PAID, OVERDUE, CANCELLED, FAILED]
          description: Filtrar pagamentos por status da cobrança.
      responses:
        '200':
          description: Lista de pagamentos encontrados.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchoolPaymentsResponse'
        '400':
          description: Erro na requisição.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado ou sem contexto de escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade de listagem de pagamentos não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/payments/consolidated:
    get:
      tags:
        - Schools
      summary: Consolidado de pagamentos dos estudantes da escola
      description: |
        Retorna os totais consolidados de mensalidades dos alunos da escola para um mês e ano específicos.
        - `pending`, `paid` e `overdue` são quantidades (número de itens)
        - `totalToReceive` e `totalReceived` são valores monetários em centavos
        - `totalToReceive` inclui pendentes e vencidos
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: month
          required: true
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 12
          description: Mês para consolidar os pagamentos (1-12).
        - in: query
          name: year
          required: true
          schema:
            type: integer
            format: int32
            minimum: 2000
            maximum: 3000
          description: Ano para consolidar os pagamentos.
      responses:
        '200':
          description: Totais consolidados de pagamentos.
          content:
            application/json:
              schema:
                type: object
                properties:
                  pending:
                    type: integer
                    format: int32
                    description: Quantity of pending charges. Includes OPEN or PENDING_SYNC status with due date not yet passed.
                    example: 15
                  paid:
                    type: integer
                    format: int32
                    description: Quantity of paid charges. Status PAID.
                    example: 45
                  overdue:
                    type: integer
                    format: int32
                    description: Quantity of overdue charges. Includes OVERDUE status or pending status with past due date.
                    example: 5
                  totalToReceive:
                    type: integer
                    format: int64
                    description: Total to receive in cents. Sum of pending and overdue values.
                    example: 200000
                  totalReceived:
                    type: integer
                    format: int64
                    description: Total received in cents. Sum of paid charges values.
                    example: 450000
                required:
                  - pending
                  - paid
                  - overdue
                  - totalToReceive
                  - totalReceived
        '400':
          description: Erro na requisição. Mês ou ano inválidos ou não fornecidos.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado ou sem contexto de escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade de consolidação de pagamentos não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/payments/paid:
    get:
      tags:
        - Schools
      summary: Listar pagamentos pagos dos alunos da escola
      description: |
        Retorna apenas os pagamentos com status PAID de todos os alunos matriculados na escola.
        Não requer filtro de mês e ano, permitindo buscar todos os pagamentos pagos.
        Suporta paginação e filtro opcional por nome do aluno.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: studentName
          required: false
          schema:
            type: string
          description: Filtrar pagamentos de alunos cujo nome (ou do dependente) contenha o valor informado.
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 50
          description: Número máximo de resultados por página (máximo 100).
        - in: query
          name: offset
          required: false
          schema:
            type: integer
            format: int32
            minimum: 0
            default: 0
          description: Número de resultados a serem pulados (para paginação).
      responses:
        '200':
          description: Lista paginada de pagamentos pagos encontrados.
          content:
            application/json:
              schema:
                type: object
                required:
                  - payments
                  - pagination
                properties:
                  payments:
                    type: array
                    items:
                      $ref: '#/components/schemas/SchoolPaymentRecord'
                  pagination:
                    type: object
                    required:
                      - total
                      - limit
                      - offset
                      - totalPage
                      - currentPage
                      - hasMore
                    properties:
                      total:
                        type: integer
                        format: int32
                        description: Total de resultados encontrados (após aplicar filtros)
                      limit:
                        type: integer
                        format: int32
                        description: Número máximo de resultados solicitados
                      offset:
                        type: integer
                        format: int32
                        description: Número de resultados pulados
                      totalPage:
                        type: integer
                        format: int32
                        description: Total de páginas disponíveis
                      currentPage:
                        type: integer
                        format: int32
                        description: Página atual (iniciando em 1)
                      hasMore:
                        type: boolean
                        description: Indica se há mais resultados disponíveis além dos retornados
        '400':
          description: Erro na requisição.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado ou sem contexto de escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade de listagem de pagamentos pagos não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/finance/charges:
    post:
      tags:
        - Schools
      summary: Criar cobrança financeira para aluno
      description: Registra uma cobrança para um aluno ou dependente da escola, vinculando-a ao curso e opcionalmente à turma correspondente.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSchoolChargeInput'
      responses:
        '201':
          description: Cobrança registrada com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchoolChargeResponse'
        '400':
          description: Dados inválidos para geração da cobrança.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário autenticado sem permissão para a escola informada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Aluno, dependente ou curso não encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/finance/summary:
    get:
      tags:
        - Schools
      summary: Obter resumo financeiro da escola
      description: Retorna informações financeiras da escola, incluindo saques disponíveis (limite de 30), saldo disponível e total recebido no mês atual. Requer persona SCHOOL.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Resumo financeiro da escola.
          content:
            application/json:
              schema:
                type: object
                properties:
                  availableWithdrawals:
                    type: array
                    description: Lista dos últimos 30 pagamentos pagos disponíveis para saque, ordenados por data de pagamento (mais recentes primeiro)
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                          description: ID da cobrança
                        netAmount:
                          type: number
                          description: Valor líquido em reais
                        netAmountCents:
                          type: integer
                          format: int64
                          description: Valor líquido em centavos
                        paidAt:
                          type: string
                          format: date
                          description: Data do pagamento
                        description:
                          type: string
                          nullable: true
                          description: Descrição da cobrança
                        studentName:
                          type: string
                          description: Nome do aluno ou dependente
                        courseName:
                          type: string
                          description: Nome do curso
                      required:
                        - id
                        - netAmount
                        - netAmountCents
                        - paidAt
                        - studentName
                        - courseName
                  availableBalance:
                    type: number
                    description: Saldo disponível total em reais (soma de todos os pagamentos pagos)
                  availableBalanceCents:
                    type: integer
                    format: int64
                    description: Saldo disponível total em centavos
                  totalReceivedThisMonth:
                    type: number
                    description: Total recebido no mês atual em reais
                  totalReceivedThisMonthCents:
                    type: integer
                    format: int64
                    description: Total recebido no mês atual em centavos
                required:
                  - availableWithdrawals
                  - availableBalance
                  - availableBalanceCents
                  - totalReceivedThisMonth
                  - totalReceivedThisMonthCents
        '401':
          description: Não autorizado. Token inválido ou ausente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado. Requer persona SCHOOL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade de resumo financeiro não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/finance/balance:
    get:
      tags:
        - Schools
      summary: Obter saldo da escola no Asaas
      description: |
        Retorna o saldo atual da conta Asaas da escola, incluindo saldo total, saldo disponível e saldo bloqueado.
        
        **Requisitos:**
        - A escola deve ter uma conta Asaas configurada (accountId e accountApiKey)
        - Se a escola não tiver conta Asaas, retorna valores zerados
        
        **Nota:** O saldo é buscado diretamente da API do Asaas. Se a API do Asaas não retornar o saldo, 
        os valores serão zerados e a escola precisará consultar o saldo manualmente no painel do Asaas.
        
        Requer persona SCHOOL.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Saldo da escola retornado com sucesso.
          content:
            application/json:
              schema:
                type: object
                properties:
                  balance:
                    type: number
                    description: Saldo total em reais
                    example: 1500.50
                  balanceCents:
                    type: integer
                    format: int64
                    description: Saldo total em centavos
                    example: 150050
                  availableBalance:
                    type: number
                    description: Saldo disponível para saque em reais
                    example: 1500.50
                  availableBalanceCents:
                    type: integer
                    format: int64
                    description: Saldo disponível para saque em centavos
                    example: 150050
                  blockedBalance:
                    type: number
                    nullable: true
                    description: Saldo bloqueado em reais (quando aplicável)
                    example: 0.00
                  blockedBalanceCents:
                    type: integer
                    format: int64
                    nullable: true
                    description: Saldo bloqueado em centavos (quando aplicável)
                    example: 0
                  accountId:
                    type: string
