                        id:
                          type: string
                          format: uuid
                          description: ID do saque
                        amount:
                          type: number
                          description: Valor do saque em reais
                        amountCents:
                          type: integer
                          format: int64
                          description: Valor do saque em centavos
                        bankName:
                          type: string
                          description: Nome do banco
                        bankAgency:
                          type: string
                          description: Agência bancária
                        bankAccount:
                          type: string
                          description: Número da conta bancária
                        pixKey:
                          type: string
                          nullable: true
                          description: Chave PIX utilizada (quando aplicável)
                        status:
                          type: string
                          enum: [PROCESSING, COMPLETED, CANCELLED]
                          description: Status do saque (processando, completo, cancelado)
                        createdAt:
                          type: string
                          format: date
                          description: Data de criação do saque
                        processedAt:
                          type: string
                          format: date
                          nullable: true
                          description: Data de processamento do saque (quando completo)
                        cancelledAt:
