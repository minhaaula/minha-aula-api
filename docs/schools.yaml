paths:
  /schools/login:
    post:
      tags:
        - Schools
      summary: Autenticar uma escola
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SchoolLoginInput'
      responses:
        '200':
          description: Login realizado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchoolLoginResponse'
        '400':
          description: Erro de validação ou credenciais inválidas.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools:
    post:
      tags:
        - Schools
      summary: Criar uma nova escola
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSchoolInput'
      responses:
        '201':
          description: Escola criada com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchoolResponse'
        '400':
          description: Erro de validação.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/courses:
    get:
      tags:
        - Schools
      summary: Listar cursos da escola
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de cursos encontrados.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseListResponse'
        '501':
          description: Funcionalidade de listagem de cursos não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
        - Schools
      summary: Criar um curso para uma escola
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCourseInput'
      responses:
        '201':
          description: Curso criado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseResponse'
        '400':
          description: Erro de validação ou escola não encontrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/courses/{courseId}:
    get:
      tags:
        - Schools
      summary: Obter detalhes de um curso da escola
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: courseId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Curso encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseResponse'
        '404':
          description: Curso não encontrado para a escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade de consulta de curso não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - Schools
      summary: Atualizar um curso da escola
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: courseId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCourseInput'
      responses:
        '200':
          description: Curso atualizado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseResponse'
        '400':
          description: Dados inválidos ou curso não encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Curso não encontrado para a escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade de atualização de curso não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/courses/{courseId}/classes:
    get:
      tags:
        - Schools
      summary: Listar turmas de um curso
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: courseId
          required: true
          schema:
            type: string
            format: uuid
          description: Identificador do curso.
      responses:
        '200':
          description: Lista de turmas encontradas.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseClassListResponse'
        '404':
          description: Curso não encontrado para a escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade de listagem de turmas não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
        - Schools
      summary: Criar uma turma para um curso
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: courseId
          required: true
          schema:
            type: string
            format: uuid
          description: Identificador do curso.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCourseClassInput'
      responses:
        '201':
          description: Turma criada com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseClassResponse'
        '400':
          description: Erro de validação ou curso não encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/courses/{courseId}/classes/{classId}:
    get:
      tags:
        - Schools
      summary: Obter detalhes de uma turma
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: courseId
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: classId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Turma encontrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseClassResponse'
        '404':
          description: Turma não encontrada para a escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade de consulta de turma não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/courses/{courseId}/classes/{classId}/sessions:
    post:
      tags:
        - Schools
      summary: Agendar uma sessão de aula para a turma
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: courseId
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: classId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateClassSessionInput'
      responses:
        '201':
          description: Sessão criada com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassSessionResponse'
        '400':
          description: Erro de validação ou conflito de agenda.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      tags:
        - Schools
      summary: Listar sessões de aula de uma turma
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: courseId
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: classId
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: from
          required: true
          schema:
            type: string
            format: date-time
        - in: query
          name: to
          required: true
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Lista de sessões agendadas.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassSessionsResponse'
        '400':
          description: Erro de validação ou turma não encontrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/sessions:
    get:
      tags:
        - Schools
      summary: Listar sessões de aula da escola
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: from
          required: true
          schema:
            type: string
            format: date-time
        - in: query
          name: to
          required: true
          schema:
            type: string
            format: date-time
        - in: query
          name: courseClassId
          required: false
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Lista de sessões agendadas.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassSessionsResponse'
        '400':
          description: Erro de validação.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/plans:
    get:
      tags:
        - Schools
      summary: Listar planos disponíveis para escolas
      description: Retorna todos os planos de assinatura ativos que podem ser contratados pelas escolas.
      responses:
        '200':
          description: Planos disponíveis encontrados.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionPlanListResponse'
        '501':
          description: Funcionalidade de planos não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/me:
    get:
      tags:
        - Schools
      summary: Consultar dados completos da escola autenticada
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Dados completos da escola encontrados.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchoolResponse'
        '404':
          description: Escola não encontrada para o usuário autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade de consulta de escola não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - Schools
      summary: Atualizar dados da escola autenticada
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSchoolInput'
      responses:
        '200':
          description: Dados da escola atualizados com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchoolResponse'
        '400':
          description: Dados inválidos para atualização da escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Escola não encontrada para o usuário autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade de atualização de escola não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/categories:
    get:
      tags:
        - Schools
      summary: Listar categorias e subcategorias disponíveis
      description: Retorna as categorias de cursos e suas respectivas subcategorias para auxiliar na criação de cursos.
      responses:
        '200':
          description: Categorias encontradas.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryListResponse'
        '501':
          description: Funcionalidade de categorias não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/plan:
    post:
      tags:
        - Schools
      summary: Selecionar plano para a escola
      description: Atualiza o plano de assinatura da escola autenticada. A primeira fatura vence no próximo dia útil e as demais seguem o ciclo de cobrança do plano.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignSchoolPlanInput'
      responses:
        '200':
          description: Plano atribuído com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchoolPlanResponse'
        '400':
          description: Dados inválidos ou plano indisponível.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade de planos não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      tags:
        - Schools
      summary: Consultar plano ativo da escola
      description: Retorna o plano de assinatura vigente, status de pagamento e datas de cobrança.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Plano ativo encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchoolPlanResponse'
        '404':
          description: Nenhum plano ativo configurado para a escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade de planos não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/plan/invoices:
    post:
      tags:
        - Schools
      summary: Gerar fatura do plano vigente
      description: Emite uma nova fatura para o plano ativo da escola. Caso já exista uma fatura para a mesma data de vencimento, ela é reutilizada.
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IssueSchoolPlanInvoiceInput'
      responses:
        '201':
          description: Fatura criada com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IssueSchoolPlanInvoiceResponse'
        '200':
          description: Fatura já existente reaproveitada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IssueSchoolPlanInvoiceResponse'
        '400':
          description: Solicitação inválida ou plano inexistente para a escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade de faturamento não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      tags:
        - Schools
      summary: Listar faturas do plano
      description: Retorna todas as faturas associadas ao plano ativo da escola autenticada.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Faturas encontradas.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchoolPlanInvoicesResponse'
        '501':
          description: Funcionalidade de faturamento não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/sessions/{sessionId}:
    delete:
      tags:
        - Schools
      summary: Cancelar uma sessão de aula
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: sessionId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Sessão cancelada com sucesso.
        '400':
          description: Sessão não encontrada ou inválida.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
