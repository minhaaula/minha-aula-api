                  summary: Exemplo de resposta do dashboard
                  value:
                    summary:
                      totalStudents: 12
                      totalClasses: 5
                      totalCourses: 4
                      currentMonthRevenue: 2450.00
                      currentMonthRevenueCents: 245000
                      revenueForecast: 3000.00
