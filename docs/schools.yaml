paths:
  /schools/login:
    post:
      tags:
        - Schools
      summary: Autenticar uma escola
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SchoolLoginInput'
      responses:
        '200':
          description: Login realizado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchoolLoginResponse'
        '400':
          description: Erro de validação ou credenciais inválidas.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools:
    post:
      tags:
        - Schools
      summary: Criar uma nova escola
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSchoolInput'
      responses:
        '201':
          description: Escola criada com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchoolResponse'
        '400':
          description: Erro de validação.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/courses:
    post:
      tags:
        - Schools
      summary: Criar um curso para uma escola
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCourseInput'
      responses:
        '201':
          description: Curso criado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseResponse'
        '400':
          description: Erro de validação ou escola não encontrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/courses/{courseId}/classes:
    post:
      tags:
        - Schools
      summary: Criar uma turma para um curso
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: courseId
          required: true
          schema:
            type: string
            format: uuid
          description: Identificador do curso.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCourseClassInput'
      responses:
        '201':
          description: Turma criada com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseClassResponse'
        '400':
          description: Erro de validação ou curso não encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/courses/{courseId}/classes/{classId}/sessions:
    post:
      tags:
        - Schools
      summary: Agendar uma sessão de aula para a turma
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: courseId
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: classId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateClassSessionInput'
      responses:
        '201':
          description: Sessão criada com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassSessionResponse'
        '400':
          description: Erro de validação ou conflito de agenda.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      tags:
        - Schools
      summary: Listar sessões de aula de uma turma
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: courseId
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: classId
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: from
          required: true
          schema:
            type: string
            format: date-time
        - in: query
          name: to
          required: true
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Lista de sessões agendadas.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassSessionsResponse'
        '400':
          description: Erro de validação ou turma não encontrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/sessions:
    get:
      tags:
        - Schools
      summary: Listar sessões de aula da escola
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: from
          required: true
          schema:
            type: string
            format: date-time
        - in: query
          name: to
          required: true
          schema:
            type: string
            format: date-time
        - in: query
          name: courseClassId
          required: false
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Lista de sessões agendadas.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassSessionsResponse'
        '400':
          description: Erro de validação.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/sessions/{sessionId}:
    delete:
      tags:
        - Schools
      summary: Cancelar uma sessão de aula
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: sessionId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Sessão cancelada com sucesso.
        '400':
          description: Sessão não encontrada ou inválida.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
