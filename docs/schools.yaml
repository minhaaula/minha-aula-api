              properties:
                otpChallengeId:
                  type: string
                  format: uuid
                  description: ID do desafio OTP já validado para confirmar a exclusão da conta bancária
      responses:
        '204':
          description: Conta bancária removida com sucesso.
        '400':
          description: Conta não encontrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
