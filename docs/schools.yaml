            format: uuid
        - in: path
          name: promotionId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IssueEnrollmentPromotionCertificateInput'
      responses:
        '201':
          description: Certificado registrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IssueEnrollmentPromotionCertificateResponse'
        '400':
          description: Validação ou certificado já existente para a promoção.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado ou sem contexto de escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Matrícula, promoção ou template não encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/payments:
    get:
      tags:
        - Schools
      summary: Listar pagamentos dos alunos da escola
      description: Retorna as cobranças financeiras de todos os alunos matriculados na escola, filtradas por mês e ano (obrigatório), com informações do aluno, dependente (quando existir), curso e turma.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: month
          required: true
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 12
          description: Mês para filtrar os pagamentos (1-12).
        - in: query
          name: year
          required: true
          schema:
            type: integer
            format: int32
            minimum: 2000
            maximum: 3000
          description: Ano para filtrar os pagamentos.
        - in: query
          name: studentName
          required: false
          schema:
            type: string
          description: Filtrar pagamentos de alunos cujo nome (ou do dependente) contenha o valor informado.
        - in: query
          name: classId
          required: false
          schema:
            type: string
            format: uuid
          description: Filtrar pagamentos vinculados a uma turma específica.
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum: [PENDING_SYNC, OPEN, PAID, OVERDUE, CANCELLED, FAILED]
          description: Filtrar pagamentos por status da cobrança.
      responses:
        '200':
          description: Lista de pagamentos encontrados.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchoolPaymentsResponse'
        '400':
          description: Erro na requisição.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado ou sem contexto de escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade de listagem de pagamentos não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/payments/consolidated:
    get:
      tags:
        - Schools
      summary: Consolidado de pagamentos dos estudantes da escola
      description: |
        Retorna os totais consolidados de mensalidades dos alunos da escola para um mês e ano específicos.
        - `pending`, `paid` e `overdue` são quantidades (número de itens)
        - `totalToReceive` e `totalReceived` são valores monetários em centavos
        - `totalToReceive` inclui pendentes e vencidos
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: month
          required: true
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 12
          description: Mês para consolidar os pagamentos (1-12).
        - in: query
          name: year
          required: true
          schema:
            type: integer
            format: int32
            minimum: 2000
            maximum: 3000
          description: Ano para consolidar os pagamentos.
      responses:
        '200':
          description: Totais consolidados de pagamentos.
          content:
            application/json:
              schema:
                type: object
                properties:
                  pending:
                    type: integer
                    format: int32
                    description: Quantity of pending charges. Includes OPEN or PENDING_SYNC status with due date not yet passed.
                    example: 15
                  paid:
                    type: integer
                    format: int32
                    description: Quantity of paid charges. Status PAID.
                    example: 45
                  overdue:
                    type: integer
                    format: int32
                    description: Quantity of overdue charges. Includes OVERDUE status or pending status with past due date.
                    example: 5
                  totalToReceive:
                    type: integer
                    format: int64
                    description: Total to receive in cents. Sum of pending and overdue values.
                    example: 200000
                  totalReceived:
                    type: integer
                    format: int64
                    description: Total received in cents. Sum of paid charges values.
                    example: 450000
                required:
                  - pending
                  - paid
                  - overdue
                  - totalToReceive
                  - totalReceived
        '400':
          description: Erro na requisição. Mês ou ano inválidos ou não fornecidos.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado ou sem contexto de escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade de consolidação de pagamentos não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/payments/paid:
    get:
      tags:
        - Schools
      summary: Listar pagamentos pagos dos alunos da escola
      description: |
        Retorna apenas os pagamentos com status PAID de todos os alunos matriculados na escola,
        excluindo pagamentos dados como baixa manual pela escola (marcados como MANUAL).
        Inclui cobranças com método PIX ou BOLETO e registros antigos vinculados ao Asaas (asaasPaymentId).
        Não requer filtro de mês e ano, permitindo buscar todos os pagamentos pagos elegíveis.
        Suporta paginação e filtro opcional por nome do aluno.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: studentName
          required: false
          schema:
            type: string
          description: Filtrar pagamentos de alunos cujo nome (ou do dependente) contenha o valor informado.
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 50
          description: Número máximo de resultados por página (máximo 100).
        - in: query
          name: offset
          required: false
          schema:
            type: integer
            format: int32
            minimum: 0
            default: 0
          description: Número de resultados a serem pulados (para paginação).
      responses:
        '200':
          description: Lista paginada de pagamentos pagos encontrados.
          content:
            application/json:
              schema:
                type: object
                required:
                  - payments
                  - pagination
                properties:
                  payments:
                    type: array
                    items:
                      $ref: '#/components/schemas/SchoolPaymentRecord'
                  pagination:
                    type: object
                    required:
                      - total
                      - limit
                      - offset
                      - totalPage
                      - currentPage
                      - hasMore
                    properties:
                      total:
                        type: integer
                        format: int32
                        description: Total de resultados encontrados (após aplicar filtros)
                      limit:
                        type: integer
                        format: int32
                        description: Número máximo de resultados solicitados
                      offset:
                        type: integer
                        format: int32
                        description: Número de resultados pulados
                      totalPage:
                        type: integer
                        format: int32
                        description: Total de páginas disponíveis
                      currentPage:
                        type: integer
                        format: int32
                        description: Página atual (iniciando em 1)
                      hasMore:
                        type: boolean
                        description: Indica se há mais resultados disponíveis além dos retornados
        '400':
          description: Erro na requisição.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado ou sem contexto de escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade de listagem de pagamentos pagos não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/finance/charges:
    post:
      tags:
        - Schools
      summary: Criar cobrança financeira para aluno
      description: Registra uma cobrança para um aluno ou dependente da escola, vinculando-a ao curso e opcionalmente à turma correspondente.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSchoolChargeInput'
      responses:
        '201':
          description: Cobrança registrada com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchoolChargeResponse'
        '400':
          description: Dados inválidos para geração da cobrança.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário autenticado sem permissão para a escola informada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Aluno, dependente ou curso não encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/finance/charges/{chargeId}/pix:
    post:
      tags:
        - Schools
      summary: Gerar PIX para cobrança (mensalidade/matrícula)
      description: |
        Gera o PIX (Asaas) sob demanda para uma cobrança da escola (tipos permitidos: TUITION e ENROLLMENT).
        Se o PIX já tiver sido gerado anteriormente, retorna o PIX já existente.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: chargeId
          required: true
          schema:
            type: string
            format: uuid
          description: ID da cobrança
      responses:
        '200':
          description: PIX gerado (ou existente) retornado com sucesso.
          content:
            application/json:
              schema:
                type: object
                required:
                  - chargeId
                  - paymentProviderRef
                  - dueDate
                  - status
                  - amountCents
                  - discountCents
                  - netAmountCents
                  - courseName
                  - schoolLogo
                properties:
                  chargeId:
                    type: string
                    format: uuid
                  paymentProviderRef:
                    type: string
                    description: ID do pagamento/cobrança no provedor (Asaas)
                  pixQrCode:
                    type: string
                    nullable: true
                    description: QR code do PIX (base64/data URL), quando disponível
                  pixCopiaECola:
                    type: string
                    nullable: true
                    description: Código PIX copia-e-cola, quando disponível
                  invoiceUrl:
                    type: string
                    nullable: true
                    description: URL do invoice no provedor (quando disponível)
                  dueDate:
                    type: string
                    format: date-time
                  status:
                    type: string
                    enum: [PENDING_SYNC, FAILED, OPEN, OVERDUE, PAID, CANCELLED]
                  amountCents:
                    type: integer
                    format: int32
                    description: Valor nominal (bruto) em centavos
                  discountCents:
                    type: integer
                    format: int32
                    nullable: true
                    description: Valor do desconto em centavos, ou null
                  netAmountCents:
                    type: integer
                    format: int32
                    description: Valor líquido a pagar em centavos
                  courseName:
                    type: string
                  schoolLogo:
                    type: string
                    nullable: true
                    description: URL do logo da escola (ou null)
        '400':
          description: "Dados inválidos (ex.: status/tipo da cobrança não permite gerar PIX)."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Não autorizado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário autenticado sem permissão para a escola informada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Cobrança não encontrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/finance/charges/{chargeId}:
    delete:
      tags:
        - Schools
      summary: Excluir cobrança em aberto
      description: |
        Cancela uma cobrança da escola autenticada.
        Status permitidos: PENDING_SYNC, OPEN, OVERDUE, FAILED. Não permite cobrança já paga (`PAID` ou com `paidAt` preenchido) — retorna `400` com código `CHARGE_ALREADY_PAID`.
        Se existir `asaasPaymentId`, tenta remover a cobrança no Asaas antes do cancelamento local.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: chargeId
          required: true
          schema:
            type: string
            format: uuid
          description: ID da cobrança
      responses:
        '200':
          description: Cobrança cancelada.
          content:
            application/json:
              schema:
                type: object
                properties:
                  chargeId:
                    type: string
                    format: uuid
                  status:
                    type: string
                    enum: [CANCELLED]
                  cancelledAt:
                    type: string
                    format: date-time
                  alreadyCancelled:
                    type: boolean
                required:
                  - chargeId
                  - status
                  - cancelledAt
                  - alreadyCancelled
        '400':
          description: Cobrança paga ou status não permite exclusão.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Não autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário sem permissão de escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Cobrança não encontrada na escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/finance/charges/{chargeId}/mark-paid:
    post:
      tags:
        - Schools
      summary: Dar baixa em pagamento (marcar cobrança como paga)
      description: |
        Permite à escola dar baixa manual em uma cobrança do aluno, marcando-a como paga.
        A cobrança deve pertencer à escola do usuário autenticado.
        Se a cobrança tiver PIX ou boleto no Asaas, o pagamento é marcado como recebido no Asaas (receiveInCash).
        Payload: data (data do pagamento) e observacao (opcional).
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: chargeId
          required: true
          schema:
            type: string
            format: uuid
          description: ID da cobrança
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - data
              properties:
                data:
                  type: string
                  format: date
                  description: Data do pagamento (baixa)
                observacao:
                  type: string
                  maxLength: 500
                  nullable: true
                  description: Observação da baixa (opcional)
      responses:
        '200':
          description: Cobrança marcada como paga.
          content:
            application/json:
              schema:
                type: object
                properties:
                  chargeId:
                    type: string
                    format: uuid
                  status:
                    type: string
                    enum: [PAID]
                  paidAt:
                    type: string
                    format: date-time
                  observacao:
                    type: string
                    nullable: true
                required:
                  - chargeId
                  - status
                  - paidAt
                  - observacao
        '400':
          description: Cobrança cancelada ou status não permite baixa.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Não autorizado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Cobrança não pertence a esta escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Cobrança não encontrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/finance/summary:
    get:
      tags:
        - Schools
      summary: Obter resumo financeiro da escola
      description: Retorna informações financeiras da escola, incluindo saques disponíveis (limite de 30), saldo disponível e total recebido no mês atual. Requer persona SCHOOL.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Resumo financeiro da escola.
          content:
            application/json:
              schema:
                type: object
                properties:
                  availableWithdrawals:
                    type: array
                    description: Lista dos últimos 30 pagamentos pagos disponíveis para saque, ordenados por data de pagamento (mais recentes primeiro)
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                          description: ID da cobrança
                        netAmount:
                          type: number
                          description: Valor líquido em reais
                        netAmountCents:
                          type: integer
                          format: int64
                          description: Valor líquido em centavos
                        paidAt:
                          type: string
                          format: date
                          description: Data do pagamento
                        description:
                          type: string
                          nullable: true
                          description: Descrição da cobrança
                        studentName:
                          type: string
                          description: Nome do aluno ou dependente
                        courseName:
                          type: string
                          description: Nome do curso
                      required:
                        - id
                        - netAmount
                        - netAmountCents
                        - paidAt
                        - studentName
                        - courseName
                  availableBalance:
                    type: number
                    description: Saldo disponível total em reais (soma de todos os pagamentos pagos)
                  availableBalanceCents:
                    type: integer
                    format: int64
                    description: Saldo disponível total em centavos
                  totalReceivedThisMonth:
                    type: number
                    description: Total recebido no mês atual em reais
                  totalReceivedThisMonthCents:
                    type: integer
                    format: int64
