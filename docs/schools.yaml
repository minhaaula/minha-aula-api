                    summary:
                      totalStudents: 12
                      totalClasses: 5
                      totalCourses: 4
                      currentMonthRevenue: 2450.00
                      currentMonthRevenueCents: 245000
                      revenueForecast: 3000.00
                      revenueForecastCents: 300000
                      revenueChangePercentage: 8.2
                      pendingEnrollmentRequests: 2
                    overduePayments:
