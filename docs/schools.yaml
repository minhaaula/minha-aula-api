      description: |
        Remove uma conta bancária da escola autenticada.
        Requer um OTP previamente validado em `/schools/security/otp/verify` para a finalidade `BANK_ACCOUNT_CHANGE`.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: accountId
