  /schools/plan:
    post:
      tags:
        - Schools
      summary: Selecionar plano para a escola
      description: >-
        Atualiza o plano de assinatura da escola autenticada e gera uma fatura PIX para pagamento imediato.
        A resposta inclui os dados do PIX (QR Code, código copia e cola, ID da transação e data de vencimento)
        para que o usuário possa pagar o plano escolhido na hora. A data de vencimento é o mesmo dia da seleção.
        O plano fica em estado pendente até que a fatura seja paga com sucesso.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignSchoolPlanInput'
      responses:
        '200':
          description: Plano atribuído com sucesso. Retorna os dados do plano e a fatura PIX gerada para pagamento imediato.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssignSchoolPlanResponse'
        '400':
          description: Dados inválidos ou plano indisponível.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade de planos não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      tags:
        - Schools
      summary: Consultar plano ativo da escola
      description: Retorna o plano de assinatura vigente, status de pagamento e datas de cobrança.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Plano ativo encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchoolPlanResponse'
        '404':
          description: Nenhum plano ativo configurado para a escola.
          content:
            application/json:
              schema:
