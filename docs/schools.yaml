paths:
  /schools/login:
    post:
      tags:
        - Schools
      summary: Autenticar uma escola
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SchoolLoginInput'
      responses:
        '200':
          description: Login realizado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchoolLoginResponse'
        '400':
          description: Erro de validação ou credenciais inválidas.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/password/request:
    post:
      tags:
        - Schools
      summary: Solicitar reset de senha
      description: Envia um token de reset de senha para o email da escola
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
                  description: Email do proprietário da escola
                  example: owner@escola.com
      responses:
        '200':
          description: Solicitação processada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Se o email estiver cadastrado, você receberá um link para redefinir sua senha.
                  token:
                    type: string
                    description: Token gerado (apenas em desenvolvimento)
                    example: abc123def456
        '400':
          description: Erro de validação
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/password/reset:
    post:
      tags:
        - Schools
      summary: Resetar senha com token
      description: Redefine a senha da escola usando o token recebido
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
                - newPassword
              properties:
                token:
                  type: string
                  description: Token recebido no email
                  example: abc123def456
                newPassword:
                  type: string
                  format: password
                  description: Nova senha (mínimo 6 caracteres)
                  example: novaSenha123
      responses:
        '200':
          description: Senha redefinida com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Senha redefinida com sucesso
        '400':
          description: Token inválido ou senha inválida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/password/validate:
    post:
      tags:
        - Schools
      summary: Validar token de reset de senha
      description: Verifica se um token de reset de senha é válido e retorna informações sobre ele
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
              properties:
                token:
                  type: string
                  description: Token a ser validado
                  example: abc123def456
      responses:
        '200':
          description: Resultado da validação
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                    description: Indica se o token é válido
                    example: true
                  email:
                    type: string
                    format: email
                    description: Email associado ao token (apenas se válido)
                    example: owner@escola.com
                  expiresAt:
                    type: string
                    format: date-time
                    description: Data de expiração do token (apenas se válido)
                    example: 2025-11-17T10:00:00Z
  /schools/password:
    patch:
      tags:
        - Schools
      summary: Alterar senha da escola logada
      description: Permite que uma escola autenticada altere sua própria senha
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - currentPassword
                - newPassword
              properties:
                currentPassword:
                  type: string
                  format: password
                  description: Senha atual da escola
                  example: senhaAtual123
                newPassword:
                  type: string
                  format: password
                  description: Nova senha (mínimo 6 caracteres)
                  example: novaSenha456
      responses:
        '204':
          description: Senha alterada com sucesso
        '401':
          description: Não autenticado ou senha atual inválida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools:
    post:
      tags:
        - Schools
      summary: Criar uma nova escola
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSchoolInput'
      responses:
        '201':
          description: Escola criada com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchoolResponse'
        '400':
          description: Erro de validação.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/students:
    get:
      tags:
        - Schools
      summary: Listar alunos matriculados na escola
      description: Retorna as matrículas ativas com os dados do aluno, dependente (quando existir), curso e turma.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: name
          required: false
          schema:
            type: string
          description: Filtrar alunos cujo nome (ou do dependente) contenha o valor informado (case insensitive).
        - in: query
          name: courseId
          required: false
          schema:
            type: string
            format: uuid
          description: Filtrar matrículas vinculadas a um curso específico.
        - in: query
          name: classId
          required: false
          schema:
            type: string
            format: uuid
          description: Filtrar matrículas de uma turma específica.
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
          description: 'Número máximo de resultados a retornar (padrão: 50, máximo: 100)'
        - in: query
          name: offset
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
          description: 'Número de resultados a pular para paginação (padrão: 0)'
      responses:
        '200':
          description: Lista de alunos matriculados na escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchoolStudentsResponse'
        '400':
          description: Erro na requisição.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado ou sem contexto de escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade de listagem de alunos não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/students/directory/{cpf}:
    get:
      tags:
        - Schools
      summary: Buscar aluno ou dependente por CPF
      description: Permite que escolas localizem um aluno ou dependente pelo CPF. Quando o CPF pertence a um dependente, os dados do responsável são incluídos na resposta.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: cpf
          required: true
          schema:
            type: string
            example: '39588620805'
          description: CPF do aluno ou dependente a ser localizado (11 dígitos).
      responses:
        '200':
          description: Dados do aluno ou dependente encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentDirectoryResponse'
        '400':
          description: CPF inválido. Deve conter 11 dígitos.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado ou sem contexto de escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Aluno ou dependente não encontrado com o CPF informado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade de busca de alunos não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/payments:
    get:
      tags:
        - Schools
      summary: Listar pagamentos dos alunos da escola
      description: Retorna as cobranças financeiras de todos os alunos matriculados na escola, filtradas por mês e ano (obrigatório), com informações do aluno, dependente (quando existir), curso e turma.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: month
          required: true
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 12
          description: Mês para filtrar os pagamentos (1-12).
        - in: query
          name: year
          required: true
          schema:
            type: integer
            format: int32
            minimum: 2000
            maximum: 3000
          description: Ano para filtrar os pagamentos.
        - in: query
          name: studentName
          required: false
          schema:
            type: string
          description: Filtrar pagamentos de alunos cujo nome (ou do dependente) contenha o valor informado.
        - in: query
          name: classId
          required: false
          schema:
            type: string
            format: uuid
          description: Filtrar pagamentos vinculados a uma turma específica.
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum: [PENDING_SYNC, OPEN, PAID, OVERDUE, CANCELLED, FAILED]
          description: Filtrar pagamentos por status da cobrança.
      responses:
        '200':
          description: Lista de pagamentos encontrados.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchoolPaymentsResponse'
        '400':
          description: Erro na requisição.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado ou sem contexto de escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade de listagem de pagamentos não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/payments/consolidated:
    get:
      tags:
        - Schools
      summary: Consolidado de pagamentos dos estudantes da escola
      description: |
        Retorna os totais consolidados de mensalidades dos alunos da escola para um mês e ano específicos.
        - `pendentes`, `pagos` e `vencidos` são quantidades (número de itens)
        - `totalAReceber` e `totalRecebido` são valores monetários em centavos
        - `totalAReceber` inclui pendentes e vencidos
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: month
          required: true
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 12
          description: Mês para consolidar os pagamentos (1-12).
        - in: query
          name: year
          required: true
          schema:
            type: integer
            format: int32
            minimum: 2000
            maximum: 3000
          description: Ano para consolidar os pagamentos.
      responses:
        '200':
          description: Totais consolidados de pagamentos.
          content:
            application/json:
              schema:
                type: object
                properties:
                  pendentes:
                    type: integer
                    format: int32
                    description: Quantidade de mensalidades pendentes. Inclui status OPEN ou PENDING_SYNC com data de vencimento ainda não passada.
                    example: 15
                  pagos:
                    type: integer
                    format: int32
                    description: Quantidade de mensalidades pagas. Status PAID.
                    example: 45
                  vencidos:
                    type: integer
                    format: int32
                    description: Quantidade de mensalidades vencidas. Inclui status OVERDUE ou status pendente com data de vencimento passada.
                    example: 5
                  totalAReceber:
                    type: integer
                    format: int64
                    description: Total a receber em centavos. Soma dos valores de pendentes e vencidos.
                    example: 200000
                  totalRecebido:
                    type: integer
                    format: int64
                    description: Total recebido em centavos. Soma dos valores das mensalidades pagas.
                    example: 450000
                required:
                  - pendentes
                  - pagos
                  - vencidos
                  - totalAReceber
                  - totalRecebido
        '400':
          description: Erro na requisição. Mês ou ano inválidos ou não fornecidos.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado ou sem contexto de escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade de consolidação de pagamentos não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/finance/charges:
    post:
      tags:
        - Schools
      summary: Criar cobrança financeira para aluno
      description: Registra uma cobrança para um aluno ou dependente da escola, vinculando-a ao curso e opcionalmente à turma correspondente.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSchoolChargeInput'
      responses:
        '201':
          description: Cobrança registrada com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchoolChargeResponse'
        '400':
          description: Dados inválidos para geração da cobrança.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário autenticado sem permissão para a escola informada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Aluno, dependente ou curso não encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/finance/summary:
    get:
      tags:
        - Schools
      summary: Obter resumo financeiro da escola
      description: Retorna informações financeiras da escola, incluindo saques disponíveis (limite de 30), saldo disponível e total recebido no mês atual. Requer persona SCHOOL.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Resumo financeiro da escola.
          content:
            application/json:
              schema:
                type: object
                properties:
                  availableWithdrawals:
                    type: array
                    description: Lista dos últimos 30 pagamentos pagos disponíveis para saque, ordenados por data de pagamento (mais recentes primeiro)
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                          description: ID da cobrança
                        netAmount:
                          type: number
                          description: Valor líquido em reais
                        netAmountCents:
                          type: integer
                          format: int64
                          description: Valor líquido em centavos
                        paidAt:
                          type: string
                          format: date
                          description: Data do pagamento
                        description:
                          type: string
                          nullable: true
                          description: Descrição da cobrança
                        studentName:
                          type: string
                          description: Nome do aluno ou dependente
                        courseName:
                          type: string
                          description: Nome do curso
                      required:
                        - id
                        - netAmount
                        - netAmountCents
                        - paidAt
                        - studentName
                        - courseName
                  availableBalance:
                    type: number
                    description: Saldo disponível total em reais (soma de todos os pagamentos pagos)
                  availableBalanceCents:
                    type: integer
                    format: int64
                    description: Saldo disponível total em centavos
                  totalReceivedThisMonth:
                    type: number
                    description: Total recebido no mês atual em reais
                  totalReceivedThisMonthCents:
                    type: integer
                    format: int64
                    description: Total recebido no mês atual em centavos
                required:
                  - availableWithdrawals
                  - availableBalance
                  - availableBalanceCents
                  - totalReceivedThisMonth
                  - totalReceivedThisMonthCents
        '401':
          description: Não autorizado. Token inválido ou ausente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado. Requer persona SCHOOL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade de resumo financeiro não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/finance/withdrawals:
    get:
      tags:
        - Schools
      summary: Listar histórico de saques da escola
      description: Retorna o histórico de saques realizados pela escola, com opção de filtrar por mês e ano. Requer persona SCHOOL.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: month
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 12
          description: Filtrar saques pelo mês (1-12)
        - in: query
          name: year
          required: false
          schema:
            type: integer
            minimum: 2000
            maximum: 3000
          description: Filtrar saques pelo ano
      responses:
        '200':
          description: Histórico de saques da escola.
          content:
            application/json:
              schema:
                type: object
                properties:
                  withdrawals:
                    type: array
                    description: Lista de saques realizados, ordenados por data de criação (mais recentes primeiro)
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                          description: ID do saque
                        amount:
                          type: number
                          description: Valor do saque em reais
                        amountCents:
                          type: integer
                          format: int64
                          description: Valor do saque em centavos
                        bankName:
                          type: string
                          description: Nome do banco
                        bankAgency:
                          type: string
                          description: Agência bancária
                        bankAccount:
                          type: string
                          description: Número da conta bancária
                        pixKey:
                          type: string
                          nullable: true
                          description: Chave PIX utilizada (quando aplicável)
                        status:
                          type: string
                          enum: [PROCESSING, COMPLETED, CANCELLED]
                          description: Status do saque (processando, completo, cancelado)
                        createdAt:
                          type: string
                          format: date
                          description: Data de criação do saque
                        processedAt:
                          type: string
                          format: date
                          nullable: true
                          description: Data de processamento do saque (quando completo)
                        cancelledAt:
                          type: string
                          format: date
                          nullable: true
                          description: Data de cancelamento do saque (quando cancelado)
                      required:
                        - id
                        - amount
                        - amountCents
                        - bankName
                        - bankAgency
                        - bankAccount
                        - pixKey
                        - status
                        - createdAt
                        - processedAt
                        - cancelledAt
                required:
                  - withdrawals
        '400':
          description: Erro na validação dos parâmetros de filtro.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Não autorizado. Token inválido ou ausente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado. Requer persona SCHOOL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade de histórico de saques não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
        - Schools
      summary: Solicitar saque do saldo disponível
      description: |
        Solicita um saque do valor disponível na conta Asaas da escola para uma conta bancária pessoal cadastrada.
        O saque será processado usando a API key da conta Asaas da escola.
        Requer persona SCHOOL e que a escola tenha conta Asaas configurada com API key.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
              schema:
                type: object
                required:
                  - amount
                  - bankAccountId
                properties:
                  amount:
                    type: number
                    minimum: 0.01
                    description: 'Valor do saque em reais (ex: 100.50)'
                  bankAccountId:
                    type: string
                    format: uuid
                    description: ID da conta bancária cadastrada para receber o saque
      responses:
        '201':
          description: Solicitação de saque criada com sucesso.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                    description: ID do saque criado
                  amount:
                    type: number
                    description: Valor do saque em reais
                  amountCents:
                    type: integer
                    format: int64
                    description: Valor do saque em centavos
                  status:
                    type: string
                    enum: [PROCESSING, COMPLETED, CANCELLED]
                    description: Status do saque (processando, completo, cancelado)
                required:
                  - id
                  - amount
                  - amountCents
                  - status
        '400':
          description: Erro de validação dos dados ou saldo insuficiente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Não autorizado. Token inválido ou ausente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado. Requer persona SCHOOL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Conta bancária não encontrada ou não pertence à escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade de solicitação de saque não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/courses:
    get:
      tags:
        - Schools
      summary: Listar cursos da escola
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de cursos encontrados.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseListResponse'
        '501':
          description: Funcionalidade de listagem de cursos não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
        - Schools
      summary: Criar um curso para uma escola
      description: |
        Cria um novo curso para a escola. O campo opcional `monthlyPriceCents` define o preço mensal do curso
        em centavos (ex: 15000 = R$ 150,00). Este valor será automaticamente copiado para o campo `fullAmountCents`
        das matrículas criadas para turmas deste curso, servindo como base para cálculo de descontos.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCourseInput'
      responses:
        '201':
          description: Curso criado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseResponse'
        '400':
          description: Erro de validação ou escola não encontrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/courses/{courseId}:
    get:
      tags:
        - Schools
      summary: Obter detalhes de um curso da escola
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: courseId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Curso encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseResponse'
        '404':
          description: Curso não encontrado para a escola.
          content:
