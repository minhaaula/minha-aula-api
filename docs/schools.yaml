  /schools/plan/invoices:
    post:
      tags:
        - Schools
      summary: Gerar fatura do plano vigente
      description: >-
        Emite uma nova fatura para o plano ativo da escola. Caso já exista uma
        fatura para a mesma data de vencimento, ela é reutilizada. Use este
        endpoint apenas quando precisar gerar ou reenviar uma cobrança; para
        listar faturas existentes utilize o GET correspondente.
        
        **Cupons de desconto:** Cada chamada emite **uma** fatura do ciclo. Com `couponCode`,
        o desconto é aplicado na fatura atual se o cupom ainda tiver meses disponíveis
        (`durationMonths`) e estiver dentro de `validUntil`. Nas renovações seguintes,
        o mesmo cupom é reaplicado automaticamente (sem enviar o código novamente)
        até esgotar a duração — não são geradas várias faturas de uma só vez.
      security:
        - bearerAuth: []
      x-codeSamples:
        - lang: curl
          label: cURL
          source: |
            curl -X POST \
              'https://api.exemplo.com/schools/plan/invoices' \
              -H 'accept: application/json' \
              -H 'Authorization: Bearer {{token_escola}}' \
              -H 'Content-Type: application/json' \
              -d '{
                "dueDate": "2024-07-15T00:00:00.000Z",
                "description": "Assinatura Minha Aula - Julho",
                "generatePix": true
              }'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IssueSchoolPlanInvoiceInput'
            examples:
              manualBoleto:
                summary: Gerar cobrança para o próximo ciclo
                value:
                  dueDate: '2024-07-15T00:00:00.000Z'
                  description: Assinatura Minha Aula - Julho
              pix:
                summary: Gerar cobrança via PIX (retorna pixCopiaECola)
                value:
                  dueDate: '2024-07-15T00:00:00.000Z'
                  description: Assinatura Minha Aula - Julho (PIX)
                  generatePix: true
              withCoupon:
                summary: Gerar cobrança com cupom de desconto
                value:
                  dueDate: '2024-07-15T00:00:00.000Z'
                  description: Assinatura Minha Aula - Julho
                  couponCode: 'VAMOS'
      responses:
        '201':
          description: Fatura criada com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IssueSchoolPlanInvoiceResponse'
        '200':
          description: Fatura já existente reaproveitada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IssueSchoolPlanInvoiceResponse'
        '400':
          description: Solicitação inválida ou plano inexistente para a escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade de faturamento não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
