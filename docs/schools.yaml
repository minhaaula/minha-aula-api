paths:
  /schools/login:
    post:
      tags:
        - Schools
      summary: Autenticar uma escola
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SchoolLoginInput'
      responses:
        '200':
          description: Login realizado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchoolLoginResponse'
        '400':
          description: Erro de validação ou credenciais inválidas.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools:
    post:
      tags:
        - Schools
      summary: Criar uma nova escola
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSchoolInput'
      responses:
        '201':
          description: Escola criada com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchoolResponse'
        '400':
          description: Erro de validação.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/students:
    get:
      tags:
        - Schools
      summary: Listar alunos matriculados na escola
      description: Retorna as matrículas ativas com os dados do aluno, dependente (quando existir), curso e turma.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: name
          required: false
          schema:
            type: string
          description: Filtrar alunos cujo nome (ou do dependente) contenha o valor informado.
        - in: query
          name: courseId
          required: false
          schema:
            type: string
            format: uuid
          description: Filtrar matrículas vinculadas a um curso específico.
        - in: query
          name: classId
          required: false
          schema:
            type: string
            format: uuid
          description: Filtrar matrículas de uma turma específica.
      responses:
        '200':
          description: Lista de alunos matriculados na escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchoolStudentsResponse'
        '400':
          description: Erro na requisição.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado ou sem contexto de escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade de listagem de alunos não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/courses:
    get:
      tags:
        - Schools
      summary: Listar cursos da escola
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de cursos encontrados.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseListResponse'
        '501':
          description: Funcionalidade de listagem de cursos não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
        - Schools
      summary: Criar um curso para uma escola
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCourseInput'
      responses:
        '201':
          description: Curso criado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseResponse'
        '400':
          description: Erro de validação ou escola não encontrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/courses/{courseId}:
    get:
      tags:
        - Schools
      summary: Obter detalhes de um curso da escola
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: courseId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Curso encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseResponse'
        '404':
          description: Curso não encontrado para a escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade de consulta de curso não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - Schools
      summary: Atualizar um curso da escola
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: courseId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCourseInput'
      responses:
        '200':
          description: Curso atualizado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseResponse'
        '400':
          description: Dados inválidos ou curso não encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Curso não encontrado para a escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade de atualização de curso não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Schools
      summary: Desativar um curso da escola
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: courseId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Curso desativado com sucesso.
        '400':
          description: Curso possui turmas ativas ou não pode ser removido.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Curso não encontrado para a escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade de remoção de curso não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/courses/classes:
    get:
      tags:
        - Schools
      summary: Listar turmas da escola
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: courseId
          required: false
          schema:
            type: string
            format: uuid
          description: Se informado, filtra as turmas pelo identificador do curso.
      responses:
        '200':
          description: Lista de turmas encontradas.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseClassListResponse'
        '404':
          description: Curso não encontrado para a escola (quando o filtro courseId for inválido).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade de listagem de turmas não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /schools/courses/{courseId}/classes:
    get:
      tags:
        - Schools
      summary: Listar turmas de um curso
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: courseId
          required: true
          schema:
            type: string
            format: uuid
          description: Identificador do curso.
      responses:
        '200':
          description: Lista de turmas encontradas.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseClassListResponse'
        '404':
          description: Curso não encontrado para a escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade de listagem de turmas não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
        - Schools
      summary: Criar uma turma para um curso
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: courseId
          required: true
          schema:
            type: string
            format: uuid
          description: Identificador do curso.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCourseClassInput'
      responses:
        '201':
          description: Turma criada com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseClassResponse'
        '400':
          description: Erro de validação ou curso não encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/courses/{courseId}/classes/{classId}:
    get:
      tags:
        - Schools
      summary: Obter detalhes de uma turma
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: courseId
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: classId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Turma encontrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseClassResponse'
        '404':
          description: Turma não encontrada para a escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade de consulta de turma não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - Schools
      summary: Atualizar uma turma do curso
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: courseId
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: classId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCourseClassInput'
      responses:
        '200':
          description: Turma atualizada com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseClassResponse'
        '400':
          description: Dados inválidos ou rótulo já utilizado no curso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Curso ou turma não encontrados para a escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade de atualização de turma não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Schools
      summary: Remover uma turma de um curso
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: courseId
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: classId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Turma removida com sucesso.
        '400':
          description: Turma possui matrículas ativas ou solicitações pendentes.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Curso ou turma não encontrados para a escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade de remoção de turma não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/courses/{courseId}/classes/{classId}/requests:
    get:
      tags:
        - Schools
      summary: Listar solicitações de matrícula de uma turma
      description: Retorna as solicitações de matrícula da turma, pendentes por padrão.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: courseId
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: classId
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum: [PENDING, APPROVED, REJECTED, CANCELLED]
          description: Quando omitido, são retornadas apenas solicitações pendentes.
      responses:
        '200':
          description: Solicitações encontradas.
          content:
            application/json:
              schema:
                type: object
                required:
                  - requests
                properties:
                  requests:
                    type: array
                    items:
                      $ref: '#/components/schemas/EnrollmentRequestResponse'
        '400':
          description: Erro de validação.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/courses/{courseId}/classes/{classId}/enrollments:
    post:
      tags:
        - Schools
      summary: Matricular aluno diretamente na turma
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: courseId
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: classId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnrollStudentInput'
      responses:
        '201':
          description: Matrícula criada com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnrollmentResponse'
        '400':
          description: Erro de validação ou vínculos inválidos.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/courses/{courseId}/classes/{classId}/sessions:
    post:
      tags:
        - Schools
      summary: Agendar uma sessão de aula para a turma
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: courseId
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: classId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateClassSessionInput'
      responses:
        '201':
          description: Sessão criada com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassSessionResponse'
        '400':
          description: Erro de validação ou conflito de agenda.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      tags:
        - Schools
      summary: Listar sessões de aula de uma turma
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: courseId
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: classId
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: from
          required: true
          schema:
            type: string
            format: date-time
        - in: query
          name: to
          required: true
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Lista de sessões agendadas.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassSessionsResponse'
        '400':
          description: Erro de validação ou turma não encontrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/sessions:
    get:
      tags:
        - Schools
      summary: Listar sessões de aula da escola
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: from
          required: true
          schema:
            type: string
            format: date-time
        - in: query
          name: to
          required: true
          schema:
            type: string
            format: date-time
        - in: query
          name: courseClassId
          required: false
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Lista de sessões agendadas.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassSessionsResponse'
        '400':
          description: Erro de validação.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/plans:
    get:
      tags:
        - Schools
      summary: Listar planos disponíveis para escolas
      description: Retorna todos os planos de assinatura ativos que podem ser contratados pelas escolas.
      responses:
        '200':
          description: Planos disponíveis encontrados.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionPlanListResponse'
        '501':
          description: Funcionalidade de planos não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/me:
    get:
      tags:
        - Schools
      summary: Consultar dados completos da escola autenticada
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Dados completos da escola encontrados.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchoolResponse'
        '404':
          description: Escola não encontrada para o usuário autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade de consulta de escola não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - Schools
      summary: Atualizar dados da escola autenticada
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSchoolInput'
      responses:
        '200':
          description: Dados da escola atualizados com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchoolResponse'
        '400':
          description: Dados inválidos para atualização da escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Escola não encontrada para o usuário autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade de atualização de escola não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/categories:
    get:
      tags:
        - Schools
      summary: Listar categorias e subcategorias disponíveis
      description: Retorna as categorias de cursos e suas respectivas subcategorias para auxiliar na criação de cursos.
      responses:
        '200':
          description: Categorias encontradas.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryListResponse'
        '501':
          description: Funcionalidade de categorias não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/plan:
    post:
      tags:
        - Schools
      summary: Selecionar plano para a escola
      description: >-
        Atualiza o plano de assinatura da escola autenticada. O plano fica em
        estado pendente até que uma fatura seja paga com sucesso. A primeira
        fatura vence no próximo dia útil e as demais seguem o ciclo de cobrança
        do plano.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignSchoolPlanInput'
      responses:
        '200':
          description: Plano atribuído com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchoolPlanResponse'
        '400':
          description: Dados inválidos ou plano indisponível.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade de planos não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      tags:
        - Schools
      summary: Consultar plano ativo da escola
      description: Retorna o plano de assinatura vigente, status de pagamento e datas de cobrança.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Plano ativo encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchoolPlanResponse'
        '404':
          description: Nenhum plano ativo configurado para a escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade de planos não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/plan/invoices:
    post:
      tags:
        - Schools
      summary: Gerar fatura do plano vigente
      description: >-
        Emite uma nova fatura para o plano ativo da escola. Caso já exista uma
        fatura para a mesma data de vencimento, ela é reutilizada. Use este
        endpoint apenas quando precisar gerar ou reenviar uma cobrança; para
        listar faturas existentes utilize o GET correspondente.
      security:
        - bearerAuth: []
      x-codeSamples:
        - lang: curl
          label: cURL
          source: |
            curl -X POST \
              'https://api.exemplo.com/schools/plan/invoices' \
              -H 'accept: application/json' \
              -H 'Authorization: Bearer {{token_escola}}' \
              -H 'Content-Type: application/json' \
              -d '{
                "dueDate": "2024-07-15T00:00:00.000Z",
                "description": "Assinatura Minha Aula - Julho"
              }'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IssueSchoolPlanInvoiceInput'
            examples:
              manualBoleto:
                summary: Gerar cobrança para o próximo ciclo
                value:
                  dueDate: '2024-07-15T00:00:00.000Z'
                  description: Assinatura Minha Aula - Julho
      responses:
        '201':
          description: Fatura criada com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IssueSchoolPlanInvoiceResponse'
        '200':
          description: Fatura já existente reaproveitada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IssueSchoolPlanInvoiceResponse'
        '400':
          description: Solicitação inválida ou plano inexistente para a escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade de faturamento não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      tags:
        - Schools
      summary: Listar faturas do plano
      description: >-
        Retorna todas as faturas associadas ao plano atual da escola, incluindo
        os status ABERTA, PAGA ou CANCELADA. Utilize esta listagem para checar
        cobranças pendentes antes de efetuar o pagamento.
      security:
        - bearerAuth: []
      x-codeSamples:
        - lang: curl
          label: cURL
          source: |
            curl -X GET \
              'https://api.exemplo.com/schools/plan/invoices' \
              -H 'accept: application/json' \
              -H 'Authorization: Bearer {{token_escola}}'
      responses:
        '200':
          description: Faturas encontradas.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchoolPlanInvoicesResponse'
