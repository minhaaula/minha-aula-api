          required: true
          schema:
            type: string
            format: uuid
          description: ID da conta bancária a ser removida
      responses:
        '204':
          description: Conta bancária removida com sucesso.
        '400':
          description: Conta não encontrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado, sem contexto de escola ou conta não pertence à escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade de contas bancárias não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/images:
    post:
      tags:
        - Schools
      summary: Enviar imagem da escola
      description: |
        Faz upload de uma imagem para a escola autenticada. A imagem é armazenada no bucket configurado.
        - Apenas um arquivo por vez
        - Tipos aceitos: JPEG, JPG, PNG, WEBP, GIF
        - Tamanho máximo: 5MB
        - A imagem é armazenada na pasta `schools/{schoolId}/images/{category}/`
        - Categorias disponíveis: GALLERY (padrão), LOGO, BANNER, COVER, OTHER
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - image
              properties:
                image:
                  type: string
                  format: binary
                  description: Arquivo de imagem (JPEG, JPG, PNG, WEBP ou GIF)
                category:
                  type: string
                  description: 'Categoria da imagem (GALLERY, LOGO, BANNER, COVER, OTHER). Padrão: GALLERY'
                  enum: [GALLERY, LOGO, BANNER, COVER, OTHER]
            encoding:
              image:
                contentType: image/jpeg, image/jpg, image/png, image/webp, image/gif
      responses:
        '201':
          description: Imagem enviada com sucesso.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                    description: ID da imagem salva no banco de dados
                  url:
                    type: string
                    format: uri
                    description: URL assinada da imagem (válida por 1 hora)
                    example: "https://storage.example.com/schools/abc123/images/def456.jpg?signature=..."
                  key:
                    type: string
                    description: Chave do arquivo no storage
                    example: "schools/abc123/images/gallery/def456.jpg"
                  category:
                    type: string
                    description: Categoria da imagem
                    example: "GALLERY"
                required:
                  - id
                  - url
                  - key
                  - category
        '400':
          description: Erro de validação (arquivo inválido, muito grande ou tipo não permitido).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Não autorizado. Token inválido ou ausente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado. Requer persona SCHOOL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Escola não encontrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade de upload de imagens não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      tags:
        - Schools
      summary: Listar imagens da escola
      description: |
        Retorna todas as imagens enviadas pela escola autenticada.
        As URLs retornadas são assinadas e válidas por 1 hora.
        Pode filtrar por categoria usando o parâmetro query `category`.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: category
          required: false
          schema:
            type: string
            enum: [GALLERY, LOGO, BANNER, COVER, OTHER]
          description: Filtrar imagens por categoria (opcional)
      responses:
        '200':
          description: Lista de imagens da escola.
          content:
            application/json:
              schema:
                type: object
                properties:
                  images:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                          description: ID da imagem
                        url:
                          type: string
                          format: uri
                          description: URL assinada da imagem (válida por 1 hora)
                        key:
                          type: string
                          description: Chave do arquivo no storage
                        contentType:
                          type: string
                          description: Tipo MIME da imagem
                          example: "image/jpeg"
                        originalFileName:
                          type: string
                          description: Nome original do arquivo enviado
                        category:
                          type: string
                          description: Categoria da imagem
                          enum: [GALLERY, LOGO, BANNER, COVER, OTHER]
                        createdAt:
                          type: string
                          format: date-time
                          description: Data de criação da imagem
                      required:
                        - id
                        - url
                        - key
                        - contentType
                        - originalFileName
                        - category
                        - createdAt
                required:
                  - images
        '401':
          description: Não autorizado. Token inválido ou ausente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado. Requer persona SCHOOL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade de listagem de imagens não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/kyc/documents:
    get:
      tags:
        - Schools
      summary: Consultar documentos pendentes de KYC
      description: |
        Retorna os documentos pendentes de KYC (Know Your Customer) da escola autenticada no Asaas.
        Este endpoint busca os documentos diretamente da API do Asaas usando a API key da subconta da escola.
        
        O sistema automaticamente extrai o `onboardingUrl` dos documentos pendentes e atualiza o registro
        da escola se um novo link for encontrado. O link de onboarding permite que a escola complete
        o processo de verificação de identidade e envie os documentos necessários.
        
        **Nota:** Após a criação da subconta no Asaas, pode levar até 15 segundos para que os documentos
        pendentes estejam disponíveis. Este endpoint retorna os documentos disponíveis no momento da consulta.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Documentos pendentes de KYC encontrados.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KycDocumentsResponse'
              examples:
                default:
                  summary: Exemplo de documentos pendentes
                  value:
                    documents:
                      - id: "bdc1ca13-3842-4a09-bb98-4a9e961f23f2"
                        type: "IDENTIFICATION"
                        title: "Documentos de identificação"
                        description: "Para enviar esse documento acesse nosso aplicativo ou utilize o link de onboarding."
                        status: "NOT_SENT"
                        onboardingUrl: "https://beta.cadastro.io/c33ef9ae605f350c052be72ab094d0b7"
                        onboardingUrlExpirationDate: "2025-03-04T00:00:00.000Z"
                        responsible:
                          name: "diretor"
                          type: "PARTNER"
                      - id: "7fc6dbc2-f1b1-485a-8eee-c041254560bc"
                        type: "SOCIAL_CONTRACT"
                        title: "Contrato Social"
                        description: "O contrato social só será aceito contendo todas as páginas e o registro na junta comercial."
                        status: "NOT_SENT"
                        onboardingUrl: null
                        onboardingUrlExpirationDate: null
                        responsible:
                          name: null
                          type: "LIMITED_COMPANY"
                    onboardingUrl: "https://beta.cadastro.io/c33ef9ae605f350c052be72ab094d0b7"
        '400':
          description: Erro na requisição ou escola sem conta Asaas configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Não autorizado. Token inválido ou ausente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado. Requer persona SCHOOL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Escola não encontrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade de consulta de documentos KYC não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/kyc/sync-onboarding-documents:
    post:
      tags:
        - Schools
      summary: Sincronizar documentos de onboarding com o Asaas
      description: |
        Sincroniza os documentos pendentes da escola com o Asaas e atualiza a `onboardingUrl` na escola
        quando um novo link for disponibilizado. Use para forçar atualização da lista de documentos e
        do link de onboarding (onboarding manual). Requer autenticação com persona SCHOOL.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Documentos sincronizados com sucesso.
          content:
            application/json:
              schema:
                type: object
                properties:
                  schoolId:
                    type: string
                    format: uuid
                  documents:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        type:
                          type: string
                        title:
                          type: string
                        description:
                          type: string
                        status:
                          type: string
                        onboardingUrl:
                          type: string
                          nullable: true
                        onboardingUrlExpirationDate:
                          type: string
                          nullable: true
                  onboardingUrl:
                    type: string
                    nullable: true
                  onboardingUrlUpdated:
                    type: boolean
        '401':
          description: Não autorizado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Requer persona SCHOOL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Escola não encontrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/kyc/documents/{documentGroupId}/upload:
    post:
      tags:
        - Schools
      summary: Enviar documento de onboarding (KYC)
      description: |
        Envia um documento para um grupo pendente de KYC da escola no Asaas (envio manual).
        Use quando o link de onboarding não estiver disponível ou quando o cliente preferir enviar pelo app.
        O `documentGroupId` e o `type` vêm da lista retornada em GET /schools/kyc/documents.
        A escola só pode enviar documentos da própria conta. Requer autenticação com persona SCHOOL.
        Tipos aceitos: IDENTIFICATION, IDENTIFICATION_SELFIE, MINUTES_OF_ELECTION, SOCIAL_CONTRACT, OTHER.
        Arquivos: PDF ou imagem (JPEG/PNG), até 10MB.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: documentGroupId
          required: true
          schema:
            type: string
          description: ID do grupo de documentos (retornado em GET /schools/kyc/documents)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - documentFile
                - type
              properties:
                documentFile:
                  type: string
                  format: binary
                  description: Arquivo (PDF ou imagem JPEG/PNG)
                type:
                  type: string
                  enum:
                    - IDENTIFICATION
                    - IDENTIFICATION_SELFIE
                    - MINUTES_OF_ELECTION
                    - SOCIAL_CONTRACT
                    - OTHER
                  description: Tipo do documento (deve coincidir com o tipo do grupo)
      responses:
        '200':
          description: Documento enviado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadOnboardingDocumentResponse'
        '400':
          description: Validação (arquivo ausente, type inválido, escola sem conta Asaas).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Não autorizado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Requer persona SCHOOL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Escola não encontrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
