paths:
  /schools:
    post:
      tags:
        - Schools
      summary: Criar uma nova escola
      description: >-
        Cria uma escola e o usuário responsável. Se um token Bearer de uma
        escola já existente for enviado, essa escola será definida como
        proprietária.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSchoolInput'
      responses:
        '201':
          description: Escola criada com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchoolResponse'
        '400':
          description: Erro de validação.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      tags:
        - Schools
      summary: Listar escolas
      description: Endpoint de leitura para seleção de escolas por alunos.
      responses:
        '200':
          description: Lista de escolas cadastradas.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchoolsListResponse'
        '400':
          description: Erro de validação.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/login:
    post:
      tags:
        - Schools
      summary: Autenticar uma escola
      description: |
        Autentica uma escola e retorna um token de acesso. A resposta inclui informações sobre o status do onboarding (KYC):
        - `onboardingCompleted`: indica se o processo de onboarding foi finalizado (true quando a escola tem accountId e accountApiKey)
        - `onboardingUrl`: link para completar o onboarding (retornado apenas quando onboardingCompleted é false)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SchoolLoginInput'
      responses:
        '200':
          description: Login realizado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchoolLoginResponse'
        '400':
          description: Erro de validação ou credenciais inválidas.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/categories:
    get:
      tags:
        - Schools
      summary: Listar categorias e subcategorias disponíveis
      description: Retorna as categorias de cursos e suas respectivas subcategorias.
      responses:
        '200':
          description: Categorias encontradas.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryListResponse'
        '501':
          description: Funcionalidade de categorias não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/plans:
    get:
      tags:
        - Schools
      summary: Listar planos disponíveis para escolas
      description: Retorna os planos de assinatura disponíveis para contratação.
      responses:
        '200':
          description: Planos disponíveis encontrados.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionPlanListResponse'
        '501':
          description: Funcionalidade de planos não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /schools/plan/invoices:
    post:
      tags:
        - Schools
      summary: Gerar fatura do plano vigente
      description: >-
        Emite uma nova fatura para o plano atual da escola. Informe
        opcionalmente uma data de vencimento específica ou uma descrição para o
        boleto. Se já existir uma fatura na mesma data, ela será reutilizada.
        
        **Cupons de desconto:** Se um `couponCode` for fornecido e o cupom tiver
        `durationMonths > 1`, o sistema gerará automaticamente múltiplas faturas
        (uma para cada mês) até o limite da duração do cupom ou até a data de
        validade do cupom. Todas as faturas geradas terão o desconto aplicado.
      security:
        - bearerAuth: []
      x-codeSamples:
        - lang: curl
          label: cURL
          source: |
            curl -X POST \
              'https://api.exemplo.com/schools/plan/invoices' \
              -H 'accept: application/json' \
              -H 'Authorization: Bearer {{token_escola}}' \
              -H 'Content-Type: application/json' \
              -d '{
                "dueDate": "2024-07-15T00:00:00.000Z",
                "description": "Assinatura Minha Aula - Julho"
              }'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IssueSchoolPlanInvoiceInput'
            examples:
              manualBoleto:
                summary: Gerar cobrança para o próximo ciclo
                value:
                  dueDate: '2024-07-15T00:00:00.000Z'
                  description: Assinatura Minha Aula - Julho
              withCoupon:
                summary: Gerar cobrança com cupom de desconto
                value:
                  dueDate: '2024-07-15T00:00:00.000Z'
                  description: Assinatura Minha Aula - Julho
                  couponCode: 'VAMOS'
      responses:
        '201':
          description: Fatura criada com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IssueSchoolPlanInvoiceResponse'
        '200':
          description: Fatura já existente reaproveitada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IssueSchoolPlanInvoiceResponse'
        '400':
          description: Solicitação inválida ou plano inexistente para a escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade de faturamento não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      tags:
        - Schools
      summary: Listar faturas do plano
      description: >-
        Retorna todas as faturas geradas para o plano da escola, incluindo
        cobranças pendentes (status ISSUED) e quitadas (status PAID). Use este
        endpoint antes de realizar o pagamento de um boleto.
      security:
        - bearerAuth: []
      x-codeSamples:
        - lang: curl
          label: cURL
          source: |
            curl -X GET \
              'https://api.exemplo.com/schools/plan/invoices' \
              -H 'accept: application/json' \
              -H 'Authorization: Bearer {{token_escola}}'
