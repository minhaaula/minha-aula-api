          example: ['auth', 'admin', 'payments', 'schools', 'students']
        openapiFiles:
          type: array
          items:
            type: string
          description: Lista de arquivos OpenAPI carregados
          example: ['openapi.yaml', 'auth.yaml', 'admin.yaml']
        environment:
          type: object
          properties:
            nodeEnv:
              type: string
              nullable: true
              example: 'production'
            appModulesEnv:
              type: string
              nullable: true
              example: 'all'
        uptimeSeconds:
          type: integer
          description: Tempo de atividade do servidor em segundos
          example: 3600
        serverTime:
          type: string
          format: date-time
          description: Data/hora atual do servidor
          example: '2024-01-15T10:30:00.000Z'
      required:
        - activeModules
        - openapiFiles
        - environment
        - uptimeSeconds
        - serverTime
    SchoolsWithPlansResponse:
      type: object
      properties:
        schools:
          type: array
          items:
            $ref: '#/components/schemas/SchoolWithPlanItem'
      required:
        - schools
    SchoolWithPlanItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Identificador único da escola
        name:
          type: string
          description: Nome da escola
          example: 'Escola Municipal de Ensino'
        email:
          type: string
          format: email
          description: Email de contato da escola
        phone:
          type: string
          description: Telefone de contato
        cnpj:
          type: string
          description: CNPJ da escola (apenas dígitos)
        addresses:
          type: array
          items:
            $ref: '#/components/schemas/PostalAddressOutput'
          description: Lista de endereços da escola
        createdAt:
          type: string
          format: date-time
          description: Data de criação da escola
        ownerName:
          type: string
          nullable: true
          description: Nome do responsável pela escola
        ownerCpf:
          type: string
          nullable: true
          description: CPF do responsável (apenas dígitos)
        ownerEmail:
          type: string
          nullable: true
          format: email
          description: Email do responsável
        schoolStatus:
          type: string
          enum: [ACTIVE, INACTIVE]
          description: Status da escola (ativo quando possui plano ACTIVE ou TRIAL, inativo caso contrário)
        paymentStatus:
          type: string
          nullable: true
          enum: [EM_DIA, ATRASADO]
          description: Status de pagamento do plano (em dia, atrasado ou null quando não há plano)
        plan:
          type: object
          nullable: true
          description: Informações do plano de assinatura atual (null se não houver plano)
          properties:
            schoolId:
              type: string
              format: uuid
            plan:
              type: object
              properties:
                id:
                  type: string
                  format: uuid
                code:
                  type: string
                  example: 'BASIC'
                name:
                  type: string
                  example: 'Plano Básico'
                description:
                  type: string
                  nullable: true
                  example: 'Plano básico para escolas pequenas'
                amountCents:
                  type: integer
                  description: Valor do plano em centavos
                  example: 9900
                currency:
                  type: string
                  example: 'BRL'
                billingCycle:
                  type: string
                  enum: ['MONTHLY', 'ANNUAL']
                  example: 'MONTHLY'
                isActive:
                  type: boolean
                  description: Indica se o plano está ativo
                isPrimary:
                  type: boolean
                  description: Indica se o plano é o principal/favorito
              status:
              type: string
              enum: ['TRIAL', 'ACTIVE', 'PAST_DUE', 'SUSPENDED', 'CANCELLED']
              description: Status atual do plano
              example: 'ACTIVE'
            isPaid:
              type: boolean
              description: Indica se o plano está pago
            lastPaymentAt:
              type: string
              format: date-time
              nullable: true
              description: Data do último pagamento
            nextDueAt:
              type: string
              format: date-time
              nullable: true
              description: Data do próximo vencimento
            notes:
              type: string
              nullable: true
              description: Observações sobre o plano
            createdAt:
              type: string
              format: date-time
            updatedAt:
