              type: boolean
              description: Indica se o plano está pago
            lastPaymentAt:
              type: string
              format: date-time
              nullable: true
              description: Data do último pagamento
            nextDueAt:
              type: string
              format: date-time
              nullable: true
              description: Data do próximo vencimento
            notes:
              type: string
              nullable: true
              description: Observações sobre o plano
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time
