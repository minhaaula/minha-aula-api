        - code
        - name
        - amountCents
    AdminUpdatePlanInput:
      type: object
      properties:
        code:
          type: string
          minLength: 1
          maxLength: 32
        name:
          type: string
          minLength: 1
          maxLength: 191
        description:
          type: string
          maxLength: 255
          nullable: true
        items:
          type: array
          items:
            type: string
          nullable: true
        amountCents:
          type: integer
          minimum: 1
        currency:
          type: string
          minLength: 3
          maxLength: 3
        billingCycle:
          type: string
          enum: [MONTHLY, ANNUAL]
        isActive:
          type: boolean
        isPrimary:
          type: boolean
          description: Marca o plano como principal/favorito
    AdminCategoriesListResponse:
      type: object
      properties:
