paths:
  /admin/login:
    post:
      tags:
        - Admin
      summary: Autenticar administrador
      description: |
        Autentica um usuário administrador usando email e senha.
        Apenas usuários com persona ADMIN podem fazer login através desta rota.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminLoginInput'
      responses:
        '200':
          description: Autenticação realizada com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Credenciais inválidas ou erro de validação.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/status:
    get:
      tags:
        - Admin
      summary: Obter status do sistema
      description: Retorna informações sobre módulos ativos, arquivos OpenAPI carregados e informações do ambiente.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Status do sistema retornado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminStatusResponse'
        '401':
          description: Usuário não autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/queue/jobs:
    get:
      tags:
        - Admin
      summary: Listar jobs da fila (BullMQ)
      description: |
        Retorna o status da fila de jobs (outbox): jobs repetitivos agendados, contagens
        (waiting, active, completed, failed), workers ativos e amostras de jobs em cada estado.
        Requer autenticação com persona ADMIN.
        Se REDIS_HOST não estiver configurado, retorna 503.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: waitingLimit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
          description: Máximo de jobs em waiting a retornar na amostra.
        - in: query
          name: failedLimit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 20
          description: Máximo de jobs em failed a retornar na amostra.
        - in: query
          name: completedLimit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Máximo de jobs em completed a retornar na amostra.
      responses:
        '200':
          description: Status da fila retornado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueueJobsResponse'
        '401':
          description: Usuário não autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado (requer persona ADMIN).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Fila não configurada (REDIS_HOST ausente).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueueNotConfiguredResponse'

  /admin/crons:
    get:
      tags:
        - Observabilidade
      summary: Listar CRONs (BullMQ repeatable) com última execução
      description: |
        Retorna a lista de CRONs (jobs repetitivos) cadastrados no BullMQ, incluindo
        a última execução registrada em banco (`cron_logs`) e o próximo agendamento.
        Requer autenticação com persona ADMIN.
        Se REDIS_HOST não estiver configurado, retorna 503.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de CRONs retornada com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CronListResponse'
        '401':
          description: Usuário não autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado (requer persona ADMIN).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Fila não configurada (REDIS_HOST ausente).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueueNotConfiguredResponse'

  /admin/crons/{id}/logs:
    get:
      tags:
        - Observabilidade
      summary: Listar histórico de execuções de um CRON
      description: |
        Retorna o histórico paginado de execuções do CRON (persistido em `cron_logs`).
        Requer autenticação com persona ADMIN.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            maxLength: 128
          description: Nome do CRON/job (ex. fetch_payment_receipts).
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum: [completed, failed]
          description: Filtra por status do log.
        - in: query
          name: from
          required: false
          schema:
            type: string
            format: date-time
          description: Início do intervalo (finished_at), inclusive.
        - in: query
          name: to
          required: false
          schema:
            type: string
            format: date-time
          description: Fim do intervalo (finished_at), inclusive.
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
          description: Quantidade máxima de itens por página.
        - in: query
          name: offset
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Offset (0-based) para paginação.
      responses:
        '200':
          description: Histórico de execuções retornado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CronLogListResponse'
        '401':
          description: Usuário não autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado (requer persona ADMIN).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/crons/{id}/run:
    post:
      tags:
        - Observabilidade
      summary: Executar um CRON manualmente (enqueue)
      description: |
        Enfileira uma execução imediata do CRON/job no BullMQ (outbox). Retorna 202.
        Requer autenticação com persona ADMIN.
        Se REDIS_HOST não estiver configurado, retorna 503.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            maxLength: 128
          description: Nome do CRON/job a executar.
      responses:
        '202':
          description: Execução enfileirada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CronRunResponse'
        '401':
          description: Usuário não autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado (requer persona ADMIN).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Fila não configurada (REDIS_HOST ausente).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueueNotConfiguredResponse'

  /admin/jobs:
    get:
      tags:
        - Observabilidade
      summary: Listar jobs da fila (BullMQ)
      description: |
        Mesmo payload de GET /admin/queue/jobs, mas agrupado na sessão de Observabilidade.
        Requer autenticação com persona ADMIN.
        Se REDIS_HOST não estiver configurado, retorna 503.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: waitingLimit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
          description: Máximo de jobs em waiting a retornar na amostra.
        - in: query
          name: failedLimit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 20
          description: Máximo de jobs em failed a retornar na amostra.
        - in: query
          name: completedLimit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Máximo de jobs em completed a retornar na amostra.
      responses:
        '200':
          description: Status da fila retornado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueueJobsResponse'
        '401':
          description: Usuário não autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado (requer persona ADMIN).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Fila não configurada (REDIS_HOST ausente).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueueNotConfiguredResponse'

  /admin/jobs/{id}/retry:
    post:
      tags:
        - Observabilidade
      summary: Retry manual de um job falhado (BullMQ)
      description: |
        Executa retry de um job por ID, apenas quando o estado atual for `failed`.
        Requer autenticação com persona ADMIN.
        Se REDIS_HOST não estiver configurado, retorna 503.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            maxLength: 128
          description: ID do job no BullMQ.
      responses:
        '202':
          description: Retry aceito e job reenfileirado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobRetryResponse'
        '401':
          description: Usuário não autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado (requer persona ADMIN).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Job não encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Job não está em estado failed (validação).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Fila não configurada (REDIS_HOST ausente).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueueNotConfiguredResponse'
  /admin/job-logs:
    get:
      tags:
        - Admin
      summary: Listar histórico de execução de jobs (worker)
      description: |
        Retorna registros persistidos quando jobs da fila **outbox** concluem com sucesso ou falham
        (inclui push, emails, crons enfileirados, etc.). Complementa GET /admin/queue/jobs, que mostra
        o estado **ao vivo** no Redis. Filtros opcionais por status, nome do job e intervalo de `finishedAt`.
        A resposta inclui `summary` com totais de concluídos e falhas no mesmo recorte de datas (ignora o filtro `status`).
        Requer persona ADMIN. É necessário ter executado a migração que cria `job_execution_logs`.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum: [completed, failed]
          description: Filtra por status do registro.
        - in: query
          name: jobName
          required: false
          schema:
            type: string
            maxLength: 128
          description: Nome do job BullMQ (ex. push_notification, fetch_payment_receipts).
        - in: query
          name: from
          required: false
          schema:
            type: string
            format: date-time
          description: Início do intervalo (finished_at), inclusive.
        - in: query
          name: to
          required: false
          schema:
            type: string
            format: date-time
          description: Fim do intervalo (finished_at), inclusive.
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - in: query
          name: offset
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Lista paginada e resumo de contagens.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobExecutionLogListResponse'
        '401':
          description: Usuário não autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado (requer persona ADMIN).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/job-logs/{id}:
    get:
      tags:
        - Admin
      summary: Detalhe de um registro de execução de job
      description: Retorna um registro por UUID (inclui mensagem/stack em falhas e resumo em sucesso).
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Registro encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobExecutionLogEntry'
        '401':
          description: Usuário não autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado (requer persona ADMIN).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Registro não encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/charge-due-reminders/trigger:
    post:
      tags:
        - Admin
      summary: Disparar job de lembretes de cobrança
      description: |
        Dispara imediatamente o job de lembretes de vencimento: busca cobranças e faturas
        que vencem em até 10 dias, registra no banco (para não reenviar) e enfileira um email
        de lembrete para cada uma na fila. O worker processa a fila e envia os emails.
        Requer autenticação com persona ADMIN.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Job disparado com sucesso. Emails enfileirados.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChargeDueRemindersTriggerResponse'
        '401':
          description: Usuário não autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado (requer persona ADMIN).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/invoices/{invoiceId}/mark-paid:
    post:
      tags:
        - Admin
      summary: Dar baixa em fatura (escola)
      description: |
        Marca uma fatura de plano da escola como paga manualmente (dar baixa).
        Use quando o pagamento foi confirmado fora do sistema ou para corrigir status.
        Só é possível dar baixa em faturas com status ISSUED ou FAILED.
        Requer autenticação com persona ADMIN.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: invoiceId
          required: true
          schema:
            type: string
            format: uuid
          description: ID da fatura (SchoolPlanInvoice)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                paidAt:
                  type: string
                  format: date-time
                  description: Data/hora do pagamento (ISO 8601). Se omitido, usa a data atual.
      responses:
        '200':
          description: Fatura marcada como paga.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminMarkInvoicePaidResponse'
        '400':
          description: Transição de status inválida ou data inválida.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Usuário não autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado (requer persona ADMIN).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Fatura não encontrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/charges/{chargeId}/mark-paid:
    post:
      tags:
        - Admin
      summary: Dar baixa em cobrança (aluno)
      description: |
        Marca uma cobrança de aluno (mensalidade, taxa de matrícula, etc.) como paga manualmente (dar baixa).
        Se a cobrança tiver PIX ou boleto no Asaas, o pagamento é marcado como recebido no Asaas (receiveInCash).
        Use quando o pagamento foi confirmado fora do sistema ou para corrigir status.
        Só é possível dar baixa em cobranças com status OPEN, PENDING_SYNC, OVERDUE ou FAILED. Não permite cobrança cancelada.
        Requer autenticação com persona ADMIN.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: chargeId
          required: true
          schema:
            type: string
            format: uuid
          description: ID da cobrança (SchoolFinancialCharge)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                paidAt:
                  type: string
                  format: date-time
                  description: Data/hora do pagamento (ISO 8601). Se omitido, usa a data atual.
      responses:
        '200':
          description: Cobrança marcada como paga.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminMarkChargePaidResponse'
        '400':
          description: Cobrança cancelada ou status não permite baixa.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Usuário não autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado (requer persona ADMIN).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Cobrança não encontrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/schools:
    get:
      tags:
        - Admin
      summary: Listar escolas com planos e status
      description: |
        Retorna as escolas cadastradas com informações do plano de assinatura atual e seu status.
        Suporta filtros por nome, status, mensalidade, CNPJ, CPF do titular, conta Asaas, onboardingUrl,
        primeiro pagamento e onboarding concluído. Requer autenticação com persona ADMIN.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: name
          required: false
          schema:
            type: string
          description: Filtrar por nome da escola (contém, case-insensitive).
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum: ['ACTIVE', 'INACTIVE']
          description: Filtrar por status da escola (ativo/inativo).
        - in: query
          name: paymentStatus
          required: false
          schema:
            type: string
            enum: ['EM_DIA', 'ATRASADO']
          description: Filtrar por status da mensalidade (em dia ou atrasado).
        - in: query
          name: cnpj
          required: false
          schema:
            type: string
          description: Busca parcial por CNPJ (ignora formatação).
        - in: query
          name: ownerCpf
          required: false
          schema:
            type: string
          description: Busca parcial por CPF do titular (ignora formatação).
        - in: query
          name: hasAsaasAccount
          required: false
          schema:
            type: string
            enum: ['WITH', 'WITHOUT']
          description: Filtrar por conta Asaas (WITH = tem conta, WITHOUT = sem conta).
        - in: query
          name: hasOnboardingUrl
          required: false
          schema:
            type: string
            enum: ['WITH', 'WITHOUT']
          description: Filtrar por presença de onboardingUrl (WITH = tem, WITHOUT = não tem).
        - in: query
          name: firstPayment
          required: false
          schema:
            type: string
            enum: ['YES', 'NO']
          description: Filtrar por primeiro pagamento concluído (YES = já fez, NO = ainda não).
        - in: query
          name: onboarding
          required: false
          schema:
            type: string
            enum: ['YES', 'NO']
          description: Filtrar por onboarding concluído (YES = concluído, NO = pendente).
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 50
          description: Quantidade máxima de registros por página.
        - in: query
          name: offset
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Quantidade de registros a pular (paginação).
      responses:
        '200':
          description: Lista de escolas com planos retornada com sucesso (paginada).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchoolsWithPlansResponse'
        '401':
          description: Usuário não autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado (requer persona ADMIN).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/schools/{schoolId}:
    get:
      tags:
        - Admin
      summary: Obter detalhes completos de uma escola
      description: |
        Retorna os detalhes completos de uma escola para uso administrativo, incluindo:
        - Dados cadastrais completos
        - Informações do responsável
        - Receita estimada (`incomeValue`)
        - Informações do plano de assinatura atual (se houver)
        - Dados da conta no provedor de pagamentos (Asaas)
        - Status de onboarding/KYC

        Requer autenticação com persona ADMIN.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: schoolId
          required: true
          schema:
            type: string
            format: uuid
          description: Identificador da escola
      responses:
        '200':
          description: Detalhes da escola retornados com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSchoolDetailsResponse'
        '401':
          description: Usuário não autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags:
        - Admin
      summary: Atualizar dados de uma escola
      description: |
        Atualiza dados cadastrais e de configuração de uma escola.

        - Permite alterar nome, email, telefone e CNPJ
        - Permite atualizar informações do responsável
        - Permite ajustar `incomeValue` e links públicos da escola
        - Retorna sempre a visão administrativa completa da escola após a atualização

        Requer autenticação com persona ADMIN.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: schoolId
          required: true
          schema:
            type: string
            format: uuid
          description: Identificador da escola
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUpdateSchoolInput'
      responses:
        '200':
          description: Escola atualizada com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSchoolDetailsResponse'
        '400':
          description: Erro de validação ou regra de negócio.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Usuário não autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado (requer persona ADMIN).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Escola não encontrada.
          content:
            application/json:
              schema:
