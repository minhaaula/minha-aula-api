      properties:
        payments:
          type: array
          description: Lista de cobranças pagas
          items:
            $ref: '#/components/schemas/AdminSchoolPaymentsListResponse/properties/payments/items'
        total:
          type: integer
          description: Total de registros encontrados
        limit:
          type: integer
          description: Limite aplicado
        offset:
          type: integer
          description: Offset aplicado
      required:
        - payments
        - total
        - limit
        - offset
    AdminUpdateSchoolInput:
      type: object
      properties:
        name:
          type: string
          description: Nome da escola
        email:
          type: string
          format: email
          description: Email de contato da escola
        phone:
          type: string
          description: Telefone de contato (apenas dígitos)
        cnpj:
          type: string
          description: CNPJ da escola (apenas dígitos)
        incomeValue:
          type: number
          description: Receita mensal estimada da escola
          example: 50000
        ownerName:
          type: string
          nullable: true
          description: Nome do responsável pela escola
        ownerCpf:
          type: string
          nullable: true
          description: CPF do responsável (apenas dígitos)
        ownerEmail:
          type: string
          nullable: true
          format: email
          description: Email do responsável
        ownerUserId:
          type: string
          format: uuid
          nullable: true
          description: ID do usuário responsável vinculado à escola
        ownerPassword:
          type: string
          nullable: true
          format: password
          description: Senha do responsável (obrigatória se dados do responsável forem preenchidos)
        links:
          type: object
          description: Links públicos da escola
          properties:
            facebook:
              type: string
              nullable: true
              description: URL da página do Facebook
            instagram:
              type: string
              nullable: true
              description: URL do perfil do Instagram
            tiktok:
              type: string
              nullable: true
              description: URL do perfil do TikTok
            youtube:
              type: string
              nullable: true
              description: URL do canal do YouTube
            site:
              type: string
              nullable: true
              description: URL do site institucional
    PostalAddressOutput:
      $ref: '#/components/schemas/PostalAddressOutput'
    AdminDashboardResponse:
      type: object
      properties:
        totalStudents:
          type: integer
          description: Total de alunos cadastrados no sistema (persona STUDENT)
          example: 1247
        totalClasses:
          type: integer
          description: Total de turmas ativas no sistema
          example: 85
        currentMonthRevenueExpectation:
          type: integer
          description: Previsão de receita para o mês atual em centavos (soma dos boletos do mês)
          example: 125000
        recentEnrollments:
          type: array
          description: Últimos 5 alunos matriculados
          items:
            $ref: '#/components/schemas/RecentStudentEnrollment'
      required:
        - totalStudents
        - totalClasses
        - currentMonthRevenueExpectation
        - recentEnrollments
    RecentStudentEnrollment:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: ID do aluno (usuário ou dependente)
        name:
          type: string
          description: Nome do aluno
          example: 'Maria Silva'
        cpf:
          type: string
          description: CPF do aluno
          example: '12345678909'
        enrolledAt:
          type: string
          format: date-time
          description: Data da matrícula
          example: '2025-11-15T14:30:00Z'
        courseName:
          type: string
          description: Nome do curso
          example: 'Matemática Avançada'
        className:
          type: string
          description: Identificador da turma
          example: 'Turma A - Noturno'
        schoolName:
          type: string
          description: Nome da escola
          example: 'Escola Municipal de Ensino'
      required:
        - id
        - name
        - cpf
        - enrolledAt
        - courseName
        - className
        - schoolName
    ResendAsaasAccountResponse:
      type: object
      properties:
        schoolId:
          type: string
          format: uuid
          description: ID da escola
        accountId:
          type: string
          nullable: true
          description: ID da conta no Asaas (retornado quando sucesso)
        accountApiKey:
          type: string
          nullable: true
          description: API Key da conta no Asaas (retornado quando sucesso)
        walletId:
          type: string
          nullable: true
          description: ID da carteira no Asaas (retornado quando sucesso)
        onboardingUrl:
          type: string
          nullable: true
          description: Link de onboarding/KYC para completar a verificação (retornado quando sucesso)
        success:
          type: boolean
          description: Indica se a operação foi bem-sucedida
        message:
          type: string
          description: Mensagem descritiva do resultado da operação
      required:
        - schoolId
        - accountId
        - accountApiKey
        - walletId
        - onboardingUrl
        - success
        - message

