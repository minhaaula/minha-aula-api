paths:
  /admin/login:
    post:
      tags:
        - Admin
      summary: Autenticar administrador
      description: |
        Autentica um usuário administrador usando email e senha.
        Apenas usuários com persona ADMIN podem fazer login através desta rota.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminLoginInput'
      responses:
        '200':
          description: Autenticação realizada com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Credenciais inválidas ou erro de validação.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/status:
    get:
      tags:
        - Admin
      summary: Obter status do sistema
      description: Retorna informações sobre módulos ativos, arquivos OpenAPI carregados e informações do ambiente.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Status do sistema retornado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminStatusResponse'
        '401':
          description: Usuário não autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/schools:
    get:
      tags:
        - Admin
      summary: Listar escolas com planos e status
      description: |
        Retorna todas as escolas cadastradas com informações do plano de assinatura atual e seu status.
        Requer autenticação com persona ADMIN.
        
        Para cada escola, inclui:
        - Dados básicos da escola
        - Informações do plano de assinatura (se houver)
        - Status do plano (TRIAL, ACTIVE, PAST_DUE, SUSPENDED, CANCELLED)
        - Informações de pagamento (último pagamento, próxima vencimento)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de escolas com planos retornada com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchoolsWithPlansResponse'
        '401':
          description: Usuário não autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/schools/{schoolId}:
    get:
      tags:
        - Admin
      summary: Obter detalhes completos de uma escola
      description: |
        Retorna os detalhes completos de uma escola para uso administrativo, incluindo:
        - Dados cadastrais completos
        - Informações do responsável
        - Receita estimada (`incomeValue`)
        - Informações do plano de assinatura atual (se houver)
        - Dados da conta no provedor de pagamentos (Asaas)
        - Status de onboarding/KYC

        Requer autenticação com persona ADMIN.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: schoolId
          required: true
          schema:
            type: string
            format: uuid
          description: Identificador da escola
      responses:
        '200':
          description: Detalhes da escola retornados com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSchoolDetailsResponse'
        '401':
          description: Usuário não autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags:
        - Admin
      summary: Atualizar dados de uma escola
      description: |
        Atualiza dados cadastrais e de configuração de uma escola.

        - Permite alterar nome, email, telefone e CNPJ
        - Permite atualizar informações do responsável
        - Permite ajustar `incomeValue` e links públicos da escola
        - Retorna sempre a visão administrativa completa da escola após a atualização

        Requer autenticação com persona ADMIN.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: schoolId
          required: true
          schema:
            type: string
            format: uuid
          description: Identificador da escola
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUpdateSchoolInput'
      responses:
        '200':
          description: Escola atualizada com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSchoolDetailsResponse'
        '400':
          description: Erro de validação ou regra de negócio.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Usuário não autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado (requer persona ADMIN).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Escola não encontrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/schools/{schoolId}/financial:
    get:
      tags:
        - Admin
      summary: Listar financeiro da escola
      description: |
        Retorna o resumo financeiro da escola por ID: saldo disponível, total ganho,
        valores pendentes, atrasados e a lista de solicitações de saque.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: schoolId
          required: true
          schema:
            type: string
            format: uuid
          description: ID da escola
      responses:
        '200':
          description: Financeiro da escola retornado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSchoolFinancialResponse'
        '401':
          description: Usuário não autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado (requer persona ADMIN).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Escola não encontrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/schools/{schoolId}/plans:
    get:
      tags:
        - Admin
      summary: Obter histórico de planos de uma escola
      description: |
        Retorna o plano de assinatura atual e o histórico de planos de uma escola.

        Requer autenticação com persona ADMIN.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: schoolId
          required: true
          schema:
            type: string
            format: uuid
          description: Identificador da escola
      responses:
        '200':
          description: Histórico de planos retornado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSchoolPlansResponse'
        '401':
          description: Usuário não autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado (requer persona ADMIN).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/plans:
    get:
      tags:
        - Admin
      summary: Listar planos de assinatura
      description: Retorna todos os planos de assinatura (ativos e inativos) para gestão no painel admin. Ordenados por valor (amountCents). Requer autenticação com persona ADMIN.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de planos retornada com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminPlansListResponse'
        '401':
          description: Usuário não autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado (requer persona ADMIN).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
        - Admin
      summary: Cadastrar plano de assinatura
      description: Cria um novo plano de assinatura. O código deve ser único. Requer autenticação com persona ADMIN.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminCreatePlanInput'
      responses:
        '201':
          description: Plano criado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminPlanItem'
        '400':
          description: Validação falhou ou código já existe.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Usuário não autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado (requer persona ADMIN).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/plans/{planId}:
    patch:
      tags:
        - Admin
      summary: Editar plano de assinatura
      description: Atualiza um plano existente. Campos do body opcionais. Código deve ser único se informado. Requer autenticação com persona ADMIN.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: planId
          required: true
          schema:
            type: string
            format: uuid
          description: Identificador do plano
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUpdatePlanInput'
      responses:
        '200':
          description: Plano atualizado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminPlanItem'
        '400':
          description: Validação falhou ou código já existe.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Usuário não autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado (requer persona ADMIN).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Plano não encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/categories:
    get:
      tags:
        - Admin
      summary: Listar categorias
      description: Retorna todas as categorias com suas subcategorias para gestão no painel admin. Ordenadas por nome. Requer autenticação com persona ADMIN.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de categorias retornada com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminCategoriesListResponse'
        '401':
          description: Usuário não autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado (requer persona ADMIN).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
        - Admin
      summary: Cadastrar categoria
      description: Cria uma nova categoria. O nome deve ser único. Subcategorias opcionais. Requer autenticação com persona ADMIN.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminCreateCategoryInput'
      responses:
        '201':
          description: Categoria criada com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminCategoryItem'
        '400':
          description: Validação falhou ou nome já existe.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Usuário não autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado (requer persona ADMIN).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/categories/{categoryId}:
    patch:
      tags:
        - Admin
      summary: Editar categoria
      description: Atualiza uma categoria existente. Campos do body opcionais. Nome deve ser único se informado. Subcategorias substituem a lista atual. Requer autenticação com persona ADMIN.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: categoryId
          required: true
          schema:
            type: string
            format: uuid
          description: Identificador da categoria
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUpdateCategoryInput'
      responses:
        '200':
          description: Categoria atualizada com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminCategoryItem'
        '400':
          description: Validação falhou ou nome já existe.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Usuário não autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado (requer persona ADMIN).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Categoria não encontrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/schools/{schoolId}/resend-asaas-account:
    post:
      tags:
        - Admin
      summary: Reenviar solicitação de conta Asaas para escola
      description: |
        Reenvia a solicitação de criação de conta no Asaas para uma escola específica.
        Útil quando há falhas de comunicação durante a criação inicial da escola.
        
        Esta rota:
        - Cria/atualiza a subconta no Asaas com os dados da escola
        - Atualiza a escola com accountId, accountApiKey e walletId
        - Busca o link de onboarding (KYC) após 15 segundos
        - Retorna os dados atualizados da conta
        
        **Requisitos:**
        - Escola deve ter pelo menos um endereço completo (rua, número e CEP com 8 dígitos)
        - Asaas provider deve estar configurado
        
        Requer autenticação com persona ADMIN.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: schoolId
          required: true
          schema:
            type: string
            format: uuid
          description: Identificador da escola
      responses:
        '200':
          description: Conta Asaas criada/atualizada com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResendAsaasAccountResponse'
        '400':
          description: Erro ao criar conta (escola sem endereço, endereço incompleto, ou erro do Asaas).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResendAsaasAccountResponse'
        '401':
          description: Usuário não autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado (requer persona ADMIN).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Escola não encontrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/students:
    get:
      tags:
        - Admin
      summary: Listar todos os estudantes do sistema
      description: |
        Retorna a lista de todos os estudantes (matrículas ativas) do sistema,
        paginada e com filtros por nome, escola e CPF.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: name
          required: false
          schema:
            type: string
          description: Filtrar por nome do estudante (contém, case-insensitive).
        - in: query
          name: schoolId
          required: false
          schema:
            type: string
            format: uuid
          description: Filtrar por ID da escola.
        - in: query
          name: cpf
          required: false
          schema:
            type: string
          description: Filtrar por CPF do estudante (aceita com ou sem formatação).
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
          description: Quantidade máxima de registros por página.
        - in: query
          name: offset
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Quantidade de registros a pular (paginação).
      responses:
        '200':
          description: Lista de estudantes retornada com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminAllStudentsListResponse'
        '401':
          description: Usuário não autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado (requer persona ADMIN).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/schools/{schoolId}/students:
    get:
      tags:
        - Admin
      summary: Listar alunos de uma escola
      description: |
        Retorna a lista de alunos (usuário + dependentes) matriculados em uma escola,
        incluindo informações de curso, turma e responsável.

        Esta rota é apenas de visualização para o painel administrativo.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: schoolId
          required: true
          schema:
            type: string
            format: uuid
          description: ID da escola
        - in: query
          name: name
          required: false
          schema:
            type: string
          description: Filtrar por nome do aluno ou dependente (contém, case-insensitive).
        - in: query
          name: courseId
          required: false
          schema:
            type: string
            format: uuid
          description: Filtrar por curso.
        - in: query
          name: classId
          required: false
          schema:
            type: string
            format: uuid
          description: Filtrar por turma.
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
          description: Quantidade máxima de registros a retornar.
        - in: query
          name: offset
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Quantidade de registros a pular (para paginação).
      responses:
        '200':
          description: Lista de alunos retornada com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSchoolStudentsListResponse'
        '401':
          description: Usuário não autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado (requer persona ADMIN).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/schools/{schoolId}/students/{studentId}:
    get:
      tags:
        - Admin
      summary: Obter detalhes de um aluno na escola
      description: |
        Retorna os detalhes de um aluno dentro do contexto de uma escola,
        incluindo dados do aluno, responsável (quando dependente), matrículas
        ativas e histórico de cobranças pagas.

        Esta rota é apenas de visualização para o painel administrativo.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: schoolId
          required: true
          schema:
            type: string
            format: uuid
          description: ID da escola
        - in: path
          name: studentId
          required: true
          schema:
            type: string
            format: uuid
          description: ID do aluno (usuário ou dependente)
      responses:
        '200':
          description: Detalhes do aluno retornados com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSchoolStudentDetailsResponse'
        '401':
          description: Usuário não autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado (requer persona ADMIN).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Aluno não encontrado ou não vinculado à escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/schools/{schoolId}/students/{studentId}/payments:
    get:
      tags:
        - Admin
      summary: Listar pagamentos de um aluno na escola
      description: |
        Retorna o histórico de cobranças pagas de um aluno (usuário ou dependente)
        dentro de uma escola específica.

        Esta rota é apenas de visualização para o painel administrativo.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: schoolId
          required: true
          schema:
            type: string
            format: uuid
          description: ID da escola
        - in: path
          name: studentId
          required: true
          schema:
            type: string
            format: uuid
          description: ID do aluno (usuário ou dependente)
      responses:
        '200':
          description: Lista de pagamentos do aluno retornada com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSchoolStudentPaymentsResponse'
        '401':
          description: Usuário não autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado (requer persona ADMIN).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Aluno não encontrado ou não vinculado à escola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/schools/{schoolId}/payments:
    get:
      tags:
        - Admin
      summary: Listar cobranças financeiras da escola (visão mensal)
      description: |
        Retorna as cobranças financeiras de uma escola em um determinado mês/ano,
        incluindo informações do aluno, curso, turma, valores e status.

        Esta rota é apenas de visualização para o painel administrativo.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: schoolId
          required: true
          schema:
            type: string
            format: uuid
          description: ID da escola
        - in: query
          name: month
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 12
          description: Mês de referência (1-12).
        - in: query
          name: year
          required: true
          schema:
            type: integer
            minimum: 2000
            maximum: 3000
          description: Ano de referência.
        - in: query
          name: classId
          required: false
          schema:
            type: string
            format: uuid
          description: Filtrar por turma.
        - in: query
          name: studentName
          required: false
          schema:
            type: string
          description: Filtrar por nome do aluno (responsável ou dependente).
        - in: query
          name: status
          required: false
          schema:
            type: string
          description: Filtrar por status da cobrança (OPEN, PAID, OVERDUE).
      responses:
        '200':
          description: Lista de cobranças retornada com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSchoolPaymentsListResponse'
        '400':
          description: Erro de validação nos parâmetros (mês/ano/status).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Usuário não autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado (requer persona ADMIN).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/schools/{schoolId}/payments/paid:
    get:
      tags:
        - Admin
      summary: Listar pagamentos já recebidos da escola
      description: |
        Retorna o histórico de cobranças já pagas de uma escola, com paginação
        e filtro por nome do aluno.

        Esta rota é apenas de visualização para o painel administrativo.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: schoolId
          required: true
          schema:
            type: string
            format: uuid
          description: ID da escola
        - in: query
          name: studentName
          required: false
          schema:
            type: string
          description: Filtrar por nome do aluno (responsável ou dependente).
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
          description: Quantidade máxima de registros a retornar.
        - in: query
          name: offset
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Quantidade de registros a pular (para paginação).
      responses:
        '200':
          description: Lista de pagamentos pagos retornada com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminPaidSchoolPaymentsResponse'
        '401':
          description: Usuário não autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado (requer persona ADMIN).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/dashboard:
    get:
      tags:
        - Admin
      summary: Obter dados consolidados do dashboard
      description: |
        Retorna informações consolidadas para o dashboard administrativo:
        - Total de alunos cadastrados
        - Total de turmas ativas
        - Previsão de receita do mês atual
        - Últimos 5 alunos matriculados
        
        Requer autenticação com persona ADMIN.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Dados do dashboard retornados com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminDashboardResponse'
        '401':
          description: Usuário não autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado (requer persona ADMIN).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
