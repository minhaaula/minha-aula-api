        - code
        - name
        - amountCents
        - currency
        - billingCycle
        - isActive
        - isPrimary
        - createdAt
        - updatedAt
    AdminCreatePlanInput:
      type: object
      properties:
        code:
          type: string
          minLength: 1
          maxLength: 32
        name:
          type: string
          minLength: 1
          maxLength: 191
        description:
          type: string
          maxLength: 255
          nullable: true
        items:
          type: array
          items:
            type: string
          nullable: true
        amountCents:
          type: integer
          minimum: 1
        isActive:
          type: boolean
        isPrimary:
          type: boolean
