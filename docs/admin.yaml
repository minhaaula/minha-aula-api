          type: boolean
          description: True se a escola já tiver ao menos um pagamento concluído (invoice PAID)
        onboardingCompleted:
          type: boolean
          description: Indica se o onboarding/KYC foi concluído
        accountId:
          type: string
          nullable: true
          description: ID da conta no Asaas associada à escola (null se não houver conta)
      required:
