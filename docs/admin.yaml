      type: object
      properties:
        plans:
          type: array
          items:
            $ref: '#/components/schemas/AdminPlanItem'
      required:
        - plans
    AdminPlanItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
          example: BASIC
        name:
          type: string
        description:
          type: string
          nullable: true
        items:
          type: array
          items:
            type: string
          nullable: true
        amountCents:
          type: integer
          minimum: 1
        currency:
          type: string
          minLength: 3
          maxLength: 3
