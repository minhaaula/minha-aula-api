              - id
              - name
      required:
        - id
        - name
        - subcategories
    AdminCreateCategoryInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 191
        icon:
          type: string
          maxLength: 191
          nullable: true
        description:
          type: string
          maxLength: 5000
          nullable: true
        subcategories:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
                minLength: 1
                maxLength: 191
            required:
              - name
      required:
        - name
    AdminUpdateCategoryInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 191
        icon:
          type: string
          maxLength: 191
          nullable: true
        description:
          type: string
          maxLength: 5000
          nullable: true
