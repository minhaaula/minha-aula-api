components:
  schemas:
    QueueNotConfiguredResponse:
      type: object
      description: Resposta quando a fila não está configurada (REDIS_HOST ausente).
      properties:
        error:
          type: string
          example: Queue not configured
        message:
          type: string
          example: REDIS_HOST não está configurado. A fila de jobs não está disponível.
      required:
        - error
        - message
    CronExecutionLogEntry:
      type: object
      description: Registro de execução de um CRON/job repetitivo (persistido em cron_logs).
      properties:
        id:
          type: string
          format: uuid
        cronName:
          type: string
          maxLength: 128
        startedAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
        status:
          type: string
          enum: [completed, failed]
        errorMessage:
          type: string
          nullable: true
          description: Mensagem de erro com stack trace quando houver falha.
      required: [id, cronName, startedAt, finishedAt, status]

    CronLogListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CronExecutionLogEntry'
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
      required: [items, total, limit, offset]

    CronLastExecution:
      type: object
      nullable: true
      properties:
        id:
          type: string
          format: uuid
        startedAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
        status:
          type: string
          enum: [completed, failed]
        errorMessage:
          type: string
          nullable: true
      required: [id, startedAt, finishedAt, status]

    CronEntry:
      type: object
      description: CRON/job repetitivo cadastrado no BullMQ.
      properties:
        id:
          type: string
          description: Identificador do CRON (nome do job).
        cronName:
          type: string
        schedule:
          type: string
          nullable: true
          description: Pattern CRON do BullMQ (quando disponível).
        next:
          type: string
          format: date-time
          nullable: true
        lastExecution:
