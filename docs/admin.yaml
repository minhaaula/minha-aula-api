      summary: Gerar conta Asaas da escola
      description: |
        Gera (ou recria) a conta Asaas (subconta) para uma escola. Use esta rota quando
        houver falha no fluxo automático (ex. primeira fatura, webhook) e for necessário
        criar a conta manualmente.
        
        Comportamento idêntico a `resend-asaas-account`:
        - Cria/atualiza a subconta no Asaas com os dados da escola
        - Atualiza a escola com accountId, accountApiKey e walletId
        - Busca o link de onboarding (KYC) após 15 segundos
        
        **Requisitos:** Escola com endereço completo (rua, número, CEP 8 dígitos). Asaas configurado.
        Requer autenticação com persona ADMIN.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: schoolId
          required: true
          schema:
            type: string
            format: uuid
          description: Identificador da escola
      responses:
        '200':
          description: Conta Asaas criada/atualizada com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResendAsaasAccountResponse'
        '400':
          description: Erro ao criar conta (escola sem endereço, endereço incompleto, ou erro do Asaas).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResendAsaasAccountResponse'
        '401':
          description: Usuário não autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado (requer persona ADMIN).
