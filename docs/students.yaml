x-student-auth-info: |
  Para autenticação, registro e gerenciamento de senha de estudantes (usuários com persona STUDENT),
  utilize as rotas do módulo Auth (/auth/*):
  - POST /auth/register - Cadastro de estudante
  - POST /auth/login - Login de estudante
  - PATCH /auth/password - Alteração de senha (quando logado)
  - POST /auth/password/request - Solicitar reset de senha
  - POST /auth/password/validate - Validar token de reset
  - POST /auth/password/reset - Resetar senha com token

paths:
  /students:
    get:
      tags:
        - Students
      summary: Listar alunos com dependentes
      description: Requer persona ADMIN ou SCHOOL. Quando autenticado como escola, cada aluno inclui o objeto `schoolContext` com as turmas, cursos e categorias vinculados na instituição.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: cpf
          required: false
          schema:
            type: string
            example: '12345678909'
          description: Filtrar pelo CPF de um aluno específico.
        - in: query
          name: name
          required: false
          schema:
            type: string
            example: Maria
          description: Filtrar alunos cujo nome contenha o valor informado (case insensitive).
        - in: query
          name: courseId
          required: false
          schema:
            type: string
            format: uuid
          description: Filtrar alunos com matrícula ativa em turmas do curso informado.
      responses:
        '200':
          description: Lista de alunos cadastrados.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentsListResponse'
        '400':
          description: Erro na requisição.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /students/directory/{cpf}:
    get:
      tags:
        - Students
      summary: Listar alunos para convites
      description: Permite ADMIN ou SCHOOL localizarem um aluno ou dependente pelo CPF. Quando o CPF pertence a um dependente, os dados do responsável são incluídos na resposta.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: cpf
          required: true
          schema:
            type: string
            example: '12345678909'
          description: CPF do aluno a ser localizado.
      responses:
        '200':
          description: Dados do aluno ou dependente encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentDirectoryResponse'
        '400':
          description: Erro na requisição.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: CPF não encontrado na base.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /students/courses:
    get:
      tags:
        - Students
      summary: Listar meus cursos
      description: Retorna todos os cursos ativos do usuário logado e seus dependentes, incluindo informações do curso, escola, aluno, categoria, subcategoria, cidade e horários da turma. Requer persona STUDENT.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de cursos do usuário e seus dependentes.
          content:
            application/json:
              schema:
                type: object
                properties:
                  courses:
                    type: array
                    items:
                      type: object
                      properties:
                        courseName:
                          type: string
                          description: Nome do curso
                        schoolName:
                          type: string
                          description: Nome da escola
                        studentName:
                          type: string
                          description: Nome do aluno (usuário ou dependente)
                        category:
                          type: string
                          nullable: true
                          description: Nome da categoria do curso
                        subcategory:
                          type: string
                          nullable: true
                          description: Nome da subcategoria do curso
                        city:
                          type: string
                          nullable: true
                          description: Cidade da escola
                        schedule:
                          type: array
                          description: Horários da turma (dia da semana e horários)
                          items:
                            type: object
                            properties:
                              day:
                                type: string
                                description: Dia da semana (ex: Segunda, Terça)
                                example: Segunda
                              start:
                                type: string
                                pattern: '^([01]\\d|2[0-3]):[0-5]\\d$'
                                description: Horário de início no formato HH:MM
                                example: '08:00'
                              end:
                                type: string
                                pattern: '^([01]\\d|2[0-3]):[0-5]\\d$'
                                description: Horário de término no formato HH:MM
                                example: '09:00'
                            required:
                              - day
                              - start
                              - end
                      required:
                        - courseName
                        - schoolName
                        - studentName
                        - category
                        - subcategory
                        - city
                        - schedule
                required:
                  - courses
        '401':
          description: Não autorizado. Token inválido ou ausente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado. Requer persona STUDENT.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade de listagem de cursos não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /students/courses/all:
    get:
      tags:
        - Students
      summary: Listar todos os cursos cadastrados no sistema
      description: Retorna todos os cursos ativos cadastrados no sistema, com informações do curso, escola, categoria e subcategoria. Permite filtrar por nome do curso, categoria, subcategoria e cidade da escola. Esta rota é pública e não requer autenticação.
      parameters:
        - in: query
          name: name
          required: false
          schema:
            type: string
          description: Filtrar cursos cujo nome contenha o valor informado (case insensitive).
        - in: query
          name: categoryId
          required: false
          schema:
            type: string
          description: Filtrar cursos pela categoria (ID da categoria).
        - in: query
          name: subcategoryId
          required: false
          schema:
            type: string
          description: Filtrar cursos pela subcategoria (ID da subcategoria).
        - in: query
          name: city
          required: false
          schema:
            type: string
          description: Filtrar cursos pela cidade da escola (case insensitive).
      responses:
        '200':
          description: Lista de cursos encontrados.
          content:
            application/json:
              schema:
                type: object
                properties:
                  courses:
                    type: array
                    items:
                      type: object
                      properties:
                        courseName:
                          type: string
                          description: Nome do curso
                        schoolName:
                          type: string
                          description: Nome da escola
                        courseDescription:
                          type: string
                          nullable: true
                          description: Detalhes/descrição do curso
                        category:
                          type: string
                          nullable: true
                          description: Nome da categoria do curso
                        subcategory:
                          type: string
                          nullable: true
                          description: Nome da subcategoria do curso
                      required:
                        - courseName
                        - schoolName
                        - courseDescription
                        - category
                        - subcategory
                required:
                  - courses
        '400':
          description: Erro na requisição. Parâmetros de filtro inválidos.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade de listagem de cursos não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /students/payments:
    get:
      tags:
        - Students
      summary: Listar pagamentos do estudante
      description: Retorna os pagamentos (cobranças financeiras) do usuário logado e seus dependentes, incluindo informações do curso, aluno, valor, data de vencimento e status. Requer persona STUDENT.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum: [pendente, atrasado, pago]
          description: Filtrar pagamentos por status (pendente, atrasado ou pago).
        - in: query
          name: isPaid
          required: false
          schema:
            type: boolean
          description: Filtrar apenas pagos (true) ou apenas em aberto (false). Quando true, retorna apenas pagamentos com status 'pago'. Quando false, retorna apenas pagamentos pendentes ou em atraso.
      responses:
        '200':
          description: Lista de pagamentos do estudante.
          content:
            application/json:
              schema:
                type: object
                properties:
                  payments:
                    type: array
                    items:
                      type: object
                      properties:
                        courseName:
                          type: string
                          description: Nome do curso
                        studentName:
                          type: string
                          description: Nome do aluno (usuário ou dependente)
                        amountCents:
                          type: integer
                          format: int64
                          description: Valor do pagamento em centavos
                        dueDate:
                          type: string
                          format: date
                          description: Data de vencimento do pagamento
                        status:
                          type: string
                          enum: [pendente, atrasado, pago, cancelado, falhou]
                          description: Status do pagamento
                      required:
                        - courseName
                        - studentName
                        - amountCents
                        - dueDate
                        - status
                required:
                  - payments
        '401':
          description: Não autorizado. Token inválido ou ausente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado. Requer persona STUDENT.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade de listagem de pagamentos não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
