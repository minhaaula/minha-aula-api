  /students/enrollments/{enrollmentId}/timeline:
    get:
      tags:
        - Students
      summary: Timeline agregada da matrícula (aluno/responsável)
      description: |
        Retorna a linha do tempo da matrícula no app dos pais: matrícula, promoções de nível,
        certificados emitidos e marcos customizados da escola, em ordem cronológica.

        **Visibilidade do aluno:** histórico **completo**, inclusive após desmatrícula (`CANCELLED` ou `COMPLETED`).
        A escola, na rota homônoma sob `/schools/...`, vê apenas o período em que a matrícula esteve ativa.

        Requer persona **STUDENT** e que a matrícula pertença ao usuário autenticado (`owner_user_id`).

        Paginação: `limit` (1–100, padrão 30), `offset`, `order` (`asc` | `desc`, padrão `asc`).
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: enrollmentId
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 30
        - in: query
          name: offset
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - in: query
          name: order
          required: false
          schema:
            type: string
            enum:
              - asc
              - desc
            default: asc
      responses:
        '200':
          description: Timeline paginada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnrollmentTimelinePageResponse'
        '401':
          description: Não autorizado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Matrícula não encontrada para este usuário.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /students/schools/{schoolId}:
    get:
      tags:
        - Students
      summary: Obter detalhes de uma escola
      description: |
        Retorna os dados públicos de uma escola específica, incluindo nome, contato, endereços, links das redes sociais e imagens. 
        
        Esta rota é pública e não requer autenticação. No entanto, se o usuário estiver autenticado, o campo `canReview` será calculado 
        indicando se o aluno pode avaliar a escola (true apenas se estiver matriculado na escola ou algum dependente, e ainda não tiver realizado avaliação).
      parameters:
        - in: path
          name: schoolId
          required: true
          schema:
            type: string
            format: uuid
          description: ID da escola
      responses:
        '200':
          description: Dados da escola encontrados.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                    description: ID da escola
                  name:
                    type: string
                    description: Nome da escola
                  email:
                    type: string
                    format: email
                    description: Email de contato da escola
                  phone:
                    type: string
                    description: Telefone de contato da escola
                  addresses:
                    type: array
                    description: Lista de endereços da escola
                    items:
                      type: object
                      properties:
                        street:
                          type: string
                          description: Nome da rua
                        number:
                          type: string
                          description: Número do endereço
                        complement:
                          type: string
                          nullable: true
                          description: Complemento do endereço
                        district:
                          type: string
                          nullable: true
                          description: Bairro
                        city:
                          type: string
                          description: Cidade
                        state:
                          type: string
                          description: Estado (UF)
                        zipCode:
                          type: string
                          description: CEP (apenas dígitos)
                      required:
                        - street
                        - number
                        - city
                        - state
                        - zipCode
                  links:
                    type: object
                    description: Links das redes sociais e site da escola
                    properties:
                      facebook:
                        type: string
                        nullable: true
                        format: uri
                        description: Link do Facebook
                        example: "https://facebook.com/escola"
                      instagram:
                        type: string
                        nullable: true
                        format: uri
                        description: Link do Instagram
                        example: "https://instagram.com/escola"
                      tiktok:
                        type: string
                        nullable: true
                        format: uri
                        description: Link do TikTok
                        example: "https://tiktok.com/@escola"
                      youtube:
                        type: string
                        nullable: true
                        format: uri
                        description: Link do YouTube
                        example: "https://youtube.com/@escola"
                      site:
                        type: string
                        nullable: true
                        format: uri
                        description: Link do site
                        example: "https://escola.com.br"
                    required:
                      - facebook
                      - instagram
                      - tiktok
                      - youtube
                      - site
                  images:
                    type: array
                    description: Lista de imagens da escola (URLs assinadas válidas por 1 hora)
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                          description: ID da imagem
                        url:
                          type: string
                          format: uri
                          description: URL assinada da imagem (válida por 1 hora)
                        key:
                          type: string
                          description: Chave do arquivo no storage
                        contentType:
                          type: string
                          description: Tipo MIME da imagem
                          example: "image/jpeg"
                        originalFileName:
                          type: string
                          description: Nome original do arquivo enviado
                        category:
                          type: string
                          description: Categoria da imagem
                          enum: [GALLERY, LOGO, BANNER, COVER, OTHER]
                          example: "GALLERY"
                        createdAt:
                          type: string
                          format: date-time
                          description: Data de criação da imagem
                      required:
                        - id
                        - url
                        - key
                        - contentType
                        - originalFileName
                        - category
                        - createdAt
                  createdAt:
                    type: string
                    format: date-time
                    description: Data de criação da escola
                  canReview:
                    type: boolean
                    description: |
                      Indica se o aluno autenticado pode avaliar a escola. 
                      Retorna `true` apenas se:
                      - O aluno estiver matriculado na escola (ou algum dependente)
                      - O aluno ainda não tiver realizado avaliação para esta escola
                      
                      Sempre retorna `false` se o usuário não estiver autenticado.
                    example: false
                required:
                  - id
                  - name
                  - email
                  - phone
                  - canReview
                  - addresses
                  - links
                  - images
                  - createdAt
        '400':
          description: Erro na requisição. ID da escola inválido.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Escola não encontrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade de detalhes da escola não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /students/schools/{schoolId}/courses:
