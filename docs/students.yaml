                        sentAt: '2024-07-15T10:30:00.000Z'
                        readAt: null
                      - id: '660e8400-e29b-41d4-a716-446655440001'
                        scope: CLASS
                        schoolId: 'a585a342-650a-4ab7-a606-07ae09bb72e1'
                        userId: '789e4567-e89b-12d3-a456-426614174000'
                        courseClassId: '456e4567-e89b-12d3-a456-426614174002'
                        title: 'Aula hoje às 14h'
                        message: 'Você tem uma aula de Matemática hoje às 14:00.'
