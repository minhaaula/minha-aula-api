          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /students/notifications/{notificationId}/read:
    put:
      tags:
        - Students
      summary: Marcar uma notificação como lida
      description: >-
        Marca uma notificação do aluno autenticado como lida (in-app). Só aplica a notificações cujo `userId` é o próprio aluno (ex.: `scope` USER).
