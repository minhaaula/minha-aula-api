x-student-auth-info: |
  Para autenticação, registro e gerenciamento de senha de estudantes (usuários com persona STUDENT),
  utilize as rotas do módulo Auth (/auth/*):
  - POST /auth/register - Cadastro de estudante
  - POST /auth/login - Login de estudante
  - PATCH /auth/password - Alteração de senha (quando logado)
  - POST /auth/password/request - Solicitar reset de senha
  - POST /auth/password/validate - Validar token de reset
  - POST /auth/password/reset - Resetar senha com token

paths:
  /students:
    get:
      tags:
        - Students
      summary: Listar alunos com dependentes
      description: Requer persona ADMIN ou SCHOOL. Quando autenticado como escola, cada aluno inclui o objeto `schoolContext` com as turmas, cursos e categorias vinculados na instituição.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: cpf
          required: false
          schema:
            type: string
            example: '12345678909'
          description: Filtrar pelo CPF de um aluno específico.
        - in: query
          name: name
          required: false
          schema:
            type: string
            example: Maria
          description: Filtrar alunos cujo nome contenha o valor informado (case insensitive).
        - in: query
          name: courseId
          required: false
          schema:
            type: string
            format: uuid
          description: Filtrar alunos com matrícula ativa em turmas do curso informado.
      responses:
        '200':
          description: Lista de alunos cadastrados.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentsListResponse'
        '400':
          description: Erro na requisição.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /students/directory/{cpf}:
    get:
      tags:
        - Students
      summary: Listar alunos para convites
      description: Permite ADMIN ou SCHOOL localizarem um aluno ou dependente pelo CPF. Quando o CPF pertence a um dependente, os dados do responsável são incluídos na resposta.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: cpf
          required: true
          schema:
            type: string
            example: '12345678909'
          description: CPF do aluno a ser localizado.
      responses:
        '200':
          description: Dados do aluno ou dependente encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentDirectoryResponse'
        '400':
          description: Erro na requisição.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: CPF não encontrado na base.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /students/me:
    get:
      tags:
        - Students
      summary: Obter dados do estudante logado
      description: Retorna os dados completos do estudante autenticado, incluindo informações pessoais e lista de dependentes. Requer persona STUDENT.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Dados do estudante logado.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                    description: ID do estudante
                  fullName:
                    type: string
                    description: Nome completo do estudante
                  email:
                    type: string
                    format: email
                    description: Email do estudante
                  cpf:
                    type: string
                    description: CPF do estudante (apenas dígitos)
                  phone:
                    type: string
                    description: Telefone do estudante
                  birthDate:
                    type: string
                    format: date
                    description: Data de nascimento do estudante
                  createdAt:
                    type: string
                    format: date-time
                    description: Data de cadastro do estudante
                  dependents:
                    type: array
                    description: Lista de dependentes do estudante
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                          description: ID do dependente
                        fullName:
                          type: string
                          description: Nome completo do dependente
                        cpf:
                          type: string
                          nullable: true
                          description: CPF do dependente (apenas dígitos)
                        birthDate:
                          type: string
                          format: date
                          nullable: true
                          description: Data de nascimento do dependente
                        relationship:
                          type: string
                          nullable: true
                          description: "Relacionamento com o responsável (ex: Filho, Filha)"
                      required:
                        - id
                        - fullName
                        - cpf
                        - birthDate
                        - relationship
                required:
                  - id
                  - fullName
                  - email
                  - cpf
                  - phone
                  - birthDate
                  - createdAt
                  - dependents
        '401':
          description: Não autorizado. Token inválido ou ausente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado. Requer persona STUDENT.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Estudante não encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade de perfil do estudante não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - Students
      summary: Editar dados do estudante logado
      description: Permite atualizar os dados pessoais do estudante autenticado. Todos os campos são opcionais - apenas os campos enviados serão atualizados. Requer persona STUDENT.
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                fullName:
                  type: string
                  minLength: 3
                  description: Nome completo do estudante
                  example: João Silva
                email:
                  type: string
                  format: email
                  description: Email do estudante
                  example: joao.silva@example.com
                phone:
                  type: string
                  description: Telefone do estudante (apenas dígitos)
                  example: '11999999999'
                address:
                  type: object
                  description: Endereço do estudante
                  properties:
                    street:
                      type: string
                      minLength: 1
                      description: Nome da rua
                      example: Rua das Flores
                    number:
                      type: string
                      minLength: 1
                      description: Número do endereço
                      example: '123'
                    complement:
                      type: string
                      nullable: true
                      description: Complemento do endereço (apto, bloco, etc)
                      example: Apto 45
                    district:
                      type: string
                      nullable: true
                      description: Bairro
                      example: Centro
                    city:
                      type: string
                      minLength: 1
                      description: Cidade
                      example: São Paulo
                    state:
                      type: string
                      minLength: 1
                      description: Estado (UF)
                      example: SP
                    zipCode:
                      type: string
                      description: CEP (apenas dígitos)
                      example: '01234567'
                  required:
                    - street
                    - number
                    - city
                    - state
                    - zipCode
              example:
                fullName: João Silva
                email: joao.silva@example.com
                phone: '11999999999'
                address:
                  street: Rua das Flores
                  number: '123'
                  complement: Apto 45
                  district: Centro
                  city: São Paulo
                  state: SP
                  zipCode: '01234567'
      responses:
        '200':
          description: Dados do estudante atualizados com sucesso.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                    description: ID do estudante
                  fullName:
                    type: string
                    description: Nome completo do estudante
                  email:
                    type: string
                    format: email
                    description: Email do estudante
                  cpf:
                    type: string
                    description: CPF do estudante (apenas dígitos)
                  phone:
                    type: string
                    description: Telefone do estudante
                  birthDate:
                    type: string
                    format: date
                    description: Data de nascimento do estudante
                  address:
                    type: object
                    description: Endereço do estudante
                    properties:
                      street:
                        type: string
                        description: Nome da rua
                      number:
                        type: string
                        description: Número do endereço
                      complement:
                        type: string
                        nullable: true
                        description: Complemento do endereço
                      district:
                        type: string
                        nullable: true
                        description: Bairro
                      city:
                        type: string
                        description: Cidade
                      state:
                        type: string
                        description: Estado (UF)
                      zipCode:
                        type: string
                        description: CEP (apenas dígitos)
                    required:
                      - street
                      - number
                      - city
                      - state
                      - zipCode
                  createdAt:
                    type: string
                    format: date-time
                    description: Data de cadastro do estudante
                required:
                  - id
                  - fullName
                  - email
                  - cpf
                  - phone
                  - birthDate
                  - address
                  - createdAt
        '400':
          description: Erro na validação dos dados enviados.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Não autorizado. Token inválido ou ausente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado. Requer persona STUDENT.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Estudante não encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade de edição de perfil do estudante não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /students/courses:
    get:
      tags:
        - Students
      summary: Listar meus cursos
      description: Retorna todos os cursos ativos do usuário logado e seus dependentes, incluindo informações do curso, escola, aluno, categoria, subcategoria, cidade e horários da turma. Requer persona STUDENT.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de cursos do usuário e seus dependentes.
          content:
            application/json:
              schema:
                type: object
                properties:
                  courses:
                    type: array
                    items:
                      type: object
                      properties:
                        courseName:
                          type: string
                          description: Nome do curso
                        schoolName:
                          type: string
                          description: Nome da escola
                        studentName:
                          type: string
                          description: Nome do aluno (usuário ou dependente)
                        category:
                          type: string
                          nullable: true
                          description: Nome da categoria do curso
                        subcategory:
                          type: string
                          nullable: true
                          description: Nome da subcategoria do curso
                        city:
                          type: string
                          nullable: true
                          description: Cidade da escola
                        schedule:
                          type: array
                          description: Horários da turma (dia da semana e horários)
                          items:
                            type: object
                            properties:
                              day:
                                type: string
                                description: "Dia da semana (ex: Segunda, Terça)"
                                example: Segunda
                              start:
                                type: string
                                pattern: '^([01]\\d|2[0-3]):[0-5]\\d$'
                                description: Horário de início no formato HH:MM
                                example: '08:00'
                              end:
                                type: string
                                pattern: '^([01]\\d|2[0-3]):[0-5]\\d$'
                                description: Horário de término no formato HH:MM
                                example: '09:00'
                            required:
                              - day
                              - start
                              - end
                      required:
                        - courseName
                        - schoolName
                        - studentName
                        - category
                        - subcategory
                        - city
                        - schedule
                required:
                  - courses
        '401':
          description: Não autorizado. Token inválido ou ausente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado. Requer persona STUDENT.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade de listagem de cursos não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /students/courses/all:
    get:
      tags:
        - Students
      summary: Listar todos os cursos cadastrados no sistema
      description: Retorna todos os cursos ativos cadastrados no sistema, com informações do curso, escola, categoria e subcategoria. Permite filtrar por nome do curso, categoria, subcategoria e cidade da escola. Esta rota é pública e não requer autenticação.
      parameters:
        - in: query
          name: name
          required: false
          schema:
            type: string
          description: Filtrar cursos cujo nome contenha o valor informado (case insensitive).
        - in: query
          name: categoryId
          required: false
          schema:
            type: string
          description: Filtrar cursos pela categoria (ID da categoria).
        - in: query
          name: subcategoryId
          required: false
          schema:
            type: string
          description: Filtrar cursos pela subcategoria (ID da subcategoria).
        - in: query
          name: city
          required: false
          schema:
            type: string
          description: Filtrar cursos pela cidade da escola (case insensitive).
      responses:
        '200':
          description: Lista de cursos encontrados.
          content:
            application/json:
              schema:
                type: object
                properties:
                  courses:
                    type: array
                    items:
                      type: object
                      properties:
                        courseName:
                          type: string
                          description: Nome do curso
                        schoolName:
                          type: string
                          description: Nome da escola
                        courseDescription:
                          type: string
                          nullable: true
                          description: Detalhes/descrição do curso
                        category:
                          type: string
                          nullable: true
                          description: Nome da categoria do curso
                        subcategory:
                          type: string
                          nullable: true
                          description: Nome da subcategoria do curso
                      required:
                        - courseName
                        - schoolName
                        - courseDescription
                        - category
                        - subcategory
                required:
                  - courses
        '400':
          description: Erro na requisição. Parâmetros de filtro inválidos.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade de listagem de cursos não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /students/payments:
    get:
      tags:
        - Students
      summary: Listar pagamentos do estudante
      description: Retorna os pagamentos (cobranças financeiras) do usuário logado e seus dependentes, incluindo informações do curso, aluno, valor, data de vencimento e status. Requer persona STUDENT.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum: [pendente, atrasado, pago]
          description: Filtrar pagamentos por status (pendente, atrasado ou pago).
        - in: query
          name: isPaid
          required: false
          schema:
            type: boolean
          description: Filtrar apenas pagos (true) ou apenas em aberto (false). Quando true, retorna apenas pagamentos com status 'pago'. Quando false, retorna apenas pagamentos pendentes ou em atraso.
      responses:
        '200':
          description: Lista de pagamentos do estudante.
          content:
            application/json:
              schema:
                type: object
                properties:
                  payments:
                    type: array
                    items:
                      type: object
                      properties:
                        courseName:
                          type: string
                          description: Nome do curso
                        studentName:
                          type: string
                          description: Nome do aluno (usuário ou dependente)
                        amountCents:
                          type: integer
                          format: int64
                          description: Valor do pagamento em centavos
                        dueDate:
                          type: string
                          format: date
                          description: Data de vencimento do pagamento
                        status:
                          type: string
                          enum: [pendente, atrasado, pago, cancelado, falhou]
                          description: Status do pagamento
                      required:
                        - courseName
                        - studentName
                        - amountCents
                        - dueDate
                        - status
                required:
                  - payments
        '401':
          description: Não autorizado. Token inválido ou ausente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado. Requer persona STUDENT.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade de listagem de pagamentos não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /students/enrollment-requests:
    get:
      tags:
        - Students
      summary: Listar meus pedidos de matrícula pendentes
      description: Retorna todos os pedidos de matrícula com status PENDING do estudante logado, incluindo pedidos para o próprio estudante e para seus dependentes. Requer persona STUDENT.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de pedidos de matrícula pendentes do estudante e seus dependentes.
          content:
            application/json:
              schema:
                type: object
                properties:
                  requests:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                          description: ID do pedido de matrícula
                        status:
                          type: string
                          enum: [PENDING]
                          description: Status do pedido (sempre PENDING)
                        schoolId:
                          type: string
                          format: uuid
                          description: ID da escola
                        courseClassId:
                          type: string
                          format: uuid
                          description: ID da turma
                        requestedForUserId:
                          type: string
                          format: uuid
                          description: ID do usuário responsável pelo pedido
                        requestedForDependentId:
                          type: string
                          format: uuid
                          nullable: true
                          description: ID do dependente (quando aplicável)
                        decidedAt:
                          type: string
                          format: date-time
                          nullable: true
                          description: Data da decisão do pedido
                        decidedByUserId:
                          type: string
                          format: uuid
                          nullable: true
                          description: ID do usuário que decidiu o pedido
                        notes:
                          type: string
                          nullable: true
                          description: Observações do pedido
                        discount:
                          type: number
                          nullable: true
                          description: Desconto aplicado (em reais)
                        enrollmentFeeAmount:
                          type: number
                          nullable: true
                          description: Valor da taxa de matrícula (em reais)
                        enrollmentFeeDueDate:
                          type: string
                          format: date
                          nullable: true
                          description: Data de vencimento da taxa de matrícula
                        firstMonthlyPaymentDate:
                          type: string
                          format: date
                          description: Data do primeiro pagamento mensal
                        enrollmentId:
                          type: string
                          format: uuid
                          nullable: true
                          description: ID da matrícula criada (quando aprovado)
                        createdAt:
                          type: string
                          format: date-time
                          description: Data de criação do pedido
                        courseLabel:
                          type: string
                          nullable: true
                          description: Nome do curso
                        courseClassLabel:
                          type: string
                          nullable: true
                          description: Nome da turma
                        studentName:
                          type: string
                          nullable: true
                          description: Nome do aluno
                        dependentName:
                          type: string
                          nullable: true
                          description: Nome do dependente (quando aplicável)
                      required:
                        - id
                        - status
                        - schoolId
                        - courseClassId
                        - requestedForUserId
                        - requestedForDependentId
                        - decidedAt
                        - decidedByUserId
                        - notes
                        - discount
                        - enrollmentFeeAmount
                        - enrollmentFeeDueDate
                        - firstMonthlyPaymentDate
                        - enrollmentId
                        - createdAt
                        - courseLabel
                        - courseClassLabel
                        - studentName
                        - dependentName
                required:
                  - requests
        '401':
          description: Não autorizado. Token inválido ou ausente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado. Requer persona STUDENT.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade de listagem de pedidos de matrícula não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /students/schools/{schoolId}/courses:
    get:
      tags:
        - Students
      summary: Listar cursos de uma escola
      description: Retorna todos os cursos ativos de uma escola específica, incluindo nome do curso, descrição, categoria e subcategorias. Esta rota é pública e não requer autenticação.
      parameters:
        - in: path
          name: schoolId
          required: true
          schema:
            type: string
            format: uuid
          description: ID da escola
      responses:
        '200':
          description: Lista de cursos da escola.
          content:
            application/json:
              schema:
                type: object
                properties:
                  courses:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                          description: ID do curso
                        schoolId:
                          type: string
                          format: uuid
                          description: ID da escola
                        name:
                          type: string
                          description: Nome do curso
                        description:
                          type: string
                          nullable: true
                          description: Descrição do curso
                        categories:
                          type: array
                          description: Lista de categorias do curso
                          items:
                            type: object
                            properties:
                              id:
                                type: string
                                format: uuid
                                description: ID da categoria
                              name:
                                type: string
                                nullable: true
                                description: Nome da categoria
                              subcategories:
                                type: array
                                description: Lista de subcategorias
                                items:
                                  type: object
                                  properties:
                                    id:
                                      type: string
                                      format: uuid
                                      description: ID da subcategoria
                                    name:
                                      type: string
                                      nullable: true
                                      description: Nome da subcategoria
                                  required:
                                    - id
                                    - name
                            required:
                              - id
                              - name
                              - subcategories
                        createdAt:
                          type: string
                          format: date-time
                          description: Data de criação do curso
                      required:
                        - id
                        - schoolId
                        - name
                        - description
                        - categories
                        - createdAt
                required:
                  - courses
        '400':
          description: Erro na requisição. ID da escola inválido.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Escola não encontrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade de listagem de cursos da escola não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
