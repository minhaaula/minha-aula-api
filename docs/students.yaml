                        - categories
                        - createdAt
                required:
                  - courses
        '400':
          description: Erro na requisição. ID da escola inválido.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Escola não encontrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
