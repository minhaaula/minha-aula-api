x-student-auth-info: |
  Para autenticação, registro e gerenciamento de senha de estudantes (usuários com persona STUDENT),
  utilize as rotas do módulo Auth (/auth/*):
  - POST /auth/verification/request (purpose `signup`) e POST /auth/verification/verify — confirmação do telefone no WhatsApp
  - POST /auth/register - Cadastro de estudante (campo `phoneVerificationToken` obrigatório)
  - POST /auth/login - Login de estudante
  - PATCH /auth/password - Alteração de senha (quando logado)
  - POST /auth/verification/request (purpose `user_password_reset` + **cpf**) e POST /auth/verification/verify — código no WhatsApp para esqueci minha senha
  - POST /auth/password/validate - Validar token de reset
  - POST /auth/password/reset - Resetar senha com token (obtido após verificação do WhatsApp)

paths:
  /students:
    get:
      tags:
        - Students
      summary: Listar alunos com dependentes
      description: Requer persona ADMIN ou SCHOOL. Quando autenticado como escola, cada aluno inclui o objeto `schoolContext` com as turmas, cursos e categorias vinculados na instituição.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: cpf
          required: false
          schema:
            type: string
            example: '12345678909'
          description: Filtrar pelo CPF de um aluno específico.
        - in: query
          name: name
          required: false
          schema:
            type: string
            example: Maria
          description: Filtrar alunos cujo nome contenha o valor informado (case insensitive).
        - in: query
          name: courseId
          required: false
          schema:
            type: string
            format: uuid
          description: Filtrar alunos com matrícula ativa em turmas do curso informado.
      responses:
        '200':
          description: Lista de alunos cadastrados.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentsListResponse'
        '400':
          description: Erro na requisição.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /students/directory/{cpf}:
    get:
      tags:
        - Students
      summary: Listar alunos para convites
      description: Permite ADMIN ou SCHOOL localizarem um aluno ou dependente pelo CPF. Quando o CPF pertence a um dependente, os dados do responsável são incluídos na resposta.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: cpf
          required: true
          schema:
            type: string
            example: '12345678909'
          description: CPF do aluno a ser localizado.
      responses:
        '200':
          description: Dados do aluno ou dependente encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentDirectoryResponse'
        '400':
          description: Erro na requisição.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: CPF não encontrado na base.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /students/me:
    get:
      tags:
        - Students
      summary: Obter dados do estudante logado
      description: Retorna os dados completos do estudante autenticado, incluindo informações pessoais e lista de dependentes. Requer persona STUDENT.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Dados do estudante logado.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                    description: ID do estudante
                  fullName:
                    type: string
                    description: Nome completo do estudante
                  email:
                    type: string
                    format: email
                    description: Email do estudante
                  cpf:
                    type: string
                    description: CPF do estudante (apenas dígitos)
                  phone:
                    type: string
                    description: Telefone do estudante
                  birthDate:
                    type: string
                    format: date
                    description: Data de nascimento do estudante
                  address:
                    type: object
                    description: Endereço do estudante
                    properties:
                      street:
                        type: string
                        description: Nome da rua
                      number:
                        type: string
                        description: Número do endereço
                      complement:
                        type: string
                        nullable: true
                        description: Complemento do endereço
                      district:
                        type: string
                        nullable: true
                        description: Bairro
                      city:
                        type: string
                        description: Cidade
                      state:
                        type: string
                        description: Estado (UF)
                      zipCode:
                        type: string
                        description: CEP (apenas dígitos)
                    required:
                      - street
                      - number
                      - city
                      - state
                      - zipCode
                  createdAt:
                    type: string
                    format: date-time
                    description: Data de cadastro do estudante
                  photoUrl:
                    type: string
                    nullable: true
                    format: uri
                    description: URL da foto de perfil (assinada quando configurado storage)
                  dependents:
                    type: array
                    description: Lista de dependentes do estudante
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                          description: ID do dependente
                        fullName:
                          type: string
                          description: Nome completo do dependente
                        cpf:
                          type: string
                          nullable: true
                          description: CPF do dependente (apenas dígitos)
                        birthDate:
                          type: string
                          format: date
                          nullable: true
                          description: Data de nascimento do dependente
                        relationship:
                          type: string
                          nullable: true
                          description: "Relacionamento com o responsável (ex: Filho, Filha)"
                        photoUrl:
                          type: string
                          nullable: true
                          format: uri
                          description: URL da foto de perfil do dependente
                      required:
                        - id
                        - fullName
                        - cpf
                        - birthDate
                        - relationship
                required:
                  - id
                  - fullName
                  - email
                  - cpf
                  - phone
                  - birthDate
                  - address
                  - createdAt
                  - dependents
        '401':
          description: Não autorizado. Token inválido ou ausente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado. Requer persona STUDENT.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Estudante não encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade de perfil do estudante não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - Students
      summary: Editar dados do estudante logado
      description: Permite atualizar os dados pessoais do estudante autenticado. Todos os campos são opcionais - apenas os campos enviados serão atualizados. Requer persona STUDENT.
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                fullName:
                  type: string
                  minLength: 3
                  description: Nome completo do estudante
                  example: João Silva
                email:
                  type: string
                  format: email
                  description: Email do estudante
                  example: joao.silva@example.com
                phone:
                  type: string
                  description: Telefone do estudante (apenas dígitos)
                  example: '11999999999'
                address:
                  type: object
                  description: Endereço do estudante
                  properties:
                    street:
                      type: string
                      minLength: 1
                      description: Nome da rua
                      example: Rua das Flores
                    number:
                      type: string
                      minLength: 1
                      description: Número do endereço
                      example: '123'
                    complement:
                      type: string
                      nullable: true
                      description: Complemento do endereço (apto, bloco, etc)
                      example: Apto 45
                    district:
                      type: string
                      nullable: true
                      description: Bairro
                      example: Centro
                    city:
                      type: string
                      minLength: 1
                      description: Cidade
                      example: São Paulo
                    state:
                      type: string
                      minLength: 1
                      description: Estado (UF)
                      example: SP
                    zipCode:
                      type: string
                      description: CEP (apenas dígitos)
                      example: '01234567'
                  required:
                    - street
                    - number
                    - city
                    - state
                    - zipCode
              example:
                fullName: João Silva
                email: joao.silva@example.com
                phone: '11999999999'
                address:
                  street: Rua das Flores
                  number: '123'
                  complement: Apto 45
                  district: Centro
                  city: São Paulo
                  state: SP
                  zipCode: '01234567'
      responses:
        '200':
          description: Dados do estudante atualizados com sucesso.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                    description: ID do estudante
                  fullName:
                    type: string
                    description: Nome completo do estudante
                  email:
                    type: string
                    format: email
                    description: Email do estudante
                  cpf:
                    type: string
                    description: CPF do estudante (apenas dígitos)
                  phone:
                    type: string
                    description: Telefone do estudante
                  birthDate:
                    type: string
                    format: date
                    description: Data de nascimento do estudante
                  address:
                    type: object
                    description: Endereço do estudante
                    properties:
                      street:
                        type: string
                        description: Nome da rua
                      number:
                        type: string
                        description: Número do endereço
                      complement:
                        type: string
                        nullable: true
                        description: Complemento do endereço
                      district:
                        type: string
                        nullable: true
                        description: Bairro
                      city:
                        type: string
                        description: Cidade
                      state:
                        type: string
                        description: Estado (UF)
                      zipCode:
                        type: string
                        description: CEP (apenas dígitos)
                    required:
                      - street
                      - number
                      - city
                      - state
                      - zipCode
                  createdAt:
                    type: string
                    format: date-time
                    description: Data de cadastro do estudante
                required:
                  - id
                  - fullName
                  - email
                  - cpf
                  - phone
                  - birthDate
                  - address
                  - createdAt
        '400':
          description: Erro na validação dos dados enviados.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Não autorizado. Token inválido ou ausente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado. Requer persona STUDENT.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Estudante não encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade de edição de perfil do estudante não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /students/me/profile-photo:
    post:
      tags:
        - Students
      summary: Enviar ou atualizar foto de perfil do aluno
      description: |
        Faz upload da foto de perfil do estudante autenticado (substitui a anterior, se existir).
        Aceita apenas **JPG** e **PNG** (máx. 5MB). Campo multipart `image`.
        Retorna URL assinada acessível publicamente (validade de 7 dias). Requer persona **STUDENT**.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - image
              properties:
                image:
                  type: string
                  format: binary
      responses:
        '200':
          description: Foto atualizada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfilePhotoResponse'
        '400':
          description: Arquivo ausente ou formato inválido.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Não autorizado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Requer persona STUDENT.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Usuário não encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Students
      summary: Remover foto de perfil do aluno
      description: Remove a foto do storage e zera `photoUrl` no perfil. Requer persona **STUDENT**.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Foto removida (`photoUrl` null).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfilePhotoResponse'
        '401':
          description: Não autorizado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Requer persona STUDENT.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /students/courses:
    get:
      tags:
        - Students
      summary: Listar meus cursos
      description: |
        Retorna os cursos das matrículas ativas do usuário logado e dos seus dependentes
        (inclui cursos **ativos e inativos** na escola), com informações do curso, escola,
        aluno, categoria, subcategoria, cidade e horários da turma.
        O campo `active` indica se o curso está ativo na escola (`courses.is_active`).
        Requer persona STUDENT.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de cursos do usuário e seus dependentes.
          content:
            application/json:
              schema:
                type: object
                properties:
                  courses:
                    type: array
                    items:
                      type: object
                      properties:
                        courseName:
                          type: string
                          description: Nome do curso
                        schoolId:
                          type: string
                          description: ID da escola
                        schoolName:
                          type: string
                          description: Nome da escola
                        schoolLogo:
                          type: string
                          format: uri
                          nullable: true
                          description: URL do logo da escola
                        studentName:
                          type: string
                          description: Nome do aluno (usuário ou dependente)
                        category:
                          type: string
                          nullable: true
                          description: Nome da categoria do curso
                        subcategory:
                          type: string
                          nullable: true
                          description: Nome da subcategoria do curso
                        city:
                          type: string
                          nullable: true
                          description: Cidade da escola
                        active:
                          type: boolean
                          description: Indica se o curso está ativo na escola (`true`) ou foi desativado (`false`)
                        schedule:
                          type: array
                          description: Horários da turma (dia da semana e horários)
                          items:
                            type: object
                            properties:
                              day:
                                type: string
                                description: "Dia da semana (ex: Segunda, Terça)"
                                example: Segunda
                              start:
                                type: string
                                pattern: '^([01]\\d|2[0-3]):[0-5]\\d$'
                                description: Horário de início no formato HH:MM
                                example: '08:00'
                              end:
                                type: string
                                pattern: '^([01]\\d|2[0-3]):[0-5]\\d$'
                                description: Horário de término no formato HH:MM
                                example: '09:00'
                            required:
                              - day
                              - start
                              - end
                      required:
                        - courseName
                        - schoolId
                        - schoolName
                        - schoolLogo
                        - studentName
                        - category
                        - subcategory
                        - city
                        - active
                        - schedule
                required:
                  - courses
        '401':
          description: Não autorizado. Token inválido ou ausente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado. Requer persona STUDENT.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade de listagem de cursos não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /students/courses/all:
    get:
      tags:
        - Students
      summary: Listar todos os cursos cadastrados no sistema
      description: Retorna todos os cursos ativos cadastrados no sistema, com informações do curso, escola (incluindo cidade e estado), categoria, subcategoria, média de avaliação da escola (1 a 5, quando houver) e quantidade total de avaliações da escola. Permite filtrar por nome do curso, nome da escola (`search`), categoria, subcategoria e cidade da escola. Esta rota é pública e não requer autenticação.
      parameters:
        - in: query
          name: search
          required: false
          schema:
            type: string
          description: Busca por nome do curso ou nome da escola (contém, case-insensitive).
        - in: query
          name: name
          required: false
          schema:
            type: string
          description: Filtrar cursos cujo nome contenha o valor informado (case insensitive).
        - in: query
          name: categoryId
          required: false
          schema:
            type: string
          description: Filtrar cursos pela categoria (ID da categoria).
        - in: query
          name: subcategoryId
          required: false
          schema:
            type: string
          description: Filtrar cursos pela subcategoria (ID da subcategoria).
        - in: query
          name: city
          required: false
          schema:
            type: string
          description: Filtrar cursos pela cidade da escola (case insensitive).
      responses:
        '200':
          description: Lista de cursos encontrados.
          content:
            application/json:
              schema:
                type: object
                properties:
                  courses:
                    type: array
                    items:
                      type: object
                      properties:
                        courseName:
                          type: string
                          description: Nome do curso
                        schoolName:
                          type: string
                          description: Nome da escola
                        schoolId:
                          type: string
                          format: uuid
                          description: ID da escola
                        schoolLogo:
                          type: string
                          format: uri
                          nullable: true
                          description: URL assinada do logo da escola (quando existir). Válida por 1 hora.
                        schoolCover:
                          type: string
                          format: uri
                          nullable: true
                          description: URL assinada da imagem de capa da escola (categoria COVER ou BANNER). Válida por 1 hora.
                        courseDescription:
                          type: string
                          nullable: true
                          description: Detalhes/descrição do curso
                        category:
                          type: string
                          nullable: true
                          description: Nome da categoria do curso
                        subcategory:
                          type: string
                          nullable: true
                          description: Nome da subcategoria do curso
                        schoolCity:
                          type: string
                          nullable: true
                          description: Cidade da escola (primeiro endereço)
                        schoolState:
                          type: string
                          nullable: true
                          description: Estado da escola (primeiro endereço)
                        schoolRatingAverage:
                          type: number
                          nullable: true
                          minimum: 1
                          maximum: 5
                          description: Média geral de avaliação da escola (1 a 5), quando houver avaliações
                        schoolReviewsCount:
                          type: integer
                          minimum: 0
                          description: Quantidade total de avaliações cadastradas para a escola
                      required:
                        - courseName
                        - schoolName
                        - schoolId
                        - schoolLogo
                        - schoolCover
                        - courseDescription
                        - category
                        - subcategory
                        - schoolCity
                        - schoolState
                        - schoolRatingAverage
                        - schoolReviewsCount
                required:
                  - courses
        '400':
          description: Erro na requisição. Parâmetros de filtro inválidos.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade de listagem de cursos não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /students/payments:
    get:
      tags:
        - Students
      summary: Listar pagamentos do estudante
      description: >
        Retorna os pagamentos (cobranças financeiras) do usuário logado e seus dependentes.
        Inclui tipo da transação (mensalidade/matrícula), campo `description` para exibição
        (ex.: "Mensalidade de Fevereiro de 2026"), data de pagamento, desconto, valor líquido,
        nome e logo da escola e observação quando for pagamento manual. Requer persona STUDENT.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum: [pendente, atrasado, pago]
          description: Filtrar pagamentos por status (pendente, atrasado ou pago).
        - in: query
          name: isPaid
          required: false
          schema:
            type: boolean
          description: Filtrar apenas pagos (true) ou apenas em aberto (false). Quando true, retorna apenas pagamentos com status 'pago'. Quando false, retorna apenas pagamentos pendentes ou em atraso.
        - in: query
          name: year
          required: false
          schema:
            type: integer
            minimum: 2000
            maximum: 3000
          description: >-
            Filtrar por ano civil. Com `isPaid=true`, usa o ano de `paidAt` (data do pagamento).
            Com `isPaid=false` ou sem `isPaid`, usa o ano de `dueDate` (vencimento).
          example: 2025
      responses:
        '200':
          description: Lista de pagamentos do estudante.
          content:
            application/json:
              schema:
                type: object
                properties:
                  payments:
                    type: array
                    items:
                      type: object
                      properties:
                        chargeId:
                          type: string
                          format: uuid
                          description: ID da cobrança
                        courseName:
                          type: string
                          description: Nome do curso
                        schoolName:
                          type: string
                          description: Nome da escola
                        studentName:
                          type: string
                          description: Nome do aluno (usuário ou dependente)
                        description:
                          type: string
                          description: Texto para exibição (mensalidade com mês/ano; matrícula e outros usam descrição persistida quando houver)
                        amountCents:
                          type: integer
                          format: int64
                          description: Valor original em centavos (antes do desconto)
                        discountCents:
                          type: integer
                          format: int64
                          nullable: true
                          description: Desconto em centavos, ou null se não houver
                        discountMonthsLabel:
                          type: string
                          nullable: true
                          description: Progresso do desconto na matrícula (ex. "1 de 2", "3 de 10"); null sem desconto
                        discountMonthIndex:
                          type: integer
                          nullable: true
                          description: Mês atual do desconto (1-based); null sem desconto estruturado
                        discountMonthsTotal:
                          type: integer
                          nullable: true
                          description: Total de meses com desconto; null sem desconto estruturado
                        netAmountCents:
                          type: integer
                          format: int64
                          description: Valor líquido em centavos (já aplicando desconto)
                        dueDate:
                          type: string
                          format: date
                          description: Data de vencimento
                        paidAt:
                          type: string
                          format: date-time
                          nullable: true
                          description: Data do pagamento (quando pago)
                        status:
                          type: string
                          enum: [pendente, atrasado, pago, cancelado, falhou]
                          description: Status do pagamento
                        type:
                          type: string
                          enum: ["Mensalidade", "Matrícula", "Outros"]
                          description: Tipo da transação (Mensalidade, Matrícula ou Outros)
                        schoolLogo:
                          type: string
                          format: uri
                          nullable: true
                          description: URL do logo da escola
                        paidObservation:
                          type: string
                          nullable: true
                          description: Observação quando pagamento manual (baixa pela escola)
                      required:
                        - chargeId
                        - courseName
                        - schoolName
                        - studentName
                        - description
                        - amountCents
                        - discountCents
                        - netAmountCents
                        - dueDate
                        - paidAt
                        - status
                        - type
                        - schoolLogo
                        - paidObservation
                required:
                  - payments
        '401':
          description: Não autorizado. Token inválido ou ausente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado. Requer persona STUDENT.
          content:
            application/json:
