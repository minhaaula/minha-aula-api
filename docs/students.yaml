      description: |
        Permite ao estudante aceitar um pedido de matrícula pendente criado para ele ou para um dependente. Ao aceitar, a matrícula é criada e cobranças são geradas quando aplicável (equivalente a `POST /enrollment-requests/{requestId}/approve`).

        **Notificações:** email de confirmação de matrícula (fila) e notificação in-app (`metadata.kind` = `ENROLLMENT_CONFIRMED`). Requer persona STUDENT; o pedido deve pertencer ao usuário autenticado.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: requestId
          required: true
          schema:
            type: string
            format: uuid
          description: ID do pedido de matrícula a ser aceito
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                notes:
                  type: string
                  maxLength: 255
                  nullable: true
                  description: Observações opcionais sobre a aceitação do pedido
                  example: Aceito as condições do curso
              example:
                notes: Aceito as condições do curso
