          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado. Requer persona STUDENT.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /students/notifications/read-all:
