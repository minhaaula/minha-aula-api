                        id:
                          type: string
                          format: uuid
                          description: ID do curso
                        schoolId:
                          type: string
                          format: uuid
                          description: ID da escola
                        name:
                          type: string
                          description: Nome do curso
                        description:
                          type: string
                          nullable: true
                          description: Descrição do curso
                        categories:
                          type: array
                          description: Lista de categorias do curso
                          items:
                            type: object
                            properties:
                              id:
                                type: string
                                format: uuid
