            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /students/push-tokens:
    post:
      tags:
        - Students
      summary: Registrar token de Push (FCM)
      description: >-
        Registra ou atualiza o token FCM do dispositivo para receber push (ex.: novo pedido de matrícula pela escola, lembrete de mensalidade a vencer), além das notificações in-app listadas em GET /students/notifications.
        Requer persona STUDENT e integração Firebase/worker ativas no ambiente.
