x-auth-info: |
  Módulo de autenticação para todos os usuários do sistema.
  Suporta múltiplas personas: STUDENT (estudante), ADMIN (administrador), OPERATION (operação).
  Nota: Escolas (SCHOOL) têm autenticação própria em /schools/login.

  **WhatsApp (Twilio Verify):** o cadastro (`POST /auth/register`) exige confirmação prévia do telefone via
  `POST /auth/verification/request` (purpose `signup`) e `POST /auth/verification/verify`, que devolve `phoneVerificationToken`.
  A recuperação de senha de usuário (ex.: aluno) usa `purpose` `user_password_reset` com **CPF** (não e-mail), depois `POST /auth/password/reset`
  com o `resetToken` retornado na verificação.

paths:
  /auth/verification/request:
    post:
      tags:
        - Auth
      summary: Solicitar código no WhatsApp (cadastro ou esqueci minha senha)
      description: |
        Inicia uma verificação via **Twilio Verify** (canal WhatsApp). Requer variáveis de ambiente da Twilio no servidor.

        - **signup:** envia código para o telefone informado. Resposta `201` com `challengeId` quando o envio foi iniciado.
        - **user_password_reset:** envia código para o telefone **cadastrado** do usuário com o **CPF** informado (se existir).
          Resposta `200` com mensagem genérica quando o CPF não existe ou não há telefone — sem vazar existência de conta.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/AuthVerificationRequestSignup'
                - $ref: '#/components/schemas/AuthVerificationRequestUserPasswordReset'
      responses:
        '200':
          description: |
            Pedido aceito; mensagem genérica (ex.: recuperação de senha quando não há desafio criado).
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '201':
          description: Código enviado ao WhatsApp; use `challengeId` em `/auth/verification/verify`.
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                  - challengeId
                  - purpose
                  - expiresAt
                properties:
                  message:
                    type: string
                  challengeId:
                    type: string
                    format: uuid
                  purpose:
                    type: string
                    enum:
                      - signup
                      - user_password_reset
                  expiresAt:
                    type: string
                    format: date-time
        '400':
          description: Erro de validação.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Twilio Verify não configurado ou falha externa.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/verification/verify:
    post:
      tags:
        - Auth
      summary: Validar código do WhatsApp
      description: |
        Confirma o código recebido no WhatsApp.

        - **signup:** resposta inclui `phoneVerificationToken` (curta validade) — envie em `POST /auth/register` no campo homônimo.
        - **user_password_reset:** resposta inclui `resetToken` para `POST /auth/password/reset`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthVerificationVerifyInput'
      responses:
        '200':
          description: Verificação concluída.
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    required:
                      - purpose
                      - phoneVerificationToken
                      - challengeId
                    properties:
                      purpose:
                        type: string
                        enum:
                          - signup
                      phoneVerificationToken:
                        type: string
                      challengeId:
                        type: string
                        format: uuid
                  - type: object
                    required:
                      - purpose
                      - resetToken
                      - challengeId
                    properties:
                      purpose:
                        type: string
                        enum:
                          - user_password_reset
                      resetToken:
                        type: string
                      challengeId:
                        type: string
                        format: uuid
        '400':
          description: Código inválido, expirado ou limite de tentativas.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/register:
    post:
      tags:
        - Auth
      summary: Registrar um novo usuário
      description: |
        Cadastra um novo usuário no sistema (estudantes, administradores, etc.).

        **Obrigatório:** antes, concluir `POST /auth/verification/request` (purpose `signup`) e `POST /auth/verification/verify`
        e enviar o `phoneVerificationToken` retornado. O campo `phone` deste cadastro deve corresponder ao telefone validado.

        Para persona **STUDENT**, após o cadastro o sistema enfileira email de boas-vindas (fila/worker) e grava uma notificação in-app de boas-vindas (`GET /students/notifications`, `metadata.kind` = `WELCOME`).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterUserInput'
      responses:
        '201':
          description: Usuário registrado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterUserResponse'
        '400':
          description: Erro de validação ou conflito de dados.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/login:
    post:
      tags:
        - Auth
      summary: Autenticar usuário e gerar tokens de acesso
      description: |
        Autentica um usuário e retorna um access token (validade curta) e um refresh token (validade de 30 dias).
        O refresh token deve ser usado para obter novos access tokens quando o atual expirar.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginInput'
      responses:
        '200':
          description: Autenticação realizada com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Credenciais inválidas ou erro de validação.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/refresh:
    post:
      tags:
        - Auth
      summary: Obter novo access token usando refresh token
      description: |
        Gera um novo access token válido a partir de um refresh token.
        O refresh token deve ter sido obtido no login e tem validade de 30 dias.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
                  description: Refresh token obtido no login
                  example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      responses:
        '200':
          description: Novo access token gerado com sucesso.
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                    description: Novo token de acesso JWT
                  expiresIn:
                    type: integer
                    format: int32
                    description: Tempo de expiração do access token em segundos
                required:
                  - accessToken
                  - expiresIn
        '400':
          description: Refresh token inválido ou erro de validação.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Refresh token expirado ou inválido.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/password:
    patch:
      tags:
        - Auth
      summary: Atualizar a senha do usuário autenticado
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePasswordInput'
      responses:
        '204':
          description: Senha atualizada com sucesso.
        '400':
          description: Erro de validação ou senha atual incorreta.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Usuário não autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/password/reset:
    post:
      tags:
        - Auth
      summary: Resetar senha com token
      description: |
        Redefine a senha do usuário (estudante, admin, etc.) usando o `resetToken` retornado por
        `POST /auth/verification/verify` após o fluxo com `purpose` `user_password_reset` (código no WhatsApp).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
                - newPassword
              properties:
                token:
                  type: string
                  description: Token retornado na verificação do WhatsApp (não é mais obtido só por e-mail).
                  example: abc123def456
                newPassword:
                  type: string
                  format: password
                  description: Nova senha (mínimo 6 caracteres)
                  example: novaSenha123
      responses:
        '200':
          description: Senha redefinida com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Senha redefinida com sucesso
        '400':
          description: Token inválido ou senha inválida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/password/validate:
    post:
      tags:
        - Auth
      summary: Validar token de reset de senha
      description: Verifica se um token de reset de senha é válido e retorna informações sobre ele
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
              properties:
                token:
                  type: string
                  description: Token a ser validado
                  example: abc123def456
      responses:
        '200':
          description: Resultado da validação
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                    description: Indica se o token é válido
                    example: true
                  email:
                    type: string
                    format: email
                    description: Email associado ao token (apenas se válido)
                    example: user@example.com
                  expiresAt:
                    type: string
                    format: date-time
                    description: Data de expiração do token (apenas se válido)
                    example: 2025-11-17T10:00:00Z
