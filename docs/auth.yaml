x-auth-info: |
  Módulo de autenticação para todos os usuários do sistema.
  Suporta múltiplas personas: STUDENT (estudante), ADMIN (administrador), OPERATION (operação).
  Nota: Escolas (SCHOOL) têm autenticação própria em /schools/login.

paths:
  /auth/register:
    post:
      tags:
        - Auth
      summary: Registrar um novo usuário
      description: Cadastra um novo usuário no sistema (estudantes, administradores, etc.)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterUserInput'
      responses:
        '201':
          description: Usuário registrado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterUserResponse'
        '400':
          description: Erro de validação ou conflito de dados.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/login:
    post:
      tags:
        - Auth
      summary: Autenticar usuário e gerar token de acesso
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginInput'
      responses:
        '200':
          description: Autenticação realizada com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Credenciais inválidas ou erro de validação.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/password:
    patch:
      tags:
        - Auth
      summary: Atualizar a senha do usuário autenticado
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePasswordInput'
      responses:
        '204':
          description: Senha atualizada com sucesso.
        '400':
          description: Erro de validação ou senha atual incorreta.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Usuário não autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/password/request:
    post:
      tags:
        - Auth
      summary: Solicitar reset de senha
      description: Envia um token de reset de senha para o email do usuário (estudante, admin, etc.)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
                  description: Email do usuário
                  example: usuario@email.com
      responses:
        '200':
          description: Solicitação processada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Se o email estiver cadastrado, você receberá um link para redefinir sua senha.
                  token:
                    type: string
                    description: Token gerado (apenas em desenvolvimento)
                    example: abc123def456
        '400':
          description: Erro de validação
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/password/reset:
    post:
      tags:
        - Auth
      summary: Resetar senha com token
      description: Redefine a senha do usuário (estudante, admin, etc.) usando o token recebido
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
                - newPassword
              properties:
                token:
                  type: string
                  description: Token recebido no email
                  example: abc123def456
                newPassword:
                  type: string
                  format: password
                  description: Nova senha (mínimo 6 caracteres)
                  example: novaSenha123
      responses:
        '200':
          description: Senha redefinida com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Senha redefinida com sucesso
        '400':
          description: Token inválido ou senha inválida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/password/validate:
    post:
      tags:
        - Auth
      summary: Validar token de reset de senha
      description: Verifica se um token de reset de senha é válido e retorna informações sobre ele
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
              properties:
                token:
                  type: string
                  description: Token a ser validado
                  example: abc123def456
      responses:
        '200':
          description: Resultado da validação
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                    description: Indica se o token é válido
                    example: true
                  email:
                    type: string
                    format: email
                    description: Email associado ao token (apenas se válido)
                    example: user@example.com
                  expiresAt:
                    type: string
                    format: date-time
                    description: Data de expiração do token (apenas se válido)
                    example: 2025-11-17T10:00:00Z
    patch:
      tags:
        - Auth
      summary: Alterar senha do usuário logado
      description: Permite que um usuário autenticado (estudante, admin, etc.) altere sua própria senha
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - currentPassword
                - newPassword
              properties:
                currentPassword:
                  type: string
                  format: password
                  description: Senha atual do usuário
                  minLength: 8
                  example: senhaAtual123
                newPassword:
                  type: string
                  format: password
                  description: Nova senha (mínimo 8 caracteres)
                  minLength: 8
                  example: novaSenha456
      responses:
        '204':
          description: Senha alterada com sucesso
        '401':
          description: Não autenticado ou senha atual inválida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
