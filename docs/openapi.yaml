openapi: 3.0.3
info:
  title: Minha Aula API
  version: 1.0.0
  description: API para gerenciamento de pagamentos, autenticação de usuários.
servers:
  - url: http://localhost:3000
    description: Ambiente local
  - url: https://minha-aula-api-production.up.railway.app
    description: Ambiente Prod
tags:
  - name: Auth
    description: Fluxo de cadastro e autenticação de usuários.
  - name: Admin
    description: Operações administrativas do sistema. Requer autenticação com persona ADMIN.
  - name: Payments
    description: Operações para criação e captura de pagamentos.
  - name: Health
    description: Monitoramento da saúde da aplicação.
  - name: Schools
    description: Gestão de escolas, cursos e turmas.
  - name: Dependents
    description: Cadastro de dependentes vinculados aos usuários.
  - name: Enrollment Requests
    description: Fluxo de solicitações e aprovações de matrícula.
  - name: Students
    description: Consulta de alunos e seus dependentes.
  - name: Landing
    description: Rotas públicas para landpages e páginas de marketing.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Mensagem de erro descritiva
        code:
          type: string
          description: Código de erro padronizado
          example: 'SCHOOL_NOT_FOUND'
        details:
          type: object
          description: Detalhes adicionais do erro (opcional)
          additionalProperties: true
      required:
        - error
        - code
    RegisterUserInput:
      type: object
      required:
        - fullName
        - birthDate
        - email
        - phone
        - cpf
        - address
        - persona
        - password
      properties:
        fullName:
          type: string
          example: Maria Silva
        birthDate:
          type: string
          format: date
          example: 1990-05-23
        email:
          type: string
          format: email
          example: maria.silva@example.com
        phone:
          type: string
          example: "+55 11 99999-0000"
        cpf:
          type: string
          description: Apenas dígitos.
          example: "12345678909"
        address:
          $ref: '#/components/schemas/UserAddressInput'
        persona:
          type: string
          enum:
            - ADMIN
            - SCHOOL
            - STUDENT
            - OPERATION
          example: STUDENT
        password:
          type: string
          format: password
          minLength: 8
    UserAddressInput:
      type: object
      required:
        - street
        - number
        - city
        - state
        - zipCode
      properties:
        street:
          type: string
          example: Rua das Flores
        number:
          type: string
          example: '123'
        complement:
          type: string
          nullable: true
          example: Apto 45
        district:
          type: string
          nullable: true
          example: Centro
        city:
          type: string
          example: São Paulo
        state:
          type: string
          example: SP
        zipCode:
          type: string
          description: Apenas dígitos.
          example: '01234000'
    PostalAddressOutput:
      type: object
      required:
        - street
        - number
        - city
        - state
        - zipCode
      properties:
        street:
          type: string
          description: Nome da rua
          example: 'Rua das Flores'
        number:
          type: string
          description: Número do endereço
          example: '123'
        complement:
          type: string
          nullable: true
          description: Complemento do endereço
          example: 'Apto 45'
        district:
          type: string
          nullable: true
          description: Bairro
          example: 'Centro'
        city:
          type: string
          description: Cidade
          example: 'São Paulo'
        state:
          type: string
          description: Estado (UF)
          example: 'SP'
        zipCode:
          type: string
          description: 'CEP (formato: 01234-567 ou apenas dígitos)'
          example: '01234-567'
    RegisterUserResponse:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        fullName:
          type: string
        email:
          type: string
          format: email
        cpf:
          type: string
        persona:
          type: string
          enum:
            - ADMIN
            - SCHOOL
            - STUDENT
            - OPERATION
        createdAt:
          type: string
          format: date-time
      required:
        - userId
        - fullName
        - email
        - cpf
        - persona
        - createdAt
    LoginInput:
      type: object
      required:
        - cpf
        - password
      properties:
        cpf:
          type: string
          example: "12345678909"
        password:
          type: string
          format: password
          minLength: 8
    AdminLoginInput:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: "admin@payments-api.com"
        password:
          type: string
          format: password
          minLength: 8
    UpdatePasswordInput:
      type: object
      required:
        - currentPassword
        - newPassword
      properties:
        currentPassword:
          type: string
          format: password
          minLength: 8
        newPassword:
          type: string
          format: password
          minLength: 8
    LoginResponse:
      type: object
      properties:
        accessToken:
          type: string
          description: Token de acesso JWT
        refreshToken:
          type: string
          description: Token de refresh para obter novo access token (validade de 30 dias)
        userId:
          type: string
          format: uuid
        fullName:
          type: string
        email:
          type: string
          format: email
        cpf:
          type: string
        persona:
          type: string
          enum:
            - ADMIN
            - SCHOOL
            - STUDENT
            - OPERATION
        expiresIn:
          type: integer
          format: int32
          description: Tempo de expiração do access token em segundos
        refreshTokenExpiresIn:
          type: integer
          format: int32
          description: Tempo de expiração do refresh token em segundos (30 dias)
        schoolId:
          type: string
          format: uuid
          nullable: true
          description: ID da escola (apenas para persona SCHOOL)
      required:
        - accessToken
        - refreshToken
        - userId
        - fullName
        - email
        - cpf
        - persona
        - expiresIn
        - refreshTokenExpiresIn
    CreatePaymentInput:
      type: object
      required:
        - idempotencyKey
        - amount
        - currency
        - method
        - customerId
      properties:
        idempotencyKey:
          type: string
          minLength: 8
        amount:
          type: number
          format: int64
          minimum: 1
        currency:
          type: string
          minLength: 3
          maxLength: 3
        method:
          type: string
          enum: [CARD, PIX, BOLETO]
        customerId:
          type: string
        metadata:
          type: object
          additionalProperties:
            type: string
    PaymentResponse:
      type: object
      properties:
        paymentId:
          type: string
          format: uuid
        status:
          type: string
        method:
          type: string
        amount:
          type: integer
          format: int32
        currency:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - paymentId
        - status
        - method
        - amount
        - currency
        - createdAt
    IssueBoletoInput:
      type: object
      required:
        - amount
        - currency
        - customer
        - dueDate
      properties:
        amount:
          type: integer
          format: int32
          minimum: 1
          description: Valor em centavos.
          example: 10000
        currency:
          type: string
          example: BRL
        customer:
          type: object
          required:
            - name
            - email
            - cpfCnpj
            - postalCode
            - addressNumber
          properties:
            name:
              type: string
              example: João Silva
            email:
              type: string
              format: email
            cpfCnpj:
              type: string
              example: "12345678909"
            postalCode:
              type: string
              example: "01234000"
            addressNumber:
              type: string
              example: "123"
            addressComplement:
              type: string
              nullable: true
            phone:
              type: string
              nullable: true
        dueDate:
          type: string
          format: date
          example: 2024-12-01
        description:
          type: string
          nullable: true
          example: Mensalidade Turma A
        externalReference:
          type: string
          nullable: true
          example: matricula-123
        metadata:
          type: object
          additionalProperties:
            type: string
    IssueBoletoResponse:
      type: object
      properties:
        providerRef:
          type: string
        boletoUrl:
          type: string
          nullable: true
          format: uri
        digitableLine:
          type: string
          nullable: true
        barcode:
          type: string
          nullable: true
        dueDate:
          type: string
          format: date
      required:
        - providerRef
        - dueDate
    CapturePaymentInput:
      type: object
      properties:
        amount:
          type: number
          format: int64
          minimum: 1
    HealthResponse:
      type: object
      properties:
        ok:
          type: boolean
      required:
        - ok
    CreateSchoolInput:
      type: object
      required:
        - name
        - email
        - phone
        - cnpj
        - ownerName
        - ownerCpf
        - ownerEmail
        - ownerPassword
      properties:
        name:
          type: string
          minLength: 3
          example: Escola do Futuro
        email:
          type: string
          format: email
          example: contato@escoladofuturo.com.br
        phone:
          type: string
          example: '11987654321'
        cnpj:
          type: string
          minLength: 14
          maxLength: 14
          example: '12345678000190'
        ownerName:
          type: string
          minLength: 3
          example: Maria Silva
        ownerCpf:
          type: string
          minLength: 11
          maxLength: 11
          example: '12345678901'
        ownerEmail:
          type: string
          format: email
          example: diretoria@escoladofuturo.com.br
        ownerPassword:
          type: string
          format: password
          minLength: 8
        addresses:
          type: array
          description: Lista de endereços físicos da escola.
          items:
            $ref: '#/components/schemas/SchoolAddress'
        incomeValue:
          type: integer
          format: int32
          nullable: true
          description: Valor de receita mensal estimada em centavos (usado para criação da subconta no Asaas)
          example: 50000
    UpdateSchoolInput:
      type: object
      properties:
        name:
          type: string
          minLength: 3
          example: Escola do Futuro Atualizada
        email:
          type: string
          format: email
          example: contato@escoladofuturo.com.br
        phone:
          type: string
          example: '11987654321'
        cnpj:
          type: string
          minLength: 14
          maxLength: 14
          example: '12345678000190'
        ownerName:
          type: string
          nullable: true
          minLength: 3
          example: Maria Silva
        ownerCpf:
          type: string
          nullable: true
          minLength: 11
          maxLength: 11
          example: '12345678901'
        ownerEmail:
          type: string
          nullable: true
          format: email
          example: diretoria@escoladofuturo.com.br
        ownerUserId:
          type: string
          nullable: true
          format: uuid
          example: '9f17b6f3-7af8-45be-8f4a-4d982f5a9f0c'
        ownerPassword:
          type: string
          nullable: true
          format: password
          minLength: 8
        addresses:
          type: array
          description: Lista de endereços físicos da escola.
          items:
            $ref: '#/components/schemas/SchoolAddress'
        incomeValue:
          type: integer
          format: int32
          description: Valor de receita mensal estimada em centavos
          example: 50000
        links:
          type: object
          description: Links das redes sociais e site da escola
          properties:
            facebook:
              type: string
              nullable: true
              description: Link do Facebook
              example: "https://facebook.com/escola"
            instagram:
              type: string
              nullable: true
              description: Link do Instagram
              example: "https://instagram.com/escola"
            tiktok:
              type: string
              nullable: true
              description: Link do TikTok
              example: "https://tiktok.com/@escola"
            youtube:
              type: string
              nullable: true
              description: Link do YouTube
              example: "https://youtube.com/@escola"
            site:
              type: string
              nullable: true
              description: Link do site
              example: "https://escola.com.br"
    SchoolLoginInput:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: diretoria@escola.com
        password:
          type: string
          format: password
          minLength: 8
    SchoolLoginResponse:
      type: object
      required:
        - accessToken
        - schoolId
        - ownerName
        - ownerEmail
        - expiresIn
        - onboardingCompleted
      properties:
        accessToken:
          type: string
          description: Token JWT para autenticação
        schoolId:
          type: string
          format: uuid
          description: ID da escola
        ownerName:
          type: string
          description: Nome do responsável pela escola
        ownerEmail:
          type: string
          format: email
          description: Email do responsável pela escola
        expiresIn:
          type: integer
          description: Tempo de expiração do token em segundos
        status:
          type: string
          nullable: true
          description: Status do plano da escola (TRIAL, ACTIVE, PAST_DUE, SUSPENDED, CANCELLED)
          enum:
            - TRIAL
            - ACTIVE
            - PAST_DUE
            - SUSPENDED
            - CANCELLED
        isOverdue:
          type: boolean
          nullable: true
          description: Indica se a escola possui faturas atrasadas não pagas
        onboardingCompleted:
          type: boolean
          description: Indica se o processo de onboarding (KYC) foi finalizado. Quando false, o campo onboardingUrl será retornado.
        onboardingUrl:
          type: string
          nullable: true
          description: Link para completar o processo de onboarding (KYC) no Asaas. Retornado apenas quando onboardingCompleted é false.
        plan:
          $ref: '#/components/schemas/SchoolPlanResponse'
          nullable: true
          description: Plano ativo da escola (retornado apenas se a escola tiver um plano ativo)
    SchoolResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        cnpj:
          type: string
        addresses:
          type: array
          items:
            $ref: '#/components/schemas/SchoolAddress'
        createdAt:
          type: string
          format: date-time
        ownerUserId:
          type: string
          format: uuid
          nullable: true
        ownerName:
          type: string
          nullable: true
        ownerCpf:
          type: string
          nullable: true
        ownerEmail:
          type: string
          format: email
          nullable: true
        incomeValue:
          type: integer
          format: int32
          description: Valor de receita mensal estimada em centavos
        bankAccounts:
          type: array
          description: Lista de contas bancárias da escola
          items:
            $ref: '#/components/schemas/BankAccount'
        links:
          type: object
          description: Links das redes sociais e site da escola
          properties:
            facebook:
              type: string
              nullable: true
              description: Link do Facebook
              example: "https://facebook.com/escola"
            instagram:
              type: string
              nullable: true
              description: Link do Instagram
              example: "https://instagram.com/escola"
            tiktok:
              type: string
              nullable: true
              description: Link do TikTok
              example: "https://tiktok.com/@escola"
            youtube:
              type: string
              nullable: true
              description: Link do YouTube
              example: "https://youtube.com/@escola"
            site:
              type: string
              nullable: true
              description: Link do site
              example: "https://escola.com.br"
          required:
            - facebook
            - instagram
            - tiktok
            - youtube
            - site
        images:
          type: array
          description: Lista de imagens da escola
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
                description: ID da imagem
              url:
                type: string
                format: uri
                description: URL assinada da imagem (válida por 1 hora)
              key:
                type: string
                description: Chave do arquivo no storage
              contentType:
                type: string
                description: Tipo MIME da imagem
                example: "image/jpeg"
              originalFileName:
                type: string
                description: Nome original do arquivo enviado
              category:
                type: string
                description: Categoria da imagem
                enum: [GALLERY, LOGO, BANNER, COVER, OTHER]
                example: "GALLERY"
              createdAt:
                type: string
                format: date-time
                description: Data de criação da imagem
            required:
              - id
              - url
              - key
              - contentType
              - originalFileName
              - category
              - createdAt
        isOverdue:
          type: boolean
          nullable: true
          description: Indica se a escola possui faturas atrasadas não pagas
        onboardingUrl:
          type: string
          nullable: true
          format: uri
          description: Link para completar o processo de KYC/onboarding no Asaas (retornado em GET /schools/me)
          example: "https://beta.cadastro.io/c33ef9ae605f350c052be72ab094d0b7"
        kycUrl:
          type: string
          nullable: true
          format: uri
          description: Link para completar o processo de KYC/onboarding no Asaas (retornado em POST /schools, mesmo que onboardingUrl)
          example: "https://beta.cadastro.io/c33ef9ae605f350c052be72ab094d0b7"
        plan:
          $ref: '#/components/schemas/SchoolPlanResponse'
          nullable: true
          description: Plano ativo da escola (retornado apenas se a escola tiver um plano ativo)
      required:
        - id
        - name
        - email
        - phone
        - cnpj
        - addresses
        - createdAt
        - links
    SubscriptionPlanSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
          example: BASIC
        name:
          type: string
        description:
          type: string
          nullable: true
        items:
          type: array
          nullable: true
          items:
            type: string
          example:
            - Cadastro de Alunos
            - Dashboard Gerencial
            - Relatórios
        amountCents:
          type: integer
          format: int32
          example: 15000
        currency:
          type: string
          example: BRL
        billingCycle:
          type: string
          enum:
            - MONTHLY
            - ANNUAL
        isActive:
          type: boolean
      required:
        - id
        - code
        - name
        - amountCents
        - currency
        - billingCycle
        - isActive
    SchoolPlanResponse:
      type: object
      properties:
        schoolId:
          type: string
          format: uuid
        plan:
          $ref: '#/components/schemas/SubscriptionPlanSummary'
        status:
          type: string
          enum:
            - TRIAL
            - ACTIVE
            - PAST_DUE
            - SUSPENDED
            - CANCELLED
          example: ACTIVE
        isPaid:
          type: boolean
        lastPaymentAt:
          type: string
          format: date-time
          nullable: true
        nextDueAt:
          type: string
          format: date-time
          nullable: true
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - schoolId
        - plan
        - status
        - isPaid
        - createdAt
        - updatedAt
    IssueSchoolPlanInvoiceInput:
      type: object
      properties:
        dueDate:
          type: string
          format: date-time
          nullable: true
          description: Data de vencimento desejada para a fatura.
        description:
          type: string
          nullable: true
          description: Texto exibido na cobrança gerada.
        couponCode:
          type: string
          nullable: true
          minLength: 3
          maxLength: 50
          description: >-
            Código do cupom de desconto a ser aplicado na fatura. 
            Se o cupom tiver duração maior que 1 mês (durationMonths > 1), 
            serão geradas múltiplas faturas automaticamente, uma para cada mês 
            até o limite da duração do cupom ou até a data de validade do cupom.
      example:
        dueDate: '2024-07-15T00:00:00.000Z'
        description: Assinatura Minha Aula - Julho
        couponCode: 'VAMOS'
    SchoolPlanInvoice:
      type: object
      properties:
        id:
          type: string
          format: uuid
        financeId:
          type: string
          format: uuid
        schoolId:
          type: string
          format: uuid
        planId:
          type: string
          format: uuid
        status:
          type: string
          enum:
            - ISSUED
            - PAID
            - FAILED
            - CANCELLED
        paymentStatus:
          type: string
          enum:
            - pendente
            - pago
            - atrasado
          description: Status do pagamento calculado baseado no status da fatura e data de vencimento
          example: pendente
        amountCents:
          type: integer
          format: int32
        currency:
          type: string
          example: BRL
        dueDate:
          type: string
          format: date-time
        description:
          type: string
          nullable: true
        providerRef:
          type: string
          nullable: true
        boletoUrl:
          type: string
          nullable: true
        digitableLine:
          type: string
          nullable: true
        barcode:
          type: string
          nullable: true
        externalReference:
          type: string
          nullable: true
        metadata:
          type: object
          additionalProperties:
            type: string
        paidAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - financeId
        - schoolId
        - planId
        - status
        - paymentStatus
        - amountCents
        - currency
        - dueDate
        - metadata
        - createdAt
        - updatedAt
    IssueSchoolPlanInvoiceResponse:
      type: object
      properties:
        finance:
          $ref: '#/components/schemas/SchoolPlanResponse'
        invoice:
          $ref: '#/components/schemas/SchoolPlanInvoice'
        alreadyExists:
          type: boolean
          description: Indica se uma fatura existente foi reutilizada.
      required:
        - finance
        - invoice
        - alreadyExists
    SchoolPlanInvoicesResponse:
      type: object
      properties:
        invoices:
          type: array
          items:
            $ref: '#/components/schemas/SchoolPlanInvoice'
      required:
        - invoices
    CreateSchoolChargeInput:
      type: object
      description: Pelo menos um entre `studentUserId` ou `dependentId` deve ser informado.
      required:
        - courseId
        - chargeType
        - amount
        - dueDate
      properties:
        studentUserId:
          type: string
          format: uuid
          nullable: true
        dependentId:
          type: string
          format: uuid
          nullable: true
        courseId:
          type: string
          format: uuid
        courseClassId:
          type: string
          format: uuid
          nullable: true
        chargeType:
          type: string
          enum: [TUITION, ENROLLMENT, MATERIALS, DAILY, OTHER]
        description:
          type: string
          maxLength: 255
          nullable: true
        amount:
          type: number
          format: double
          minimum: 0.01
        discount:
          type: object
          nullable: true
          required:
            - amount
          properties:
            amount:
              type: number
              format: double
              minimum: 0.01
            reason:
              type: string
              maxLength: 255
              nullable: true
        dueDate:
          type: string
          format: date
    SchoolCharge:
      type: object
      properties:
        id:
          type: string
          format: uuid
        schoolId:
          type: string
          format: uuid
        ownerUserId:
          type: string
          format: uuid
        studentUserId:
          type: string
          format: uuid
          nullable: true
        dependentId:
          type: string
          format: uuid
          nullable: true
        courseId:
          type: string
