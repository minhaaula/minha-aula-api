openapi: 3.0.3
info:
  title: Minha Aula API
  version: 1.0.0
  description: API para gerenciamento de pagamentos, autenticação de usuários.
servers:
  - url: http://localhost:3000
    description: Ambiente local
  - url: https://minha-aula-api-production.up.railway.app
    description: Ambiente Prod
tags:
  - name: Auth
    description: Fluxo de cadastro e autenticação de usuários.
  - name: Payments
    description: Operações para criação e captura de pagamentos.
  - name: Health
    description: Monitoramento da saúde da aplicação.
  - name: Schools
    description: Gestão de escolas, cursos e turmas.
  - name: Dependents
    description: Cadastro de dependentes vinculados aos usuários.
  - name: Enrollment Requests
    description: Fluxo de solicitações e aprovações de matrícula.
  - name: Students
    description: Consulta de alunos e seus dependentes.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    RegisterUserInput:
      type: object
      required:
        - fullName
        - birthDate
        - email
        - phone
        - cpf
        - address
        - persona
        - password
      properties:
        fullName:
          type: string
          example: Maria Silva
        birthDate:
          type: string
          format: date
          example: 1990-05-23
        email:
          type: string
          format: email
          example: maria.silva@example.com
        phone:
          type: string
          example: "+55 11 99999-0000"
        cpf:
          type: string
          description: Apenas dígitos.
          example: "12345678909"
        address:
          $ref: '#/components/schemas/UserAddressInput'
        persona:
          type: string
          enum:
            - ADMIN
            - SCHOOL
            - STUDENT
            - OPERATION
          example: STUDENT
        password:
          type: string
          format: password
          minLength: 8
    UserAddressInput:
      type: object
      required:
        - street
        - number
        - city
        - state
        - zipCode
      properties:
        street:
          type: string
          example: Rua das Flores
        number:
          type: string
          example: '123'
        complement:
          type: string
          nullable: true
          example: Apto 45
        district:
          type: string
          nullable: true
          example: Centro
        city:
          type: string
          example: São Paulo
        state:
          type: string
          example: SP
        zipCode:
          type: string
          description: Apenas dígitos.
          example: '01234000'
    RegisterUserResponse:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        fullName:
          type: string
        email:
          type: string
          format: email
        cpf:
          type: string
        persona:
          type: string
          enum:
            - ADMIN
            - SCHOOL
            - STUDENT
            - OPERATION
        createdAt:
          type: string
          format: date-time
      required:
        - userId
        - fullName
        - email
        - cpf
        - persona
        - createdAt
    LoginInput:
      type: object
      required:
        - cpf
        - password
      properties:
        cpf:
          type: string
          example: "12345678909"
        password:
          type: string
          format: password
          minLength: 8
    UpdatePasswordInput:
      type: object
      required:
        - currentPassword
        - newPassword
      properties:
        currentPassword:
          type: string
          format: password
          minLength: 8
        newPassword:
          type: string
          format: password
          minLength: 8
    LoginResponse:
      type: object
      properties:
        accessToken:
          type: string
        userId:
          type: string
          format: uuid
        fullName:
          type: string
        email:
          type: string
          format: email
        cpf:
          type: string
        persona:
          type: string
          enum:
            - ADMIN
            - SCHOOL
            - STUDENT
            - OPERATION
        expiresIn:
          type: integer
          format: int32
        schoolId:
          type: string
          format: uuid
          nullable: true
      required:
        - accessToken
        - userId
        - fullName
        - email
        - cpf
        - persona
        - expiresIn
    CreatePaymentInput:
      type: object
      required:
        - idempotencyKey
        - amount
        - currency
        - method
        - customerId
      properties:
        idempotencyKey:
          type: string
          minLength: 8
        amount:
          type: number
          format: int64
          minimum: 1
        currency:
          type: string
          minLength: 3
          maxLength: 3
        method:
          type: string
          enum: [CARD, PIX, BOLETO]
        customerId:
          type: string
        metadata:
          type: object
          additionalProperties:
            type: string
    PaymentResponse:
      type: object
      properties:
        paymentId:
          type: string
          format: uuid
        status:
          type: string
        method:
          type: string
        amount:
          type: integer
          format: int32
        currency:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - paymentId
        - status
        - method
        - amount
        - currency
        - createdAt
    IssueBoletoInput:
      type: object
      required:
        - amount
        - currency
        - customer
        - dueDate
      properties:
        amount:
          type: integer
          format: int32
          minimum: 1
          description: Valor em centavos.
          example: 10000
        currency:
          type: string
          example: BRL
        customer:
          type: object
          required:
            - name
            - email
            - cpfCnpj
            - postalCode
            - addressNumber
          properties:
            name:
              type: string
              example: João Silva
            email:
              type: string
              format: email
            cpfCnpj:
              type: string
              example: "12345678909"
            postalCode:
              type: string
              example: "01234000"
            addressNumber:
              type: string
              example: "123"
            addressComplement:
              type: string
              nullable: true
            phone:
              type: string
              nullable: true
        dueDate:
          type: string
          format: date
          example: 2024-12-01
        description:
          type: string
          nullable: true
          example: Mensalidade Turma A
        externalReference:
          type: string
          nullable: true
          example: matricula-123
        metadata:
          type: object
          additionalProperties:
            type: string
    IssueBoletoResponse:
      type: object
      properties:
        providerRef:
          type: string
        boletoUrl:
          type: string
          nullable: true
          format: uri
        digitableLine:
          type: string
          nullable: true
        barcode:
          type: string
          nullable: true
        dueDate:
          type: string
          format: date
      required:
        - providerRef
        - dueDate
    CapturePaymentInput:
      type: object
      properties:
        amount:
          type: number
          format: int64
          minimum: 1
    HealthResponse:
      type: object
      properties:
        ok:
          type: boolean
      required:
        - ok
    CreateSchoolInput:
      type: object
      required:
        - name
        - email
        - phone
        - cnpj
        - ownerName
        - ownerCpf
        - ownerEmail
        - ownerPassword
      properties:
        name:
          type: string
          minLength: 3
          example: Escola do Futuro
        email:
          type: string
          format: email
          example: contato@escoladofuturo.com.br
        phone:
          type: string
          example: '11987654321'
        cnpj:
          type: string
          minLength: 14
          maxLength: 14
          example: '12345678000190'
        ownerName:
          type: string
          minLength: 3
          example: Maria Silva
        ownerCpf:
          type: string
          minLength: 11
          maxLength: 11
          example: '12345678901'
        ownerEmail:
          type: string
          format: email
          example: diretoria@escoladofuturo.com.br
        ownerPassword:
          type: string
          format: password
          minLength: 8
        addresses:
          type: array
          description: Lista de endereços físicos da escola.
          items:
            $ref: '#/components/schemas/SchoolAddress'
    UpdateSchoolInput:
      type: object
      properties:
        name:
          type: string
          minLength: 3
          example: Escola do Futuro Atualizada
        email:
          type: string
          format: email
          example: contato@escoladofuturo.com.br
        phone:
          type: string
          example: '11987654321'
        cnpj:
          type: string
          minLength: 14
          maxLength: 14
          example: '12345678000190'
        ownerName:
          type: string
          nullable: true
          minLength: 3
          example: Maria Silva
        ownerCpf:
          type: string
          nullable: true
          minLength: 11
          maxLength: 11
          example: '12345678901'
        ownerEmail:
          type: string
          nullable: true
          format: email
          example: diretoria@escoladofuturo.com.br
        ownerUserId:
          type: string
          nullable: true
          format: uuid
          example: '9f17b6f3-7af8-45be-8f4a-4d982f5a9f0c'
        ownerPassword:
          type: string
          nullable: true
          format: password
          minLength: 8
        addresses:
          type: array
          description: Lista de endereços físicos da escola.
          items:
            $ref: '#/components/schemas/SchoolAddress'
    SchoolLoginInput:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: diretoria@escola.com
        password:
          type: string
          format: password
          minLength: 8
    SchoolLoginResponse:
      type: object
      properties:
        accessToken:
          type: string
        schoolId:
          type: string
          format: uuid
        ownerName:
          type: string
        ownerEmail:
          type: string
          format: email
        expiresIn:
          type: integer
          format: int32
      required:
        - accessToken
        - schoolId
        - ownerName
        - ownerEmail
        - expiresIn
    SchoolResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        cnpj:
          type: string
        addresses:
          type: array
          items:
            $ref: '#/components/schemas/SchoolAddress'
        createdAt:
          type: string
          format: date-time
        ownerUserId:
          type: string
          format: uuid
          nullable: true
        ownerName:
          type: string
          nullable: true
        ownerCpf:
          type: string
          nullable: true
        ownerEmail:
          type: string
          format: email
          nullable: true
      required:
        - id
        - name
        - email
        - phone
        - cnpj
        - addresses
        - createdAt
    SubscriptionPlanSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
          example: BASIC
        name:
          type: string
        description:
          type: string
          nullable: true
        amountCents:
          type: integer
          format: int32
          example: 15000
        currency:
          type: string
          example: BRL
        billingCycle:
          type: string
          enum:
            - MONTHLY
            - ANNUAL
        isActive:
          type: boolean
      required:
        - id
        - code
        - name
        - amountCents
        - currency
        - billingCycle
        - isActive
    SchoolPlanResponse:
      type: object
      properties:
        schoolId:
          type: string
          format: uuid
        plan:
          $ref: '#/components/schemas/SubscriptionPlanSummary'
        status:
          type: string
          enum:
            - TRIAL
            - ACTIVE
            - PAST_DUE
            - SUSPENDED
            - CANCELLED
          example: ACTIVE
        isPaid:
          type: boolean
        lastPaymentAt:
          type: string
          format: date-time
          nullable: true
        nextDueAt:
          type: string
          format: date-time
          nullable: true
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - schoolId
        - plan
        - status
        - isPaid
        - createdAt
        - updatedAt
    IssueSchoolPlanInvoiceInput:
      type: object
      properties:
        dueDate:
          type: string
          format: date-time
          nullable: true
          description: Data de vencimento desejada para a fatura.
        description:
          type: string
          nullable: true
          description: Texto exibido na cobrança gerada.
      example:
        dueDate: '2024-07-15T00:00:00.000Z'
        description: Assinatura Minha Aula - Julho
    SchoolPlanInvoice:
      type: object
      properties:
        id:
          type: string
          format: uuid
        financeId:
          type: string
          format: uuid
        schoolId:
          type: string
          format: uuid
        planId:
          type: string
          format: uuid
        status:
          type: string
          enum:
            - ISSUED
            - PAID
            - FAILED
            - CANCELLED
        amountCents:
          type: integer
          format: int32
        currency:
          type: string
          example: BRL
        dueDate:
          type: string
          format: date-time
        description:
          type: string
          nullable: true
        providerRef:
          type: string
          nullable: true
        boletoUrl:
          type: string
          nullable: true
        digitableLine:
          type: string
          nullable: true
        barcode:
          type: string
          nullable: true
        externalReference:
          type: string
          nullable: true
        metadata:
          type: object
          additionalProperties:
            type: string
        paidAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - financeId
        - schoolId
        - planId
        - status
        - amountCents
        - currency
        - dueDate
        - metadata
        - createdAt
        - updatedAt
    IssueSchoolPlanInvoiceResponse:
      type: object
      properties:
        finance:
          $ref: '#/components/schemas/SchoolPlanResponse'
        invoice:
          $ref: '#/components/schemas/SchoolPlanInvoice'
        alreadyExists:
          type: boolean
          description: Indica se uma fatura existente foi reutilizada.
      required:
        - finance
        - invoice
        - alreadyExists
    SchoolPlanInvoicesResponse:
      type: object
      properties:
        invoices:
          type: array
          items:
            $ref: '#/components/schemas/SchoolPlanInvoice'
      required:
        - invoices
    SubscriptionPlanListResponse:
      type: object
      properties:
        plans:
          type: array
          items:
            $ref: '#/components/schemas/SubscriptionPlanSummary'
      required:
        - plans
    AssignSchoolPlanInput:
      type: object
      required:
        - planId
      properties:
        planId:
          type: string
          format: uuid
        notes:
          type: string
          nullable: true
          description: Observações internas para o plano selecionado.
    SubcategorySummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
      required:
        - id
        - name
    CategoryWithSubcategories:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        subcategories:
          type: array
          items:
            $ref: '#/components/schemas/SubcategorySummary'
      required:
        - id
        - name
        - subcategories
    CategoryListResponse:
      type: object
      properties:
        categories:
          type: array
          items:
            $ref: '#/components/schemas/CategoryWithSubcategories'
      required:
        - categories
    CreateClassSessionInput:
      type: object
      required:
        - startsAt
        - endsAt
      properties:
        startsAt:
          type: string
          format: date-time
        endsAt:
          type: string
          format: date-time
        location:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
    ClassSessionResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        schoolId:
          type: string
          format: uuid
        courseClassId:
          type: string
          format: uuid
        startsAt:
          type: string
          format: date-time
        endsAt:
          type: string
          format: date-time
        status:
          type: string
          enum:
            - SCHEDULED
            - CANCELLED
        location:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - schoolId
        - courseClassId
        - startsAt
        - endsAt
        - status
        - createdAt
        - updatedAt
    ClassSessionsResponse:
      type: object
      properties:
        sessions:
          type: array
          items:
            $ref: '#/components/schemas/ClassSessionResponse'
      required:
        - sessions
    SchoolsListResponse:
      type: object
      properties:
        schools:
          type: array
          items:
            $ref: '#/components/schemas/SchoolResponse'
      required:
        - schools
    StudentDependentResponse:
      allOf:
        - $ref: '#/components/schemas/DependentResponse'
    StudentResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        fullName:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        cpf:
          type: string
        birthDate:
          type: string
          format: date
        address:
          $ref: '#/components/schemas/UserAddressInput'
        dependents:
          type: array
          items:
            $ref: '#/components/schemas/StudentDependentResponse'
        createdAt:
          type: string
          format: date-time
        schoolContext:
          $ref: '#/components/schemas/StudentSchoolContext'
      required:
        - id
        - fullName
        - email
        - phone
        - cpf
        - birthDate
        - address
        - dependents
        - createdAt
    StudentSchoolCourse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
      required:
        - id
        - name
    StudentSchoolClass:
      type: object
      properties:
        id:
          type: string
          format: uuid
        label:
          type: string
        courseId:
          type: string
          format: uuid
      required:
        - id
        - label
        - courseId
    StudentSchoolCategory:
      type: object
      properties:
        categoryId:
          type: string
        subcategoryIds:
          type: array
          items:
            type: string
      required:
        - categoryId
        - subcategoryIds
    StudentSchoolContext:
      type: object
      properties:
        schoolId:
          type: string
          format: uuid
        courses:
          type: array
          items:
            $ref: '#/components/schemas/StudentSchoolCourse'
        classes:
          type: array
          items:
            $ref: '#/components/schemas/StudentSchoolClass'
        categories:
          type: array
          items:
            $ref: '#/components/schemas/StudentSchoolCategory'
      required:
        - schoolId
        - courses
        - classes
        - categories
    StudentsListResponse:
      type: object
      properties:
        students:
          type: array
          items:
            $ref: '#/components/schemas/StudentResponse'
      required:
        - students
    SchoolStudentCourseResponse:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
    SchoolStudentClassResponse:
      type: object
      required:
        - id
        - label
      properties:
        id:
          type: string
          format: uuid
        label:
          type: string
    SchoolStudentEnrollmentResponse:
      type: object
      required:
        - enrollmentId
        - status
        - studentType
        - enrolledAt
        - updatedAt
        - student
        - course
        - class
      properties:
        enrollmentId:
          type: string
          format: uuid
        status:
          type: string
          enum:
            - PENDING
            - ACTIVE
            - COMPLETED
            - CANCELLED
        studentType:
          type: string
          enum:
            - USER
            - DEPENDENT
        enrolledAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        student:
          $ref: '#/components/schemas/StudentResponse'
        dependent:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/StudentDependentResponse'
        course:
          $ref: '#/components/schemas/SchoolStudentCourseResponse'
        class:
          $ref: '#/components/schemas/SchoolStudentClassResponse'
    SchoolStudentsResponse:
      type: object
      required:
        - students
      properties:
        students:
          type: array
          items:
            $ref: '#/components/schemas/SchoolStudentEnrollmentResponse'
    SchoolAddress:
      type: object
      required:
        - street
        - number
        - city
        - state
        - zipCode
      properties:
        street:
          type: string
          example: Rua das Palmeiras
        number:
          type: string
          example: '120'
        complement:
          type: string
          nullable: true
          example: Bloco B
        district:
          type: string
          nullable: true
          example: Centro
        city:
          type: string
          example: São Paulo
        state:
          type: string
          example: SP
        zipCode:
          type: string
          description: Apenas dígitos.
          example: '01234000'
    CreateCourseInput:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 3
          example: Curso de Inglês
        description:
          type: string
          nullable: true
          example: Curso focado em conversação.
        categories:
          type: array
          description: Categorias vinculadas ao curso com suas subcategorias.
          items:
            $ref: '#/components/schemas/SchoolCategoryLinkInput'
    UpdateCourseInput:
      type: object
      properties:
        name:
          type: string
          minLength: 3
          example: Curso de Inglês Avançado
        description:
          type: string
          nullable: true
          example: Curso com foco em conversação avançada.
        categories:
          type: array
          description: Categorias vinculadas ao curso com suas subcategorias.
          items:
            $ref: '#/components/schemas/SchoolCategoryLinkInput'
    CourseResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        schoolId:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        categories:
          type: array
          items:
            $ref: '#/components/schemas/SchoolCategoryLink'
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - schoolId
        - name
        - createdAt
    CourseListResponse:
      type: object
      properties:
        courses:
          type: array
          items:
            $ref: '#/components/schemas/CourseResponse'
      required:
        - courses
    SchoolCategoryLinkInput:
      type: object
      properties:
        categoryId:
          type: string
          minLength: 1
          example: infantil
        subcategoryIds:
          type: array
          items:
            type: string
            minLength: 1
      required:
        - categoryId
    SchoolCategoryLink:
      allOf:
        - $ref: '#/components/schemas/SchoolCategoryLinkInput'
    CourseClassScheduleEntry:
      type: object
      required:
        - day
        - start
        - end
      properties:
        day:
          type: string
          example: Segunda
        start:
          type: string
          pattern: '^([01]\\d|2[0-3]):[0-5]\\d$'
          example: '12:00'
        end:
          type: string
          pattern: '^([01]\\d|2[0-3]):[0-5]\\d$'
          example: '13:00'
    CreateCourseClassInput:
      type: object
      required:
        - label
        - classes
      properties:
        label:
          type: string
          example: Turma A - Manhã
        capacity:
          type: integer
          format: int32
