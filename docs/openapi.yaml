openapi: 3.0.3
info:
  title: Minha Aula API
  version: 1.0.0
  description: API para gerenciamento de pagamentos, autenticação de usuários.
servers:
  - url: http://localhost:3000
    description: Ambiente local
  - url: https://minha-aula-api-production.up.railway.app
    description: Ambiente Prod
tags:
  - name: Auth
    description: Fluxo de cadastro e autenticação de usuários.
  - name: Payments
    description: Operações para criação e captura de pagamentos.
  - name: Health
    description: Monitoramento da saúde da aplicação.
  - name: Schools
    description: Gestão de escolas, cursos e turmas.
  - name: Dependents
    description: Cadastro de dependentes vinculados aos usuários.
  - name: Enrollment Requests
    description: Fluxo de solicitações e aprovações de matrícula.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    RegisterUserInput:
      type: object
      required:
        - fullName
        - birthDate
        - email
        - phone
        - cpf
        - address
        - persona
        - password
      properties:
        fullName:
          type: string
          example: Maria Silva
        birthDate:
          type: string
          format: date
          example: 1990-05-23
        email:
          type: string
          format: email
          example: maria.silva@example.com
        phone:
          type: string
          example: "+55 11 99999-0000"
        cpf:
          type: string
          description: Apenas dígitos.
          example: "12345678909"
        address:
          $ref: '#/components/schemas/UserAddressInput'
        persona:
          type: string
          enum:
            - ADMIN
            - SCHOOL
            - STUDENT
            - OPERATION
          example: STUDENT
        password:
          type: string
          format: password
          minLength: 8
    UserAddressInput:
      type: object
      required:
        - street
        - number
        - city
        - state
        - zipCode
      properties:
        street:
          type: string
          example: Rua das Flores
        number:
          type: string
          example: '123'
        complement:
          type: string
          nullable: true
          example: Apto 45
        district:
          type: string
          nullable: true
          example: Centro
        city:
          type: string
          example: São Paulo
        state:
          type: string
          example: SP
        zipCode:
          type: string
          description: Apenas dígitos.
          example: '01234000'
    RegisterUserResponse:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        fullName:
          type: string
        email:
          type: string
          format: email
        cpf:
          type: string
        persona:
          type: string
          enum:
            - ADMIN
            - SCHOOL
            - STUDENT
            - OPERATION
        createdAt:
          type: string
          format: date-time
      required:
        - userId
        - fullName
        - email
        - cpf
        - persona
        - createdAt
    LoginInput:
      type: object
      required:
        - cpf
        - password
      properties:
        cpf:
          type: string
          example: "12345678909"
        password:
          type: string
          format: password
          minLength: 8
    LoginResponse:
      type: object
      properties:
        accessToken:
          type: string
        userId:
          type: string
          format: uuid
        fullName:
          type: string
        email:
          type: string
          format: email
        cpf:
          type: string
        persona:
          type: string
          enum:
            - ADMIN
            - SCHOOL
            - STUDENT
            - OPERATION
        expiresIn:
          type: integer
          format: int32
      required:
        - accessToken
        - userId
        - fullName
        - email
        - cpf
        - persona
        - expiresIn
    CreatePaymentInput:
      type: object
      required:
        - idempotencyKey
        - amount
        - currency
        - method
        - customerId
      properties:
        idempotencyKey:
          type: string
          minLength: 8
        amount:
          type: number
          format: int64
          minimum: 1
        currency:
          type: string
          minLength: 3
          maxLength: 3
        method:
          type: string
          enum: [CARD, PIX, BOLETO]
        customerId:
          type: string
        metadata:
          type: object
          additionalProperties:
            type: string
    PaymentResponse:
      type: object
      properties:
        paymentId:
          type: string
          format: uuid
        status:
          type: string
      required:
        - paymentId
        - status
    CapturePaymentInput:
      type: object
      properties:
        amount:
          type: number
          format: int64
          minimum: 1
    HealthResponse:
      type: object
      properties:
        ok:
          type: boolean
      required:
        - ok
    CreateSchoolInput:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 3
          example: Escola do Futuro
    SchoolResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - createdAt
    CreateCourseInput:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 3
          example: Curso de Inglês
        description:
          type: string
          nullable: true
          example: Curso focado em conversação.
    CourseResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        schoolId:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - schoolId
        - name
        - createdAt
    CreateCourseClassInput:
      type: object
      required:
        - label
      properties:
        label:
          type: string
          example: Turma A - Manhã
        shift:
          type: string
          nullable: true
          example: Manhã
        capacity:
          type: integer
          format: int32
          nullable: true
          minimum: 1
        startsAt:
          type: string
          format: date-time
          nullable: true
        endsAt:
          type: string
          format: date-time
          nullable: true
    CourseClassResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        courseId:
          type: string
          format: uuid
        label:
          type: string
        shift:
          type: string
          nullable: true
        capacity:
          type: integer
          format: int32
          nullable: true
        startsAt:
          type: string
          format: date-time
          nullable: true
        endsAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - courseId
        - label
        - createdAt
    AddDependentInput:
      type: object
      required:
        - fullName
      properties:
        fullName:
          type: string
          minLength: 3
          example: João Pedro
        birthDate:
          type: string
          format: date
          nullable: true
        relationship:
          type: string
          nullable: true
          example: Filho
    DependentResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        fullName:
          type: string
        birthDate:
          type: string
          format: date
          nullable: true
        relationship:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - fullName
        - createdAt
    CreateEnrollmentRequestInput:
      type: object
      required:
        - requestedForUserId
      properties:
        requestedForUserId:
          type: string
          format: uuid
        requestedForDependentId:
          type: string
          format: uuid
          nullable: true
        notes:
          type: string
          nullable: true
          maxLength: 255
    EnrollmentRequestResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [PENDING, APPROVED, REJECTED, CANCELLED]
        schoolId:
          type: string
          format: uuid
        courseClassId:
          type: string
          format: uuid
        requestedForUserId:
          type: string
          format: uuid
        requestedForDependentId:
          type: string
          format: uuid
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - status
        - schoolId
        - courseClassId
        - requestedForUserId
        - createdAt
    ApproveEnrollmentRequestInput:
      type: object
      properties:
        notes:
          type: string
          nullable: true
          maxLength: 255
    ApproveEnrollmentRequestResponse:
      type: object
      properties:
        requestId:
          type: string
          format: uuid
        enrollmentId:
          type: string
          format: uuid
        status:
          type: string
          enum: [APPROVED]
      required:
        - requestId
        - enrollmentId
        - status
