paths:
  /dependents:
    get:
      tags:
        - Dependents
      summary: Listar dependentes do estudante logado
      description: Retorna todos os dependentes cadastrados pelo usuário autenticado. Requer persona STUDENT.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de dependentes do usuário.
          content:
            application/json:
              schema:
                type: object
                properties:
                  dependents:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                          description: ID do dependente
                        fullName:
                          type: string
                          description: Nome completo do dependente
                        cpf:
                          type: string
                          nullable: true
                          description: CPF do dependente (apenas dígitos)
                        birthDate:
                          type: string
                          format: date
                          nullable: true
                          description: Data de nascimento do dependente
                        relationship:
                          type: string
                          nullable: true
                          description: "Relacionamento com o responsável (ex: Filho, Filha)"
                        createdAt:
                          type: string
                          format: date-time
                          description: Data de cadastro do dependente
                      required:
                        - id
                        - fullName
                        - cpf
                        - birthDate
                        - relationship
                        - createdAt
                required:
                  - dependents
        '401':
          description: Não autorizado. Token inválido ou ausente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado. Requer persona STUDENT.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Funcionalidade de listagem de dependentes não configurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
        - Dependents
      summary: Cadastrar um novo dependente para o usuário autenticado
      description: Disponível apenas para usuários com persona STUDENT.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddDependentInput'
      responses:
        '201':
          description: Dependente cadastrado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DependentResponse'
        '400':
          description: Erro de validação ou usuário não encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Não autorizado. Token inválido ou ausente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado. Requer persona STUDENT.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /dependents/{id}:
    put:
      tags:
        - Dependents
      summary: Editar um dependente
      description: |
        Atualiza os dados de um dependente do usuário autenticado.
        O CPF não pode ser alterado. Apenas nome completo, data de nascimento e relacionamento podem ser atualizados.
        Requer persona STUDENT.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID do dependente a ser editado
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fullName:
                  type: string
                  minLength: 3
                  description: Nome completo do dependente
                  example: João Pedro Silva
                birthDate:
                  type: string
                  format: date
                  nullable: true
                  description: Data de nascimento do dependente (formato YYYY-MM-DD)
                  example: '2010-05-15'
                relationship:
                  type: string
                  nullable: true
                  description: "Relacionamento com o responsável (ex: Filho, Filha)"
                  example: Filho
              required: []
      responses:
        '200':
          description: Dependente atualizado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DependentResponse'
        '400':
          description: Erro de validação (ID inválido, dependente não encontrado ou dados inválidos).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Não autorizado. Token inválido ou ausente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado ou dependente não pertence ao usuário. Requer persona STUDENT.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Nome já está em uso por outro dependente do mesmo usuário.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Dependents
      summary: Deletar um dependente
      description: |
        Realiza soft delete de um dependente do usuário autenticado.
        Não é possível deletar um dependente que possui matrículas ativas ou solicitações de matrícula pendentes em escolas.
        Requer persona STUDENT.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID do dependente a ser deletado
      responses:
        '204':
          description: Dependente deletado com sucesso (soft delete).
        '400':
          description: Erro de validação (ID inválido ou dependente não encontrado).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Não autorizado. Token inválido ou ausente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não autorizado ou dependente não pertence ao usuário. Requer persona STUDENT.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Não é possível deletar dependente com vínculos ativos (matrículas ativas ou solicitações pendentes).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
